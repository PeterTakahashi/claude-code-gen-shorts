panels:
  - id: p1
    prompt: |
      A modern anime/webtoon scene of an ordinary office worker staring at a phone showing a
      surging FX chart, dollar-sign sparkle in his eyes, the visual of "a salaryman dreams of getting rich on FX". Tense,
      tempting glow.
  - id: p2
    prompt: |
      A screen scene of beginner's-luck profits, the balance doubling, the man grinning,
      the visual of "early wins go to his head".
      Bright but ominous tone.
  - id: p3
    prompt: |
      An infographic of leverage: a small deposit controlling a huge position, an oversized
      seesaw, the visual of "leverage lets him
      bet far beyond his money". Clean financial infographic.
  - id: p4
    prompt: |
      A dramatic scene of the chart suddenly crashing, red candles plunging, the man's face
      draining of color, the visual of "the market
      turns against him overnight". Tense, alarming tone.
  - id: p5
