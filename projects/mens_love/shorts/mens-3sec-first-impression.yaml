ja:
  title: '初対面の3秒で女性が見ている、4つの場所 #Shorts'
  description: '心理学では、初対面の印象は、ほんの数秒で、ほぼ決まると言われています。

    女性が無意識にチェックしている、4つのポイントを、anime寸劇で解説します。


    #Shorts #恋愛心理 #第一印象 #コミュニケーション #心理学

    '
  hook_caption: 初対面3秒で見られる場所
  series_brand: バルトゥーンメンズ恋愛
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「初対面の3秒で、ほぼ印象が決まる」——心理学でそう言われている、女性が無意識に見ている、4つのポイントを知っていますか?
    caption: 3秒で見られている4つの場所
  - panel: p2
    text: 1つ目は、姿勢。研究では、背筋の伸びた相手を、自信があると、感じる傾向があるとされています。猫背を直すだけで、印象は変わります。
    caption: ①姿勢——猫背を直すだけ
  - panel: p3
    text: 2つ目は、目線。アイコンタクトは、6割ほどが、ちょうど良いとされ、見つめすぎても、外しすぎても、不安に映る傾向があります。
    caption: ②目線——6割が安心される
  - panel: p4
    text: 3つ目は、声のトーン。心理学的に、低めで、ゆっくりした声は、落ち着きや安心感と、結びつきやすいと、研究されています。
    caption: ③声——低く、ゆっくり話す
  - panel: p5
    text: 4つ目は、清潔感。爪、襟元、靴——この3点が整っているかは、ブランド物より、ずっと強く印象を、左右する傾向があります。
    caption: ④清潔感——爪・襟・靴の3点
  - panel: p6
    text: 姿勢、目線、声、清潔感——どれも、明日から、自分で整えられる項目です。テクニックではなく、自分のメンテナンスから、印象は変わります。
    caption: テクニックより自分のメンテナンス
en:
  title: '4 Things Women Judge in the First 3 Seconds #Shorts'
  description: 'Psychology says a woman forms her first impression of you in just a few seconds. Here are the 4 things she''s unconsciously checking out.


    #Shorts #FirstImpressions #DatingAdvice #Psychology #Communication'
  hook_caption: 4 Things Women Judge INSTANTLY
  series_brand: Baltoon Men's Dating
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: They say she'll make up her mind about you in the first 3 seconds. Here are the 4 things she's secretly judging.
    caption: Her 3-Second Test
  - panel: p2
    text: 'First up: your posture. Standing up straight doesn''t just look better—studies show it projects confidence. Stop slouching, start impressing.'
    caption: 1. Posture = Confidence
  - panel: p3
    text: Second, eye contact. The sweet spot is around 60%. Stare too much, and you're creepy. Look away too much, and you seem nervous.
    caption: '2. Eye Contact: 60%'
  - panel: p4
    text: Third, your tone of voice. Psychologically, a lower, slower voice is associated with calm and a sense of security. Don't rush your words.
    caption: '3. Voice: Low & Slow'
  - panel: p5
    text: And fourth, cleanliness. She's not looking for expensive brands. She's checking your nails, your collar, and your shoes. These details matter most.
    caption: 4. Details > Brands
  - panel: p6
    text: Posture, eyes, voice, and grooming. These aren't complicated tricks—they're simple habits you can start today to completely change your first impression.
    caption: It's all about maintenance.
