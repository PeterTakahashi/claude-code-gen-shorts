ja:
  title: 'LINE既読スルー後のNG返信3パターン、心理学解説 #Shorts'
  description: 'LINEで既読スルーされた後、男性が、ついやってしまう「3つのNG返信」を、心理学の研究をもとに解説します。

    罪悪感、過剰説明、短文連打——どれも、自信のなさが、相手に伝わってしまう傾向があります。


    #Shorts #LINE #既読スルー #恋愛心理 #メンズ恋愛

    '
  hook_caption: 既読スルー後のNG返信
  series_brand: 既読スルー対策
  voice_speed: 1.4
  narration:
  - panel: p1
    text: LINEで既読スルーされた瞬間、男性がついやってしまう「3つのNG返信」を、ご存じですか。心理学の研究では、どれも、自信のなさが、相手に伝わる傾向があると、言われています。
    caption: 既読スルー後のNG返信3つ
  - panel: p2
    text: 1つ目は、罪悪感を煽る返信です。「嫌われた?」と送ると、相手は責められた気がするので、返事をするのが、さらに重く感じてしまう傾向があります。
    caption: ①罪悪感を煽る返信
  - panel: p3
    text: 2つ目は、過剰な説明です。長い言い訳を送ると、心理学的には、自信のなさと不安が、文章量に比例して伝わってしまう、と指摘されています。
    caption: ②過剰説明は不安を伝える
  - panel: p4
    text: 3つ目は、短文の連打です。「見てる?」「無視?」を立て続けに送ると、相手の脳は、心地よさより、プレッシャーを感じやすくなる傾向があります。
    caption: ③短文連打はプレッシャー
  - panel: p5
    text: 心理学では、自信のある男性ほど、返信に余白を作る傾向があると、言われています。焦らないこと自体が、相手にとっての、安心のサインなんです。
    caption: 余白こそ自信のサイン
  - panel: p6
    text: 既読スルーは、関係の終わりではなく、ただの「タイミングのズレ」のことが、ほとんどです。スマホを伏せて、自分の時間に戻る——それが、いちばん、効くんです。
    caption: スマホを伏せて自分の時間に戻る
en:
  title: '3 Texts That Make Her Ghost You (Psychology Explained) #Shorts'
  description: 'She left you on read? Before you send that follow-up text, watch this.

    We''re breaking down 3 common mistakes men make that kill attraction, based on psychological principles.


    #Shorts #DatingAdvice #Texting #Psychology #RelationshipTips'
  hook_caption: She Left You On Read? Don't Send These.
  series_brand: Texting Psychology
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Ever get left on read and wonder what to do next? Here are three common replies that actually push her away, according to psychology.
    caption: Don't Send These 3 Texts
  - panel: p2
    text: First up, the guilt trip. A message like 'Did I do something wrong?' just makes you seem insecure and puts her on the defensive.
    caption: 1. The Guilt Trip
  - panel: p3
    text: Second, the over-explanation. Sending a wall of text to justify yourself just screams desperation. Psychologically, the longer the message, the lower your perceived confidence.
    caption: 2. The Over-Explanation
  - panel: p4
    text: And third, the rapid-fire pings. 'You there??' 'Hello??' This creates pressure and feels more like an interrogation than a conversation.
    caption: 3. The Rapid-Fire Pings
  - panel: p5
    text: 'So what''s the takeaway? The psychology is simple: confident people are comfortable with silence. Not panicking is a sign of security.'
    caption: Confidence is Silence
  - panel: p6
    text: Most of the time, it's not a rejection—it's just a timing mismatch. The best move? Put the phone down and get back to your own life.
    caption: Get Back to Your Life
