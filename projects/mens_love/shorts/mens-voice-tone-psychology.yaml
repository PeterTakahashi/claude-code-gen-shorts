ja:
  title: '女性が無意識に好感を持つ、声の4つの条件 #Shorts'
  description: '印象の約38%は、声のトーンで決まるとも言われています。

    心理学と音声研究から、好感度を上げやすい声の4つの条件を、解説します。


    #Shorts #恋愛心理 #声 #コミュニケーション #心理学

    '
  hook_caption: 好感を持たれる声の条件
  series_brand: バルトゥーンメンズ恋愛
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「何を話すか」より、「どう聞こえるか」——印象の約4割は、声で決まるとも言われている、その理由を知っていますか?
    caption: 印象の4割は声で決まる
  - panel: p2
    text: 1つ目の条件は、ピッチ。研究では、やや低めの声が、落ち着きや、安心感と、結びつきやすい傾向があるとされています。胸に手を当てて話すと、自然と下がります。
    caption: ①ピッチ——やや低めが落ち着く
  - panel: p3
    text: 2つ目は、ペース。普段より、2割ゆっくり話すだけで、緊張していない印象になり、相手も、安心して聞ける傾向があります。
    caption: ②ペース——2割ゆっくり
  - panel: p4
    text: 3つ目は、返事の前の、1秒の間。即答ではなく、ひと呼吸置くことで、「ちゃんと聞いてくれた」と、感じてもらいやすくなります。
    caption: ③返事の前に1秒の間
  - panel: p5
    text: 4つ目は、語尾。文の終わりを、少しだけ柔らかく落とすと、威圧感が減って、余韻のある印象に、変わる傾向があります。
    caption: ④語尾——柔らかく落とす
  - panel: p6
    text: 低めの声、ゆっくりのペース、1秒の間、柔らかい語尾——どれも、今日から練習できる、自己メンテナンスです。声は、表情と同じくらい、相手に届きます。
    caption: 声は表情と同じくらい届く
en:
  title: '4 Vocal Hacks to Sound Instantly More Attractive #Shorts'
  description: 'It''s not just what you say, but how you say it. Studies show your voice makes up 38% of a first impression. Here are 4 science-backed tricks to make your voice more appealing.


    #Shorts #Communication #Psychology #DatingAdvice #Attractive'
  hook_caption: The Voice Women Find More Attractive
  series_brand: Valtunes Men's Dating
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Did you know that how you sound is often more important than what you say? Your voice can make up nearly 40% of a first impression.
    caption: Your voice is key
  - panel: p2
    text: First, use a slightly lower pitch. Research shows a deeper vocal tone is subconsciously linked with confidence and a sense of calm.
    caption: 1. Lower Your Pitch
  - panel: p3
    text: Second, slow down your pace. Speaking just 20% slower makes you sound more relaxed and thoughtful, and people will listen more closely.
    caption: 2. Slow Your Pace
  - panel: p4
    text: Third, pause for a second before you reply. This small gap shows you’re truly listening, not just waiting for your turn to talk.
    caption: 3. The Power Pause
  - panel: p5
    text: Fourth, soften the end of your sentences. Letting your tone fall gently instead of rising makes you sound less demanding and more approachable.
    caption: 4. Use Soft Endings
  - panel: p6
    text: Lower pitch, slower pace, a deliberate pause, and soft endings. Master these four simple habits, and you’ll change how people hear you.
    caption: Start practicing today
