ja:
  title: '線路脇のバラックから渡米した16歳 #Shorts'
  description: 'サガ県トスシ、線路の脇のバラック小屋で生まれた在日韓国人の少年は、16歳で1人アメリカへ渡った。後にソフトバンクを作る孫正義の出発点の話。


    #Shorts #孫正義 #Softbank #人物伝

    '
  hook_caption: 線路脇のバラックから渡米した16歳
  series_brand: 孫正義伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: サガ県トスシの、線路の脇のバラック小屋で、生まれた少年がいます。
    caption: サガ県トスシ、線路脇のバラック
  - panel: p2
    text: 在日韓国人の家庭、貧しさと差別の中で育ち、その家は、貨物列車が通るたびに揺れました。
    caption: 在日韓国人、貨物列車に揺れる家
  - panel: p3
    text: 少年は、本だけは、夢中で読みました。そしてある日、英語の本で、シリコンバレーを知るんです。
    caption: 本だけは夢中で読んだ
  - panel: p4
    text: 1974年、16歳の彼は、家族の反対を押し切り、1人でカリフォルニアへ渡る決意をしました。
    caption: 1974年、16歳で渡米決意
  - panel: p5
    text: スーツケース1つだけ持って、ハネダ空港から、たった1人で飛行機に乗ったんです。
    caption: スーツケース1つで単身渡米
  - panel: p6
    text: その少年の名は、ソン・マサヨシ。トスシのバラックから、後の25兆円企業の物語が、ここから始まりました。
    caption: ここからソフトバンクが始まった
en:
  title: 'From a Shack by the Tracks to a Tech Empire #Shorts'
  description: 'At 16, he left his home next to a railroad track in Japan to chase a dream in America. This is the incredible origin story of Masayoshi Son, founder of SoftBank.


    #Shorts #MasayoshiSon #Softbank #Inspiration'
  hook_caption: He Left a Shack at 16 & Built a $200B Empire
  series_brand: The Masayoshi Son Story
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: He grew up in a shack by the railroad tracks, so poor the house shook every time a train roared by.
    caption: Born by the tracks
  - panel: p3
    text: 'But inside, he devoured books, dreaming of a place he''d only read about: Silicon Valley.'
    caption: Dreaming of America
  - panel: p4
    text: So at just 16, against his family's wishes, he decided to go to California, all alone.
    caption: The decision
  - panel: p1
    text: With a single worn-out suitcase, he boarded the flight from Tokyo, not knowing a soul.
    caption: One suitcase
  - panel: p5
    text: That boy was Masayoshi Son, and he turned that lonely journey into the global giant, SoftBank.
    caption: Founder of SoftBank
