      Character: {subject_young}.
ja:
  title: '学生時代の孫正義が、シャープから1億円を引き出した方法 #Shorts'
  description: |
    アメリカ留学中の孫正義は、毎日1つ新しいビジネスアイデアを書き出し、250個から選び抜いた発明を作り上げた。それは小さな電子翻訳機。彼はバークレーの教授たちを雇い、完成したその特許をシャープへ売り込み、約1億円を手にする。すべての始まりとなった起業資金の物語を30秒で解説します。

    #Shorts #偉人伝 #孫正義 #ソフトバンク #名言
  hook_caption: 学生の孫正義が1億円を手にした発明
  series_brand: 孫正義
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 1970年代の終わり、カリフォルニアで留学していた20代の孫正義は、貧しい学生でした。彼は決めます。自分の発明で、生活費を稼ぐ、と。
      caption: 留学中の20代、発明で稼ぐと決めた
    - panel: p2
      text: 彼は1日1個、新しいビジネスアイデアをノートに書き出します。たまったアイデアは、250個。そこから本気で取り組む1つを、選び抜きました。
      caption: 1日1個、250案から1つを選び抜いた
    - panel: p3
      text: 選んだのは、電子翻訳機の発明。そして驚くべきことに、彼はバークレーの教授たちを、自分のプロジェクトの顧問として雇い入れます。
      caption: バークレーの教授を顧問として雇った
    - panel: p4
      text: 完成したのは、英語を入力すると別の言語に変換する、手のひらサイズの電子翻訳機。当時としては、最先端の発明でした。
      caption: 手のひらサイズの電子翻訳機を完成させた
    - panel: p5
      text: 彼は日本へ飛び、その特許をシャープに売り込みます。買い取り額は、約1億円。学生が手にする金額では、ありませんでした。
      caption: シャープが特許を約1億円で買い取った
    - panel: p6
      text: この1億円が、後にソフトバンクとなる会社の、最初の元手となる。すべての帝国は、たった1つのノートと、選び抜かれた1個のアイデアから始まったのです。
      caption: 1億円が後のソフトバンク帝国の元手となった
