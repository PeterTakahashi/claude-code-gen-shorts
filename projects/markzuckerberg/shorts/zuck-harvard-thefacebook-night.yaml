ja:
  title: '19歳がハーバードの寮で一晩で書いたサイト #Shorts'
  description: '2004年2月、ハーバード大学カークランド・ハウスの寮で、19歳のマーク・ザッカーバーグが、わずか数時間で書き上げた小さなサイト。それが、現在20億人が使う Facebook の始まりだった。


    #Shorts #マークザッカーバーグ #Meta #Facebook #人物伝

    '
  hook_caption: 19歳が寮で一晩で書いたサイト
  series_brand: マーク・ザッカーバーグ伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 現在、20億人以上が使うサイトを、たった一晩で書き上げた、19歳の大学生が、います。
    caption: 20億人のサイトを一晩で書いた19歳
  - panel: p2
    text: 2004年2月、ハーバード大学、カークランド・ハウスの寮。
    caption: 2004年2月、ハーバードの寮
  - panel: p3
    text: 当時、コンピュータサイエンス専攻の2年生だった、マーク・ザッカーバーグが、机に向かいました。
    caption: コンピュータサイエンスの2年生
  - panel: p4
    text: 彼は、わずか数時間で、PHP を書き、データベースを設計し、シンプルなサイトを立ち上げました。
    caption: 数時間で PHP とDBを書き上げた
  - panel: p5
    text: サイトの名前は、thefacebook。最初は、ハーバードの学生だけが使える、小さなサイトでした。
    caption: thefacebook、ハーバード限定の小さなサイト
  - panel: p6
    text: そして、その夜の数時間が、20年後、世界中の人々の人生を、繋ぐことになる——19歳の一晩の作業が、すべての始まりでした。
    caption: 19歳の一晩が、世界を繋いだ
en:
  title: 'How a 19-Year-Old Built an Empire From His Dorm #Shorts'
  description: 'In a Harvard dorm room in February 2004, a 19-year-old sophomore launched a simple website in a single night. That site became Facebook, connecting billions of people worldwide.


    #Shorts #MarkZuckerberg #Facebook #Meta #College'
  hook_caption: He Changed The World In ONE NIGHT
  series_brand: The Mark Zuckerberg Story
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: February 2004. Inside a Harvard University dorm room...
    caption: Harvard, 2004
  - panel: p1
    text: '...a 19-year-old computer science major named Mark Zuckerberg was about to change the world.'
    caption: A 19-year-old coder
  - panel: p4
    text: In a single, intense coding session, he built a brand new kind of social directory from scratch.
    caption: An all-night session
  - panel: p5
    text: He called it 'thefacebook'—at first, just a small site for his fellow Harvard students.
    caption: '''thefacebook'' is born'
  - panel: p6
    text: But that one night's work would soon connect billions of people across the globe, sparking a revolution.
    caption: Connecting the world
