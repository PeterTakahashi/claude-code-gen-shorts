ja:
  title: '8700万人分のデータが流出した日 #Shorts'
  description: '2018年4月、米議会の公聴会で、マーク・ザッカーバーグが10時間にわたり証言した話。Cambridge Analytica が、Facebook ユーザー8700万人分のデータを、無断で取得していた事件の真相。


    #Shorts #マークザッカーバーグ #Meta #Facebook #人物伝

    '
  hook_caption: 8700万人分のデータが盗まれた日
  series_brand: マーク・ザッカーバーグ伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 8700万人分の Facebook ユーザーのデータが、知らない間に、政治コンサル会社に、流れていた事件があります。
    caption: 8700万人分のデータが流出していた
  - panel: p2
    text: 2018年4月、ワシントンD.C.、米連邦議会。
    caption: 2018年4月、米議会
  - panel: p3
    text: 事件の名は、Cambridge Analytica。研究目的と称し集めたデータが、選挙のターゲティングに、流用されていたんです。
    caption: Cambridge Analytica、選挙への流用
  - panel: p4
    text: Facebook の CEO マーク・ザッカーバーグは、当時33歳。普段の灰色のTシャツを脱ぎ、紺色のスーツとネクタイで、議会に出頭しました。
    caption: Tシャツを脱ぎ、スーツで議会へ
  - panel: p5
    text: 10時間以上に及ぶ質疑で、彼は、繰り返し、こう答え続けたんです——「責任は、私にあります」。
    caption: 「責任は、私にあります」
  - panel: p6
    text: シリコンバレーが、初めて国家に頭を下げた日。テクノロジーが「無邪気な道具」では無くなった、転換点でした。
    caption: テクノロジーが無邪気で無くなった日
en:
  title: 'The Day 87 Million Facebook Profiles Were Leaked #Shorts'
  description: 'In April 2018, Mark Zuckerberg testified before Congress about the Cambridge Analytica scandal, where 87 million user profiles were improperly harvested. This is the story of tech''s day
    of reckoning.


    #Shorts #MarkZuckerberg #Facebook #Privacy #History'
  hook_caption: He took the blame for 87 million stolen profiles.
  series_brand: 'Mark Zuckerberg: A Biography'
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: April 2018, Washington D.C. The U.S. Congress is in session.
    caption: Washington D.C., 2018
  - panel: p1
    text: The man on the witness stand is 33-year-old Facebook CEO, Mark Zuckerberg.
    caption: Mark Zuckerberg
  - panel: p3
    text: He's there to answer for the Cambridge Analytica scandal, where the data of 87 million users was secretly harvested for political ads.
    caption: 87 million users
  - panel: p4
    text: Trading his iconic grey t-shirt for a suit, he faced a grilling from lawmakers for over 10 hours.
    caption: 10-hour testimony
  - panel: p5
    text: 'Throughout the marathon hearing, his message was consistent: ''It was my mistake, and the responsibility is mine.'''
    caption: '''The responsibility is mine.'''
  - panel: p6
    text: This was the day Silicon Valley bowed to the government... the day technology lost its innocence.
    caption: Tech lost its innocence
