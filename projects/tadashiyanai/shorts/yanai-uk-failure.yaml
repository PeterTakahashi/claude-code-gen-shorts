ja:
  title: '柳井正、海外1号店で大失敗した話 #Shorts'
  description: |
    今や世界的ブランドのユニクロ。だが2001年、満を持して進出した英国では、開いた店の多くを数年で閉めるという大失敗を喫した。世界一を目指した柳井正が、最初の海外進出でつまずき、そこから何を学んだのかを30秒で解説します。

    #Shorts #偉人伝 #柳井正 #ユニクロ #経営
  hook_caption: 柳井正、海外進出で大量閉店した過去
  series_brand: 柳井正
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 今や世界的ブランドのユニクロ。その創業者・柳井正は、2001年、まんをじして海外へ打って出ます。狙ったのは、ファッションの本場、ロンドンでした。
      caption: 2001年、満を持してロンドンへ進出した
    - panel: p2
      text: 日本での成功を武器に、柳井さんは英国で次々とみせを出していきます。世界一への、華々しいスタートのはずでした。
      caption: 日本の成功を武器に英国で店を急拡大
    - panel: p3
      text: ところが、現実は甘くありませんでした。文化も売り方も違う異国で、みせにはきゃくが入らず、苦戦が続きます。
      caption: 文化の違う異国で客が入らず苦戦した
    - panel: p4
      text: 結果、開いた店の多くを、わずか数年で閉めることになります。世界一を宣言した男の、手痛い大失敗でした。
      caption: 開いた店の多くを数年で閉めた
    - panel: p5
      text: しかし柳井さんは、ここで終わりませんでした。なぜ負けたのかを徹底的に分析し、戦い方そのものを作り直したんです。
      caption: なぜ負けたかを分析し戦略を作り直した
    - panel: p6
      text: その学びが、のちの世界進出を支えます。一度の大失敗を糧にできるかどうか。そこに、世界で戦える企業になる分かれ道があったのです。
      caption: 大失敗を糧にできるかが世界で戦う分かれ道
