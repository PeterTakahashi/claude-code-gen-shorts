    '
- id: p6
  prompt: '9:16 vertical anime/webtoon style illustration:

    A 49-year-old Tadashi Yanai standing alone in his Fast Retailing office at night in late 1998, holding a printed annual sales report, looking at a bar chart that for the first time crosses the "100
