ja:
  title: '1990円フリースで社会現象を起こした男 #Shorts'
  description: '1998年、UNIQLO のフリース1990円が日本を席巻した。原宿1号店オープン、初の年商1000億円超え。

    ヤナイ・タダシが起こした「フリースブーム」の真相。


    #Shorts #柳井正 #UNIQLO #人物伝

    '
  hook_caption: 1990円のフリースで日本を制した
  series_brand: 柳井正伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 1998年、たった1990円のフリースが、日本社会を、丸ごと、巻き込みました。
    caption: 1990円のフリースが社会現象に
  - panel: p2
    text: 仕掛けたのは、UNIQLO のヤナイ・タダシ、当時49歳。
    caption: UNIQLOヤナイ・タダシ、49歳
  - panel: p3
    text: 彼は、15色のカラーフリースを、ハラジュク1号店に、壁一面、積み上げたんです。
    caption: 15色のフリースをハラジュクに積んだ
  - panel: p4
    text: 「高品質、低価格」。当時のアパレル業界が信じなかった常識破りでしたが、消費者は、爆発的に反応した。
    caption: 高品質×低価格が爆発した
  - panel: p5
    text: テレビは、連日、「フリースブーム」を報道。3年間で2600万枚を売り上げます。
    caption: 3年で2600万枚を販売
  - panel: p6
    text: そして、その年、Fast Retailing は、初めて、年商1000億円を突破——ヤマグチの地方チェーンが、全国ブランドへ、躍り出た瞬間でした。
    caption: 初の年商1000億円突破
en:
  title: 'How a $15 Jacket Conquered Japan #Shorts'
  description: 'In 1998, UNIQLO''s 1,900 yen fleece jacket created a national phenomenon. This is the story of how Tadashi Yanai''s radical bet on quality and price turned a local retailer into a global
    giant.


    #Shorts #UNIQLO #TadashiYanai #Business #History'
  hook_caption: This $15 Fleece Changed Fashion Forever
  series_brand: The Tadashi Yanai Story
  voice_speaker: Ryan
  narration:
  - panel: p3
    text: In 1998, this man, Tadashi Yanai, made a bet that would change the fashion industry.
    caption: Tadashi Yanai, 49
  - panel: p2
    text: He opened a massive UNIQLO flagship store in Tokyo's trendiest district, Harajuku.
    caption: Harajuku Flagship Store
  - panel: p1
    text: 'But instead of high fashion, he stacked the walls with one simple item: fleece jackets, in 15 different colors.'
    caption: A wall of fleece
  - panel: p4
    text: 'His strategy was radical: high quality at a rock-bottom price of just 1,900 yen, about 15 U.S. dollars.'
    caption: Only ¥1,900
  - panel: p5
    text: Japan went into a frenzy. The "fleece boom" was all over the news, selling 26 million jackets in just three years.
    caption: 26 million sold
  - panel: p6
    text: That year, sales for his company, Fast Retailing, soared past 100 billion yen for the first time, launching a regional chain onto the world stage.
    caption: A global giant was born
