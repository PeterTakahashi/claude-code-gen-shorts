id: yanai-fleece-boom
parent_chapter: null
panels:
- id: p1
  prompt: '9:16 vertical anime/webtoon style illustration:

    Inside the 1998 UNIQLO Harajuku flagship store in Tokyo, an enormous wall of perfectly stacked fleece jackets in 15 different vivid colors — bright red, lime green, royal blue, lemon yellow, magenta,
    orange, purple — towering ceiling-high. A dense crowd of 1998 Japanese shoppers in late-90s fashion eagerly grabbing fleeces from the stack, frenzied retail energy. Bright clean overhead lighting, the
    iconic image of the Japan fleece boom.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    Exterior street view of Tokyo''s Harajuku district in November 1998, a brand-new UNIQLO flagship store with large red-and-white English UNIQLO signage and floor-to-ceiling glass windows showing colorful
    fleeces inside. Crowds of late-90s Japanese youth in baggy jeans and platform boots passing by, late-90s Tokyo urban atmosphere, autumn afternoon light.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    A 49-year-old Tadashi Yanai (greying hair, thin-rimmed silver glasses, dark navy suit, no tie) in his 1998 Fast Retailing Yamaguchi headquarters office, leaning over a conference table covered with
    brightly colored fleece fabric swatches in 15 different colors, two younger Japanese executives across the table waiting for his decision, his expression intensely calculating, the bearing of a CEO
    making a multi-billion-yen bet.

    Character: {subject_adult}.

    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

    Extreme close-up of a folded UNIQLO fleece jacket in 1998 with a clean white rectangular price tag prominently showing "¥1,900" printed in bold black, the soft texture of the fleece visible, a hand
    reaching for it, the impossibly cheap price for a high-quality fleece — the price point that broke the Japanese apparel market.

    '
- id: p5
  prompt: '9:16 vertical anime/webtoon style illustration:

    Inside a typical 1998 Japanese suburban living room, a CRT television set on a low wooden stand showing a Japanese TV news segment with the on-screen English chyron "UNIQLO FLEECE BOOM" and footage
