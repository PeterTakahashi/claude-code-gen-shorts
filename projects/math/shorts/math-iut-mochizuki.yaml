ja:
  title: '日本人が解いたabc予想、望月新一のIUT理論 #Shorts'
  description: '14年前の2012年、京都大学の望月新一が、600ページに及ぶIUT理論を発表した。

    数学界最難問abc予想の証明をめぐる、日本発の論争を、30秒で振り返ります。


    #Shorts #数学 #IUT理論 #abc予想 #望月新一

    '
  hook_caption: 日本人が解いた世紀の難問
  series_brand: IUT理論
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 14年前の2012年8月、京都大学の数学者が、自身のホームページに、600ページに及ぶ4本の論文を、静かに公開しました。
    caption: 2012年、京大から600ページの論文
  - panel: p2
    text: 著者は望月新一、当時43歳。10代でプリンストン大学に入学した日本の天才数学者で、彼は20年近く、京都の研究室にこもって、独自の理論を、組み立て続けていました。
    caption: 望月新一、20年こもって独自理論
  - panel: p3
    text: その理論が証明すると主張したのは、1985年に提示されたabc予想という、数学界最難問の一つでした。整数の足し算と掛け算の深い関係を、説明する未解決問題だったんです。
    caption: 27年解けなかったabc予想に挑戦
  - panel: p4
    text: しかし、6年後の2018年、ドイツのショルツェとシュティックスが、証明の核心部に重大な欠陥がある、と公に指摘したので、世界の数学界は、二分されました。
    caption: 2018年、欠陥指摘で世界が二分
  - panel: p5
    text: それでも、8年後の2020年、京都大学数理解析研究所の査読付き専門誌が、論文の掲載を、正式に承認しました。望月本人が編集長を務める、京大誌での掲載でした。
    caption: 2020年、京大の査読誌が掲載を承認
  - panel: p6
    text: IUT理論は、今も世界の数学者の評価が、完全には一致していません。それでも、日本人が、世紀の難問に独自の答えを出したことは、紛れもない事実です。
    caption: 評価は割れたまま、しかし日本発の答え
en:
  title: 'This Genius''s 600-Page Proof Divided the Math World #Shorts'
  description: 'In 2012, mathematician Shinichi Mochizuki released a 600-page proof for the infamous ABC Conjecture. The only problem? Almost no one else could understand it. Here''s the story of the controversial
    theory that split the world of mathematics.


    #Shorts #math #science #academia #mystery'
  hook_caption: He solved an impossible math problem... or did he?
  series_brand: IUT Theory
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In 2012, a reclusive mathematician dropped a stack of papers on his website—a 600-page proof.
    caption: A 600-page proof
  - panel: p2
    text: 'The author: Shinichi Mochizuki, a prodigy who spent 20 years in isolation building a radical new type of mathematics he called IUT Theory.'
    caption: Radical new math
  - panel: p3
    text: It claimed to solve the ABC Conjecture, one of the deepest, most difficult problems in all of math.
    caption: An 'impossible' problem
  - panel: p4
    text: But the proof was so alien, almost no one could understand it. After years of review, two of the world's top mathematicians declared it had a fatal flaw.
    caption: A fatal flaw?
  - panel: p5
    text: Yet, in 2020, the proof was officially published... in a journal where Mochizuki himself was the editor-in-chief.
    caption: Published anyway
  - panel: p6
    text: To this day, the math community is split. Is IUT Theory a revolutionary breakthrough, or a beautiful, complex dead end?
    caption: Breakthrough or dead end?
