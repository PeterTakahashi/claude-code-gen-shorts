ja:
  title: 'Denny''s で Nvidia を創業した男 #Shorts'
  description: '1993年、30歳のジェンスン・ファンは、East San Jose の Denny''s の片隅で、3人の仲間と Nvidia を創業した。深夜のファミレスから世界の AI を支える企業が始まった話。


    #Shorts #ジェンスンファン #Nvidia #人物伝

    '
  hook_caption: Denny's で創業した男
  series_brand: ジェンスン・ファン伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 1993年、ある深夜のファミレスで、3人の若いエンジニアが、世界を変える会社を、創業しました。
    caption: 深夜のファミレスから始まった
  - panel: p2
    text: 場所は、East San Jose の、Denny's。30歳のジェンスン・ファンが、仲間2人と、戦略を練っていたんです。
    caption: 1993年、East San Jose の Denny's
  - panel: p3
    text: 彼は当時、半導体メーカーで働いていたが、3D グラフィック専用のチップに、未来を見ていた。
    caption: 3Dグラフィック専用チップに賭けた
  - panel: p4
    text: テーブルの紙ナプキンに、回路図を描きながら、コーヒーを、何杯も飲み続けたといいます。
    caption: 紙ナプキンに回路図を描いた
  - panel: p5
    text: そして夜が明ける頃、3人は、会社の名前を、Nvidia に、決めたんです。
    caption: 夜明け、社名は Nvidia に決定
  - panel: p6
    text: 今や時価総額世界最大級の AI 半導体企業——その始まりは、深夜のパンケーキとコーヒーだった、というわけです。
    caption: 始まりはパンケーキとコーヒー
en:
  title: 'He Founded NVIDIA on a Denny''s Napkin #Shorts'
  description: 'In 1993, Jensen Huang and two friends started a revolution at a Denny''s in San Jose. This is the story of how a conversation over coffee and a napkin sketch gave birth to NVIDIA, a global
    AI leader.


    #NVIDIA #JensenHuang #TechHistory #Entrepreneur #Shorts'
  hook_caption: This $3 Trillion Company Started on a Napkin
  series_brand: The Jensen Huang Story
  voice_speaker: Aiden
  narration:
  - panel: p3
    text: 'In 1993, a 30-year-old engineer named Jensen Huang saw the future of computing: dedicated chips for 3D graphics.'
    caption: A vision for graphics
  - panel: p2
    text: To bring this vision to life, he and two friends met for a late-night session at an East San Jose Denny's.
    caption: East San Jose Denny's
  - panel: p1
    text: They huddled in a booth for hours, hammering out the details of a company that would change the world.
    caption: Late-night planning
  - panel: p4
    text: With no whiteboard, they famously sketched their initial chip architecture on the back of a paper napkin.
    caption: The napkin plan
  - panel: p5
    text: 'As morning approached, they didn''t just have a plan; they had a name for their new venture: NVIDIA.'
    caption: NVIDIA is born
  - panel: p6
    text: And that's how one of the world's most valuable AI companies began, over coffee in a 24-hour diner.
    caption: From diner to tech giant
