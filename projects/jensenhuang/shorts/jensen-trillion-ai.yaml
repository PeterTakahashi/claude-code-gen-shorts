  prompt: '9:16 vertical anime/webtoon style illustration:

    A late-2022 home desk scene, a young person of unspecified ethnicity in a hoodie staring at a modern laptop screen showing the ChatGPT interface with a conversation in progress, soft evening lamp light,
    an expression of awe on the face, conveying the moment generative AI broke into the global public consciousness.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    A modern financial trading floor or analyst desk, multiple monitors displaying a steeply ascending green NVDA stock chart in 2023, the ticker shown in white text against dark trading-terminal backgrounds,
