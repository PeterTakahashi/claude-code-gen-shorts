    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

    Inside a modern Nvidia data-center server facility, long rows of black server racks filled with green-accented H100 GPU modules, blue and green status LEDs glowing along the racks, cold blue ambient
