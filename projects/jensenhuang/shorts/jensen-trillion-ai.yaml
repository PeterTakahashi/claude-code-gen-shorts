    '
- id: p5
  prompt: '9:16 vertical anime/webtoon style illustration:

    A 60-year-old Jensen Huang in his modern Nvidia Santa Clara office in 2023, standing by a large window overlooking Silicon Valley, holding a phone, his face thoughtful rather than triumphant, soft afternoon
