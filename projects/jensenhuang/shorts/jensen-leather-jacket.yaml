ja:
  title: '黒革ジャケットを毎日着る本当の理由 #Shorts'
  description: 'Nvidia の CEO ジェンスン・ファンが、いつも黒い革ジャケットを着ているのは、なぜか。それは妻からのプレゼントが、始まりだった。


    #Shorts #ジェンスンファン #Nvidia #人物伝

    '
  hook_caption: 黒革ジャケットを着続ける理由
  series_brand: ジェンスン・ファン伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: Nvidia の CEO が、20年以上、ほぼ毎日、同じ黒い革ジャケットを着ている理由を、知っていますか。
    caption: 20年同じジャケットを着る理由
  - panel: p2
    text: ジェンスン・ファン、61歳。あのトレードマークの黒革ジャケット——実は、最初の1着は、妻からのプレゼントだったんです。
    caption: 最初の1着は妻からの贈り物
  - panel: p3
    text: 気に入った彼は、同じものを、何着も買い揃え、出張から登壇まで、ほぼ毎日、着るようになった。
    caption: 同じものを何着も買い揃えた
  - panel: p4
    text: ステージ衣装に悩む時間を、ゼロにして、思考の全てを、半導体と AI に、注ぐためです。
    caption: 服選びの時間をゼロに
  - panel: p5
    text: ジョブズの黒タートルと、同じ哲学——ユニフォームは、決断疲れを、減らす道具なんですね。
    caption: ユニフォームは決断疲れを減らす
  - panel: p6
    text: そして今では、左腕に Nvidia のロゴのタトゥーを入れるほど、彼自身が、ブランドの一部に、なっています。
    caption: 左腕にはNvidiaロゴのタトゥー
en:
  title: 'Why NVIDIA''s CEO Wears The Same Jacket Every Day #Shorts'
  description: 'NVIDIA CEO Jensen Huang is famous for his black leather jacket. But why does he wear it every single day? The reason is a simple strategy to save his energy for what truly matters.


    #Shorts #NVIDIA #JensenHuang #TechCEO #Biography'
  hook_caption: The Secret Behind His Leather Jacket
  series_brand: The Jensen Huang Story
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: For over 20 years, NVIDIA's CEO has worn the same black leather jacket nearly every single day. But why?
    caption: His daily uniform
  - panel: p3
    text: It all started when his wife gave him the very first one as a gift.
    caption: A gift from his wife
  - panel: p4
    text: He loved it so much that he bought several more of the exact same model to wear for everything, from keynotes to meetings.
    caption: He bought more
  - panel: p5
    text: It’s a powerful strategy to fight 'decision fatigue,' the same reason Steve Jobs wore his iconic black turtleneck.
    caption: No decision fatigue
  - panel: p6
    text: By eliminating one small choice, he saves all his mental energy for building the future of AI.
    caption: Focused on the future
