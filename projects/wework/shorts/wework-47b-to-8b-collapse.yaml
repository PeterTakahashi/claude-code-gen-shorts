panels:
- id: p1
  prompt: '9:16 vertical anime/webtoon style illustration:

    2019, the lavish penthouse executive office on the top floor of

    WeWork headquarters in New York City, a very tall barefoot

    Israeli-American man in his late 30s with long wavy dark brown

    hair loose, black designer t-shirt and ripped designer jeans,

    standing dramatically at floor-to-ceiling windows overlooking

    the Manhattan skyline at sunset, a large red downward arrow

    decorative graphic faintly visible across the window glass,

    visual of "a king watching his kingdom crash". Wide mid-shot.

    Clearly American Manhattan setting. No Japanese text.

    Character: {neumann}.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    2010, an early dusty SoHo loft in lower Manhattan, the same now

    30-year-old man, dark wavy hair, white plain t-shirt and faded

    jeans, standing barefoot in front of long rough-hewn wooden

    shared desks with mismatched chairs and laptops, a cofounder

    (Miguel McKelvey, big bearded American man) beside him gesturing

    enthusiastically, hipster-style exposed brick walls, plants in

    pots, the original first WeWork coworking space, golden afternoon

    light. Wide mid-shot. Clearly American Manhattan loft setting.

    Character: {neumann}.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    A modern WeWork office floor in 2018, dozens of trendy young

    professionals in casual clothes working at long communal wooden

    tables under hanging Edison bulbs, an open kraft-paper keg of

    free craft beer on the side, large neon wall sign reading

    decorative English "DO WHAT YOU LOVE", potted plants everywhere,

    glass-walled phone booths, the visual of "the most aspirational

    coworking space in the world". Wide shot. American hipster

    coworking aesthetic. No Japanese text.

    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

    2017, a luxurious private corporate conference room in central

    Tokyo Japan, on one side a 60-year-old short Japanese man in a

    dark navy suit (clearly meant to suggest Masayoshi Son) and on

    the other side the same tall barefoot Israeli-American man with

    long wavy dark hair in a black t-shirt and jeans, leaning across

    the table shaking hands enthusiastically, a stack of paper

    contracts with a large decorative English "$10 BILLION" header

