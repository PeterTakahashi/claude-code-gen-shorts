    through a window in the background. Newspaper composition.

    Decorative English text only. No people. No Japanese text.

    '
- id: p6
  prompt: '9:16 vertical anime/webtoon style illustration:

    Late 2019 / early 2020, an empty boarded-up WeWork office lobby

    in Manhattan, the once-glowing yellow "We" logo above the

