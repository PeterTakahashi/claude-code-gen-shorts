    distance, dim lighting, plants wilting, a sense of an

    aspirational empire that aged ten years in three months.

    Wide shot. American empty office setting. No people in foreground.

    No Japanese text.

    '
ja:
  title: '470億ドルが80億ドルに溶けた日、WeWork崩壊 #Shorts'
  description: '2019年、シェアオフィス WeWork は世界で最も注目された未上場企業の一つだった。

    しかし、たった6週間で評価額は470億ドルから80億ドルへ激減。創業者のアダム・ニューマンは追放された。


    #Shorts #WeWork #AdamNeumann #SoftBank #事件

    '
  hook_caption: 470億ドルが80億ドルに溶けた日
  series_brand: WeWork崩壊
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 6週間で、評価額が470億ドルから、80億ドルへ。たった42日間で約5兆円が消えた、シリコンバレー史上最大の崩壊劇を、知っていますか?
    caption: 6週間で評価額が約5兆円消えた
  - panel: p2
    text: 2010年、アダム・ニューマンが Manhattan の小さな loftで始めたシェアオフィス WeWork は、世界中の若者が憧れる働き方の象徴になっていきました。
    caption: 2010年、Manhattanの小さな倉庫から
  - panel: p3
    text: 無料のクラフトビール、ヨガ、洗練された空間。WeWorkは、オフィスではなく、ライフスタイルを売る、と彼は語っていました。
    caption: ビール・ヨガ・ライフスタイルを売る
  - panel: p4
    text: 2017年、SoftBankの孫正義は、彼にわずか28分で、100億ドルの投資を、即決しました。会社の評価額は、最終的に470億ドルに、達します。
    caption: 2017年、孫正義が28分で100億ドル即決
  - panel: p5
    text: しかし2019年9月、IPOを準備するため公開された目論見書は、酷い財務と異常なガバナンスを、暴いてしまいました。投資家が一斉に離反し、彼は、CEOを追われます。
    caption: 2019年、IPO直前で全てが暴かれた
  - panel: p6
    text: 評価額は80億ドルへ。たった42日間で、彼の理想郷は、その8割が、消えました。「ライフスタイルを売る会社」の、本当の値段が、世界に晒された瞬間です。
    caption: 80億ドルへ、理想郷の8割が消えた
en:
  title: 'The $47 Billion Implosion of WeWork #Shorts'
  description: 'In 2019, WeWork was one of the world''s most valuable startups. Just six weeks later, its valuation had collapsed by 80% and its charismatic founder was fired. This is the story of a spectacular
    rise and an even more spectacular fall.


    #Shorts #WeWork #AdamNeumann #SoftBank #Business'
  hook_caption: How to Lose $39 Billion in 42 Days
  series_brand: The WeWork Collapse
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: In just 42 days, a company valued at $47 billion suddenly cratered, losing nearly 80% of its worth.
    caption: $39 Billion Vanished
  - panel: p2
    text: This was WeWork, which founder Adam Neumann had started in a single Manhattan loft back in 2010.
    caption: From a single loft...
  - panel: p3
    text: He wasn't just selling desks; he was selling a 'lifestyle'—a community fueled by free beer and a revolutionary vision for work.
    caption: '...to a global ''lifestyle'''
  - panel: p4
    text: The vision was so seductive that SoftBank's Masayoshi Son famously invested $10 billion after a meeting of less than 30 minutes.
    caption: $10B in under 30 min
  - panel: p5
    text: 'But when the company filed to go public in 2019, its financial documents revealed the ugly truth: staggering losses and chaotic leadership.'
    caption: The truth comes out
  - panel: p6
    text: The IPO was cancelled, Neumann was ousted, and the $47 billion dream came crashing down to reality.
    caption: The dream collapses
