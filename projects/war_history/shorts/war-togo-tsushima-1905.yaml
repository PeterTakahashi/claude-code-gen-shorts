ja:
  title: '東郷平八郎、日本海海戦の8分 #Shorts'
  description: '1905年5月27日、対馬沖。ロシア・バルチック艦隊38隻を、たった一日で壊滅させた男がいた。

    アジアの国が、白人列強の艦隊を撃破した、史上初の海戦をAnimeで。


    #Shorts #日本海海戦 #東郷平八郎 #日露戦争 #1905

    '
  hook_caption: 東郷、日本海の8分間
  series_brand: 日本海海戦
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 1905年5月27日午後1時55分、対馬沖。日本艦隊司令長官の東郷平八郎は、開戦の合図「Z旗」を、旗艦三笠のマストに掲げました。121年前の、世界を変える8分が、始まります。
    caption: 121年前の1905年、Z旗が揚がる
  - panel: p2
    text: 相手は、地球を半周してきたロシア・バルチック艦隊38隻。日本に勝てる海軍は存在しないとされていた、白人列強の主力艦隊です。
    caption: 地球半周してきたロシア艦隊38隻
  - panel: p3
    text: ところが東郷は、敵の鼻先で艦隊を、左に大きく旋回させる命令を下します。横腹を晒す自殺的な機動だったので、部下の参謀たちは、一瞬凍りつきました。
    caption: 鼻先で左旋回、参謀が凍る
  - panel: p4
    text: 狙いは「T字戦法」で、敵の縦列の前を、自分たちの横列で塞ぐ陣形のことです。これで、ロシア側は先頭艦しか撃てず、日本側は全艦で集中砲火を浴びせられる、圧倒的な火力差が生まれます。
    caption: T字戦法、火力差が一方的
  - panel: p5
    text: 結果、わずか一日で、ロシア艦隊38隻のうち、撃沈21隻、捕獲7隻。日本側の損害は、水雷艇3隻だけという、海戦史上類を見ない、完全勝利でした。
    caption: 1日でロシア28隻、日本3隻
  - panel: p6
    text: この一戦で、アジアの小国が、世界最強と言われた艦隊を、初めて撃破します。東郷平八郎は、世界中の海軍士官に「東洋のネルソン」と、呼ばれることになります。
    caption: アジアが列強艦隊を初撃破した日
en:
  title: 'Japan''s Suicidal Move That Crushed the Russian Fleet #Shorts'
  description: 'In 1905, one admiral''s insane gamble led to one of the most decisive naval victories in history.

    See how Japan''s navy annihilated the mighty Russian fleet at the Battle of Tsushima.

    #Shorts #History #MilitaryHistory #Japan #RussoJapaneseWar'
  hook_caption: He Bet His Entire Navy On One Move
  series_brand: Battle of Tsushima
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: May 27th, 1905. On the bridge of his flagship, Admiral Togo Heihachiro is about to make the biggest gamble of his life.
    caption: A historic gamble
  - panel: p2
    text: 'His enemy: Russia''s Baltic Fleet. 38 warships that sailed halfway around the world, considered the invincible navy of a European superpower.'
    caption: The invincible enemy
  - panel: p3
    text: 'As the fleets closed in, Togo gave an insane order: a hard turn directly in front of the enemy guns. It was a suicidal maneuver, and his officers could only watch in horror.'
    caption: A suicidal order
  - panel: p4
    text: His goal was to "Cross the T"—a risky tactic to let his entire fleet fire on the lead Russian ships, while they could barely fire back.
    caption: Crossing the T
  - panel: p5
    text: The result was a massacre. In a single day, 21 Russian ships were sunk and 7 were captured. Japan lost only three small torpedo boats.
    caption: Annihilation
  - panel: p6
    text: It was the first time a modern Asian nation had defeated a European great power, and Admiral Togo would forever be known as the 'Nelson of the East'.
    caption: The Nelson of the East
