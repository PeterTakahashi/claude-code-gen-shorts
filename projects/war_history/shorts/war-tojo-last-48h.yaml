panels:
- id: p1
  prompt: 'Square 1:1 anime/webtoon style illustration filling the entire frame edge-to-edge.

    Extreme dramatic close-up of a single Colt .32 caliber pistol resting

    on a small dark lacquered wooden side table inside a quiet Japanese-

    style room, the pistol''s brass tip glinting faintly, beside it a

    folded white handwritten will in vertical Japanese calligraphy

    readable as decorative kanji 「遺書」 stamped in red ink at the top,

    a small black-and-white framed family photograph turned slightly

    away, soft late afternoon golden light slanting through paper shoji

    screens, the visual of "the 48 hours before he pulled the trigger".

    Subject filling square center for vertical short layout with blurred

    padding above and below. Clearly September 1945 Tokyo Japan

    residence setting. Decorative kanji on the will OK.

    '
- id: p2
  prompt: 'Square 1:1 anime/webtoon style illustration filling the frame.

    September 1945 daytime, mid-shot of a 60-year-old Japanese former

    prime minister standing alone at the genkan entrance of a modest

    wooden Tokyo Setagaya residence, clean-shaven angular face with

    prominent cheekbones, round wire-rimmed eyeglasses, close-cropped

    iron-grey hair shaved high on the sides, a thin neatly-trimmed

    grey toothbrush mustache, a plain dark civilian three-piece wool

    suit with a white dress shirt and dark necktie, hands clasped

    quietly in front of him, the visual of "the man the world wanted

    to hang waiting at his door". Outside the gate behind him, a small

    group of Japanese reporters in dark suits with cameras and a few

    curious neighbors gathering, late summer cicadas faintly suggested

    in shimmering background air, soft warm late-afternoon light.

    Clearly Tokyo Japan September 1945 setting. Mid-shot.

    Character: {tojo}.

    '
- id: p3
  prompt: 'Square 1:1 anime/webtoon style illustration filling the frame.

    Inside a quiet tatami-mat washitsu room of the same Tokyo Setagaya

    residence, September 11 1945 afternoon, the same 60-year-old Japanese

    former prime minister now in a plain dark civilian three-piece suit

    sitting alone at a low cedar writing desk, writing in fluid vertical

    Japanese calligraphy onto a long sheet of white washi paper with a

    black brush, his face calm and resigned, an inkstone and water

    dropper beside him, the same Colt .32 pistol from panel 1 visible

    on the side table behind, a small framed photograph of his family

    on the tokonoma alcove, soft amber afternoon light through paper

    shoji, the visual of "writing his final words while he still has

    time". Mid-shot. Clearly Tokyo Japan September 1945 residence

    setting. Decorative kanji on the paper readable but small.

    Character: {tojo}.

    '
- id: p4
  prompt: 'Square 1:1 anime/webtoon style infographic-style panel.

    Clean modern infographic on warm cream background, a horizontal

    decorative English timeline running across the frame, on the left

    side a small decorative English label "SEP 10 1945 — MACARTHUR

    ORDERS ARREST", in the middle a stylized icon of a pistol with

    decorative English caption "SEP 11 1945 — SUICIDE ATTEMPT — SHOT

    THROUGH CHEST — SURVIVED", on the right side a stylized icon of a

    noose with decorative English caption "DEC 23 1948 — HANGED AT

    SUGAMO PRISON", the visual of "from arrest order to execution —

    three years, one failed bullet". Pure infographic composition.

    Decorative English text only. No people.

    '
- id: p5
  prompt: 'Square 1:1 anime/webtoon style illustration filling the frame.

    Late afternoon September 11 1945, exterior wide mid-shot of the

    front gate of the same modest wooden Tokyo Setagaya residence, four

    American military police officers in olive-drab US Army uniforms

    with white "MP" armbands and white helmets striding briskly up the

    stone walkway toward the entrance, one US Army officer in the lead

    carrying a clipboard, a Japanese household maid frozen at the open

    shoji door in shock, a distant muffled single gunshot sound

    suggested by a small puff of smoke from a window of the residence,

    the visual of "the MPs arrive just as the gun goes off". Clearly

    Tokyo Japan September 11 1945 setting. Decorative kanji on the

    gate plaque 「東條」 readable. Wide mid-shot.

    '
- id: p6
  prompt: 'Square 1:1 anime/webtoon style illustration filling the frame.

    Same extreme dramatic close-up framing as panel 1 of the small dark

    lacquered wooden side table inside the quiet Japanese-style room,

    this time slightly later — the Colt .32 pistol now toppled

    sideways on the table, the folded white handwritten will 「遺書」

    with the red ink stamp still beside it but slightly unfolded

