ja:
  title: '誰もいない新幹線にお辞儀する駅員、外国人が衝撃を受ける #Shorts'
  description: |
    日本の駅員や新幹線スタッフは、出発する電車に向かって深々とお辞儀する。
    新幹線を7分で蘇らせる清掃チームでさえ、車両に頭を下げてから、仕事を始める。
    外国人観光客がそれを延々と撮影するのは、もはやサービスではなく、敬意の文化だと、感じるからなんです。

    #Shorts #日本 #新幹線 #お辞儀 #海外の反応
  hook_caption: 電車にお辞儀する駅員に外国人が驚く
  series_brand: 外国人が見た日本
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 東京駅で外国人観光客が、スマホを構えて、ずっと撮り続けている瞬間が、あります。撮っているのは、走り去る新幹線にお辞儀する、駅員の姿です。
      caption: 走り去る電車にお辞儀する駅員
    - panel: p2
      text: 複数のスタッフが横一列に並び、まるで号令でもかかったように、同じ角度、同じ速さで、深くお辞儀をする。揃いすぎていて、外国人は最初、何かの儀式かと、思ってしまいます。
      caption: 同じ角度同じ速さで揃ったお辞儀
    - panel: p3
      text: しかも、7分で新幹線を清掃するTESSEIのチームでさえ、車両の前で揃って一礼してから、ようやく作業を始めるんです。
      caption: 7分清掃のTESSEIも一礼から始める
    - panel: p4
      text: 海外の駅員には、こうした習慣は、ほぼ存在しません。だから外国人にとっては、乗客ではなく「乗り物」にまで頭を下げる感覚が、衝撃的に映ります。
      caption: 乗り物にも頭を下げる感覚に衝撃
    - panel: p5
      text: 観光客がカメラを向け続けるのは、単なる珍しさからでは、ありません。仕事に対する誠実さが、形になって見えるからこそ、心が動かされるんです。
      caption: 誠実さが形に見えて心が動く
    - panel: p6
      text: 誰も見ていない時間にも、変わらず同じお辞儀をする——それが日本のサービス文化の根っこにある、密かな美意識なのです。
      caption: 誰も見ていなくても同じお辞儀をする
en:
  title: 'Why Japanese Station Staff Bow to Empty Trains #Shorts'
  description: |
    On Japanese train and Shinkansen platforms, staff bow deeply to departing trains. Even the famous 7-minute Shinkansen cleaning team bows before starting work. Tourists film it constantly, because what they see is not service — it is a culture of respect.

    #Shorts #Japan #Shinkansen #Bow #ServiceCulture
  hook_caption: They Bow to the Trains in Japan
  series_brand: A Foreigner's View of Japan
  voice_speaker: am_michael
  narration:
    - panel: p1
      text: At Tokyo Station, you'll often see foreign tourists glued to their phones, filming the station staff bowing to a departing Shinkansen.
      caption: Filming the Bowing Staff
    - panel: p2
      text: A line of attendants will bow in perfect unison, at the exact same angle and speed, almost like a ritual.
      caption: Bowing in Perfect Unison
    - panel: p3
      text: Even the legendary TESSEI crew, who clean a Shinkansen in seven minutes, bow to the train before they begin work.
      caption: Even the Cleaning Crew Bows
    - panel: p4
      text: In most countries, station staff simply don't do this. Bowing to a vehicle, not just to passengers, feels almost unreal to outsiders.
      caption: Bowing to the Train Itself
    - panel: p5
      text: Tourists keep filming not because it is exotic, but because they can see, in physical form, what sincerity in work looks like.
      caption: Sincerity Made Visible
    - panel: p6
      text: They bow the same way whether anyone is watching or not. That quiet aesthetic sits at the heart of Japanese service culture.
      caption: The Same Bow When No One Watches
