ja:
  title: '日本で財布を落とした外国人が、震えた理由 #Shorts'
  description: |
    現金10万円入りの財布を東京で落とした外国人。母国ならまず戻らないその財布が、なぜ日本ではそっくり返ってくるのか。

    #Shorts #日本 #落とし物 #交番 #海外の反応
  hook_caption: 財布が返ってくる国、日本
  series_brand: 財布が返る国
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 東京で財布を落とした外国人が、ある体験に、震えたという話です。
      caption: 東京で財布を落とした外国人
    - panel: p2
      text: 観光客のトムは、渋谷の雑踏で、現金10万円が入った財布を落としました。母国なら、まず戻らない金額です。
      caption: 渋谷で現金10万円入りの財布を紛失
    - panel: p3
      text: ところが拾った日本人は、中身に手をつけず、近くの交番に届けます。これは日本では、子供でも当たり前にする行動です。
      caption: 拾った人はそのまま交番へ
    - panel: p4
      text: 東京では毎年、約40億円もの落とし物の現金が、警察に届けられます。そしてその7割が、持ち主の元へ戻るんです。
      caption: 東京は年40億円の現金が届けられる
    - panel: p5
      text: トムが交番に行くと、財布は現金ごと、そっくり返ってきました。彼は思わず、涙ぐんだそうです。
      caption: 財布は現金ごとそっくり戻った
    - panel: p6
      text: なぜ日本では、落とし物が返るのか。それは、見ていなくても正しくあろうとする、文化そのものだからです。
      caption: 「見られなくても正しくある」文化
