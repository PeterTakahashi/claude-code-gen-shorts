ja:
  title: 'ドイツ人観光客が日本のトイレで泣いた理由 #Shorts'
  description: '日本に来た外国人が、最初に衝撃を受けるのは、神社でも寿司でもなく、トイレだと言われている。

    TOTOが半世紀かけて磨いた温水洗浄便座が、なぜ世界中の旅行者を泣かせるのか。1980年代から始まった、ある日本企業の地味な努力を紹介します。


    #Shorts #日本礼賛 #TOTO #ウォシュレット #海外の反応

    '
  hook_caption: 日本のトイレで泣いた理由
  series_brand: バルトゥーン日本礼賛
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 日本に来た外国人が、最初に衝撃を受けるのは、神社でも寿司でもなく、空港のトイレだと、よく言われます。
    caption: 最初の衝撃は空港のトイレ
  - panel: p2
    text: 個室に入ると、便座は温かく、横のパネルには、ボタンがずらり。初めて見ると、宇宙船の操縦席のように感じる人も、多いんです。
    caption: 便座が温かく、ボタンが並ぶ
  - panel: p3
    text: 正体は、TOTOが1980年代から改良を重ねた、温水洗浄便座Washlet。便座暖房、自動開閉、消臭、音楽までついた、世界唯一の家電です。
    caption: TOTOウォシュレット、世界唯一の家電
  - panel: p4
    text: 寒い冬の早朝、温かい便座にそっと座った瞬間、思わず涙が出たという外国人観光客の体験談は、SNSで何度もバズりました。
    caption: 寒い朝、温かい便座で涙
  - panel: p5
    text: 帰国後、自国の冷たい便座に座り直した時、初めて、日本の日常がどれほど贅沢だったかに、気づくそうです。
    caption: 帰国後、自国の便座が冷たい
  - panel: p6
    text: そして近年、TOTOの海外売上は急増。日本人にとっては当たり前の小さな優しさが、世界中の家に、静かに広がり始めています。
    caption: TOTOの海外売上が急増中
en:
  title: 'Why This Tourist Cried in a Japanese Toilet #Shorts'
  description: 'The first culture shock for visitors in Japan isn''t the temples or the food... it''s the toilets. This is the story of the TOTO Washlet, and how a small piece of Japanese hospitality is
    winning over the world.


    #Shorts #Japan #Travel #TOTO #CultureShock'
  hook_caption: He Cried in a Japanese Airport Bathroom
  series_brand: Baltun Japan Praise
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: For many tourists in Japan, the first culture shock isn't the shrines or the sushi... it's the airport bathroom.
    caption: First Culture Shock
  - panel: p2
    text: Inside, the seat is already warm, and a control panel is lined with buttons, feeling more like a spaceship's cockpit.
    caption: A Spaceship Cockpit?
  - panel: p3
    text: This is the TOTO Washlet, a high-tech marvel perfected since the 1980s with features from heated seats to privacy sounds.
    caption: The TOTO Washlet
  - panel: p4
    text: On a cold day, the simple comfort of a warm seat is so unexpectedly welcoming that some visitors say it moved them to tears.
    caption: Moved to Tears
  - panel: p5
    text: Returning home, the shock of a cold, ordinary toilet makes them realize just how luxurious daily life in Japan had been.
    caption: The Cold Reality
  - panel: p6
    text: That's why TOTO's sales are now soaring globally, as this small piece of Japanese hospitality finds its way into homes worldwide.
    caption: Spreading Worldwide
