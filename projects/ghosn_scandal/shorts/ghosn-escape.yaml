ja:
  title: 'ゴーン会長が楽器ケースで日本を脱出した夜 #Shorts'
  description: |
    日産を救った経営者カルロス・ゴーンは、逮捕・保釈の末、楽器ケースに隠れて日本を脱出しレバノンへ逃亡した。世界を驚かせた事件を30秒で解説します。

    #Shorts #ゴーン #日産 #事件 #国外逃亡
  hook_caption: 楽器ケースで日本を脱出した会長
  series_brand: ゴーン事件
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 大きな楽器ケースの中に、人が隠れていました。これは、ある経営者が、日本から脱出した夜の話です。
      caption: 楽器ケースに隠れて脱出した男
    - panel: p2
      text: カルロス・ゴーン。倒れかけた日産を立て直し、世界に名を轟かせた、カリスマ経営者でした。
      caption: 日産を救ったカリスマ経営者
    - panel: p3
      text: ところが2018年、彼は突然、金融商品取引法違反などの疑いで、東京で電撃逮捕されます。
      caption: 2018年、東京で電撃逮捕
    - panel: p4
      text: 長い勾留の後、保釈されますが、行動は厳しい監視下に。彼は、日本の司法に勝てないと、考えたのかもしれません。
      caption: 保釈、しかし厳しい監視下に
    - panel: p5
      text: そして年末、彼は大きな楽器ケースに隠れてプライベートジェットに乗り込み、引き渡し条約のない国、レバノンへ逃亡したんです。
      caption: 楽器ケースでレバノンへ逃亡
    - panel: p6
      text: レバノンで彼は、「私は逃げたのではない、不正な司法から逃れたのだ」と主張。世界一劇的な、経営者の逃亡劇でした。
      caption: 世界一劇的な経営者の逃亡劇
