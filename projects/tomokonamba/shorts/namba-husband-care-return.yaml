panels:
- id: p1
  prompt: '9:16 vertical anime/webtoon style illustration:

    A quiet hospital private room around 2012, soft natural daylight through

    tall windows. Tomoko Namba in her late 40s wearing casual clothes — a soft

    grey cardigan over a white blouse, no makeup, hair slightly down — sits on a

    chair beside a hospital bed, gently holding the hand of her sleeping husband

    (an older Japanese man with thinning hair, his face turned away to suggest

    privacy). Her face shows tender exhausted love, no tears, just composed

    devotion. The most private moment of a public CEO. No medical text visible.

    Character: {subject_adult}.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    June 2011, a formal DeNA press conference at a Tokyo hotel ballroom. Tomoko

    Namba in a tailored navy suit standing at a podium with a microphone, her

    face composed but visibly emotional, announcing her resignation as CEO. Many

    Japanese journalists in the foreground holding cameras with bright flash

    bursts illuminating the scene, others scribbling on notepads. The cold

    moment when she chose family over the top of a public company.

    Character: {subject_adult}.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    Around 2013, a quiet hospital corridor at evening, soft fluorescent

    lighting. Tomoko Namba in plain casual clothes — a soft sweater and dark

    trousers, no makeup, hair tied back — leans against a wall reading a

    smartphone screen, her face composed but tired. Faint reflections of the

    hospital ward visible through windows behind her. A paper coffee cup in her

    other hand. The dual life of a caregiver and a former CEO. No readable

    text.

    Character: {subject_adult}.

    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

    Around 2015, a warm Tokyo home living room in the afternoon. Tomoko Namba

    sits on a sofa next to her seated husband (older Japanese man wearing a

    light home cardigan, his face partially obscured by Namba''s shoulder for

    privacy), softly reading aloud from a hardcover book in her lap, a tray

    with tea on the low table. Soft natural light through large windows, a few

    indoor plants. The intimate atmosphere of long-term home care.

    Character: {subject_adult}.

    '
- id: p5
  prompt: '9:16 vertical anime/webtoon style illustration:

    Around 2017, a quiet morning in a Tokyo home living room with cool blue

    light through the windows. Tomoko Namba in plain dark clothes standing

    alone in front of an empty armchair that clearly belonged to someone now

    gone, a small framed photograph and a fresh flower on a side table. Her

    expression is composed, sad but resolute, eyes slightly red. The morning

    after grief becomes resolve. No readable text on the photograph.

    Character: {subject_adult}.

    '
- id: p6
  prompt: '9:16 vertical anime/webtoon style illustration:

    2017, a DeNA Tokyo headquarters town-hall stage. Tomoko Namba in a sharp

