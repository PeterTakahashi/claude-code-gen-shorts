    audience of seated young DeNA employees in casual office wear, her face

    showing a calm proud half-smile as she addresses them as the newly

    appointed chairwoman. Warm modern stage lighting, a clean minimalist

    backdrop. The return after exile. Mid shot, slightly low angle.

    Character: {subject_adult}.

    '
ja:
  title: '夫の看病で社長を辞めた女性CEO #Shorts'
  description: '2011年、上場企業の社長だった南場智子は、夫の闘病のため、社長を退任した。

    6年後、夫を看取り、彼女は会長として、DeNAに復帰した。


    #Shorts #南場智子 #DeNA #人物伝

    '
  hook_caption: 夫の看病で社長を辞めた女性CEO
  series_brand: 南場智子伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 上場企業の社長を、夫の看病のために、辞めた女性CEOがいます。
    caption: 上場企業社長を夫の看病で退任
  - panel: p2
    text: 2011年、横浜ベイスターズを買収した、まさにその数ヶ月後、彼女は突然、社長退任を発表しました。
    caption: 2011年、ベイスターズ買収直後に退任
  - panel: p3
    text: 理由は、夫の重い病気。仕事の絶頂で、家族を、選んだんです。
    caption: 仕事の絶頂で家族を選択
  - panel: p4
    text: それから6年間、彼女は経営の表舞台から、ほぼ完全に、姿を消しました。
    caption: 6年間、経営の表舞台から消える
  - panel: p5
    text: そして、2017年、夫を看取った後、彼女は、DeNAの代表取締役会長として、復帰します。
    caption: 2017年、会長として復帰
  - panel: p6
    text: 「家族のために辞めた経営者」が、再び戻ってきた、日本では稀な物語だったんです。
    caption: 家族のために辞めた経営者の帰還
en:
  title: 'Why This Top CEO Vanished for 6 Years #Shorts'
  description: 'In 2011, DeNA CEO Tomoko Namba resigned at the peak of her career to care for her ailing husband. Six years later, she made an incredible comeback.


    #Shorts #TomokoNamba #DeNA #Leadership #WomenInBusiness'
  hook_caption: She was a top CEO. Then she vanished for 6 years.
  series_brand: The Tomoko Namba Story
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In 2011, at the absolute peak of her career, CEO Tomoko Namba suddenly stepped down from the company she founded.
    caption: A Shock Resignation
  - panel: p3
    text: The reason wasn't a business failure. Her husband was battling a serious illness, and she chose to be with him.
    caption: She Chose Family
  - panel: p4
    text: For the next six years, she completely disappeared from the corporate world to become his full-time caregiver.
    caption: 6 Years Away
  - panel: p5
    text: After he passed away in 2017, many wondered if her story in the business world was over.
    caption: An Uncertain Future
  - panel: p6
    text: But she made a historic comeback, returning to DeNA as Executive Chairperson, inspiring millions.
    caption: Her Historic Return
