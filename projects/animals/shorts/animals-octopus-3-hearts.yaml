ja:
  title: 'タコは心臓が3つ脳が9つの生き物だった #Shorts'
  description: 'タコは、心臓が3つ、脳が9つ、血液が青いという、地球で最も「異星人」に近い生き物。

    なぜ、これほど常識外れの体になったのか、進化の答えを30秒で解説します。


    #Shorts #動物雑学 #タコ #海洋生物 #進化

    '
  hook_caption: タコは心臓3つ脳9つの生き物
  series_brand: バルトゥーン動物雑学
  voice_speed: 1.4
  narration:
  - panel: p1
    text: タコは、心臓が3つ、脳が9つ、血液が青い——地球上で最も、異星人に近い生き物だ、という話を知っていますか?
    caption: タコは心臓3つ脳9つ血液青
  - panel: p2
    text: まず心臓は3つあって、2つはエラに血を送る専用、残り1つが全身用。理由は、青い銅ベースの血液が、酸素を運ぶ効率が悪いから、二重ポンプで補っているんです。
    caption: 心臓3つは青い血を補うため
  - panel: p3
    text: さらに脳は、中央に1つあるだけでなく、8本の腕それぞれに、小さな神経塊が独立して入っていて、合計で9つ。全身の神経の3分の2が、腕側にあると言われます。
    caption: 中央脳1つ+腕8つで合計9つ
  - panel: p4
    text: だから腕は、本体の指令を待たずに動けます。一本が瓶を開け、別の一本が獲物を掴み、また別の一本が周りを探る——同時並列で、勝手に仕事をするんです。
    caption: 腕は本体の指令なしで動く
  - panel: p5
    text: しかも皮膚自体に、光を感じる細胞があるから、色覚を持たないのに、周囲の色に体表を、瞬時に合わせられる。皮膚で「見て」いるとも、言える生き物です。
    caption: 皮膚で色を「見て」擬態する
  - panel: p6
    text: つまり、私たちが知っている「動物の設計図」を、ほぼ全部やり直したのが、タコという生命。地球で異星生命を探したいなら、まず海を、覗いた方が早いかもしれません。
    caption: 地球で最も異星人に近い生き物
en:
  title: 'This Animal Has 3 Hearts and 9 Brains #Shorts'
  description: 'The octopus is one of Earth''s most alien-like creatures, with 3 hearts, 9 brains, and blue blood.

    Here''s a 30-second look at how this incredible animal''s evolution went in a totally different direction.

    #Shorts #Octopus #AnimalFacts #MarineBiology #Evolution'
  hook_caption: 3 Hearts, 9 Brains, Blue Blood
  series_brand: BaruToon Animal Facts
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: The octopus is considered the closest thing we have to an alien on Earth.
    caption: Earth's Alien
  - panel: p2
    text: For starters, it has three hearts. Two pump blood to its gills, and a third circulates it for the rest of the body, all because its blue blood is inefficient at carrying oxygen.
    caption: Why 3 Hearts?
  - panel: p3
    text: 'It also has nine brains: one central brain, and a smaller, independent one in each of its eight arms.'
    caption: 9 Brains
  - panel: p4
    text: This means each arm can act on its own, solving problems like opening a jar while another arm is busy hunting for food.
    caption: Arms that 'think'
  - panel: p5
    text: On top of that, its skin has light-sensing cells. Even though octopuses are colorblind, they can perfectly camouflage because their skin can literally 'see'.
    caption: It 'sees' with its skin
  - panel: p6
    text: Basically, the octopus completely rewrote the rulebook for animal life. If you're looking for aliens, you might just find them in our oceans.
    caption: The Alien Below
