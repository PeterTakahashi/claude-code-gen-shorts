ja:
  title: '深海魚の95%が口の中に光る器官を持つ理由 #Shorts'
  description: '水深1000mを超える深海では、95%以上の魚が体のどこかに光る器官を持っている。

    なぜ、わざわざ「口の中」が光るのか、その狡猾な進化の答えを30秒で解説します。


    #Shorts #動物雑学 #深海魚 #生物発光 #進化

    '
  hook_caption: 深海魚の口が光る本当の理由
  series_brand: バルトゥーン動物雑学
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 深海魚の95%以上は、体のどこかが光る——しかも多くが、わざわざ口の中だけを光らせている、という事実を知っていますか?
    caption: 深海魚の95%が体のどこかで光る
  - panel: p2
    text: そもそも水深200mを超えると太陽光は届かないので、深海は基本的に、何も見えない真っ暗な世界。光は最強の道具になるんです。
    caption: 水深200m以下は光ゼロの世界
  - panel: p3
    text: そこで多くの深海魚は、発光バクテリアと共生したり、自前の化学反応で、青緑色の光を作る能力を獲得しました。これを生物発光、と呼びます。
    caption: 深海では生物発光が標準装備
  - panel: p4
    text: 面白いのは、光を「外向き」ではなく「口の中」に置く種が多いこと。これは小さな獲物が、暗闇の中の光に、思わず吸い寄せられる習性を、利用した罠なんです。
    caption: 口の中の光は獲物を呼ぶ罠
  - panel: p5
    text: しかも体表は逆に、光を吸収する真っ黒な皮膚で覆っているから、獲物から見ると、ただ口だけが、宙に浮いて光っているように見えます。
    caption: 体は黒く口だけが浮いて見える
  - panel: p6
    text: つまり深海の光は、希望でも道しるべでもなく、近づいたら最後の罠。あの暗闇では、光るものほど、信用してはいけないんです。
    caption: 深海では光るものほど危険
en:
  title: 'Why Deep Sea Monsters Glow From The Inside #Shorts'
  description: 'Over 95% of deep-sea creatures produce their own light. But for many predators, that light isn''t for seeing—it''s a deadly trap. Here''s how it works.

    #Shorts #DeepSea #MarineBiology #Bioluminescence #Ocean'
  hook_caption: The Deadliest Light in the Ocean
  series_brand: Baltoon Animal Facts
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: Way down in the deep ocean, sunlight vanishes below 200 meters, plunging the world into absolute darkness.
    caption: Total Darkness
  - panel: p1
    text: So, over 95% of the creatures here evolved to make their own light. But many have a terrifying secret...
    caption: Creatures of Light
  - panel: p4
    text: '...they only glow from *inside* their mouths. It''s not a lamp; it''s a lure.'
    caption: It's a Lure
  - panel: p5
    text: Their skin is often ultra-black to stay invisible, so smaller fish only see a mysterious light and swim right towards it.
    caption: Invisible Predators
  - panel: p6
    text: In the deep sea, a beautiful light isn't hope. It’s the last thing you'll ever see.
    caption: A Final Warning
