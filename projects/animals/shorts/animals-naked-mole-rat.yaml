ja:
  title: '老化しない哺乳類、ハダカデバネズミ #Shorts'
  description: 'アフリカの地下に、老化せず、ガンにもならず、30年以上生きる、不思議な哺乳類がいる。

    女王1匹を中心にアリのような社会を作る、ハダカデバネズミの生態を、30秒で解説します。


    #Shorts #動物雑学 #ハダカデバネズミ #進化 #長寿

    '
  hook_caption: 老化しない哺乳類
  series_brand: ハダカデバ
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 体長10センチの小さなネズミなのに、老化せず、ガンにもならず、30年以上生きる、地球上で唯一の哺乳類がいる、という話を知っていますか?
    caption: 老化せずガンにもならない哺乳類
  - panel: p2
    text: それがハダカデバネズミ。東アフリカの地下トンネルに、女王1匹を中心にした、300匹の群れで暮らします。アリやハチと同じ、真社会性の珍しい哺乳類なんです。
    caption: 真社会性の哺乳類、女王中心の群れ
  - panel: p3
    text: 同じ大きさのマウスは、わずか3年で寿命を迎えます。ところがハダカデバネズミは、その10倍の30年以上、しかも年齢に関係なく、死亡率がほぼ一定です。
    caption: マウスの10倍、30年以上生きる
  - panel: p4
    text: 理由の一つが、細胞の周りにある特殊な高分子ヒアルロン酸。細胞同士をぎゅっと締め付けて、ガン化そのものを、ほぼ起こさせない仕組みになっているんです。
    caption: 特殊ヒアルロン酸でガン化を阻止
  - panel: p5
    text: さらに地下の酸欠環境で生き残るため、酸素がゼロでも、果糖だけで脳を動かして、最大18分間も意識を保てます。哺乳類では、ほぼ唯一の能力です。
    caption: 酸素ゼロでも18分間生存できる
  - panel: p6
    text: つまり老化、ガン、酸欠、痛覚——他の哺乳類を苦しめる弱点を、ほぼ全部スキップした生き物。人間の長寿研究が、今も注目する理由が、ここにあります。
    caption: 長寿研究が注目する究極の哺乳類
en:
  title: 'This Animal Hacked Biology #Shorts'
  description: 'The naked mole-rat is virtually immune to aging and cancer, and can survive nearly 20 minutes without oxygen. Here''s a 30-second look at nature''s ultimate survivor.


    #Shorts #Biology #Animals #ScienceFacts #Longevity'
  hook_caption: The Animal That Hacked Biology
  series_brand: Naked Mole-Rat
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Meet the one mammal on Earth that barely ages, is almost immune to cancer, and lives for over 30 years.
    caption: Nature's Ultimate Survivor
  - panel: p2
    text: It's the naked mole-rat. They live in huge underground colonies, serving a single queen just like a hive of bees.
    caption: A Mammal Beehive
  - panel: p3
    text: A mouse of the same size lives for only 3 years. The naked mole-rat lives ten times longer, and its risk of death doesn't increase with age.
    caption: Lives 10x Longer
  - panel: p4
    text: One of their secrets? A special acid in their body physically stops cells from clumping together, making it nearly impossible for tumors to form.
    caption: Naturally Cancer-Proof
  - panel: p5
    text: They can also survive for 18 minutes with zero oxygen by switching their brain's fuel to fructose—a trick no other mammal has.
    caption: Survives Without Air
  - panel: p6
    text: Immunity to aging, cancer, and suffocation... It's no wonder scientists are studying this creature for the secrets to a longer human life.
    caption: The Key to Longevity?
