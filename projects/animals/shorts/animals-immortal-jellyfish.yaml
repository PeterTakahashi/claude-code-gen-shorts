ja:
  title: '老いると若返る不老不死のクラゲ、ベニクラゲ #Shorts'
  description: |
    老いると体を巻き戻し、子供の姿に若返って何度でもやり直す。寿命では死なない不老不死の生き物、ベニクラゲの正体を30秒で解説します。

    #Shorts #動物雑学 #ベニクラゲ #不老不死 #海洋生物
  hook_caption: 老いると若返る不老不死のクラゲ
  series_brand: 不老不死のクラゲ
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 老いると、子供に戻ってやり直す——そんな不老不死の生き物が、実在します。ベニクラゲです。
      caption: 不老不死の生き物、ベニクラゲ
    - panel: p2
      text: 普通の生き物は、成長したら老いて死ぬ。ところがベニクラゲは、老いたり傷ついたりすると、体を一度ゼリー状に戻すんです。
      caption: 老いると体をゼリー状に戻す
    - panel: p3
      text: そしてそこから、子供の段階であるポリプへと逆戻りし、また一から成長を、やり直します。
      caption: 子供のポリプに逆戻りして再成長
    - panel: p4
      text: これは細胞が、別の種類の細胞へ作り変わる「分化転換」という現象。いわば、体の時間を巻き戻しているんです。
      caption: 細胞が時間を巻き戻す「分化転換」
    - panel: p5
      text: 理論上、この若返りは何度でも繰り返せる。だからベニクラゲは、寿命では死なない生き物だと言われます。
      caption: 寿命では死なない生き物
    - panel: p6
      text: 食べられさえしなければ、永遠に生き続ける。不老不死の鍵は、海の小さなクラゲが、すでに持っていたのかもしれません。
      caption: 不老不死の鍵は海の中にあった
