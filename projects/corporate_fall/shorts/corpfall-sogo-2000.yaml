ja:
  title: 'そごう、1兆8千億円の借金で消えた百貨店 #Shorts'
  description: |
    かつて日本一の店舗網を誇った百貨店そごうが、1兆8700億円もの負債を抱えて倒れた。バブルが生んだ巨人の崩壊を30秒で解説します。

    #Shorts #倒産 #そごう #バブル崩壊 #経済
  hook_caption: 1.8兆円で消えた百貨店そごう
  series_brand: そごう倒産
  voice_speed: 1.4
  narration:
    - panel: p1
      text: かつて日本一の店舗網を誇った百貨店そごうが、1兆8千億円もの借金を抱えて倒れた、という話です。
      caption: 1.8兆円の借金で倒れたそごう
    - panel: p2
      text: バブルの時代、そごうは強気の出店を続け、全国に巨大な店舗網を築きました。土地は値上がりし続ける、と信じていたからです。
      caption: バブル期に強気の全国出店
    - panel: p3
      text: ところがバブルが弾けると、買い込んだ土地は、ただの重い借金に変わります。負債は雪だるま式に、膨らみました。
      caption: 土地が一転、巨額の借金に
    - panel: p4
      text: そして2000年、そごうは民事再生法を申請。負債総額は、約1兆8700億円。流通業として、戦後最大級の倒産でした。
      caption: 2000年、負債1兆8700億円で倒産
    - panel: p5
      text: 1万人を超える従業員と、長年通った客を残し、店の看板は、次々と下ろされていきました。
      caption: 1万人超の従業員を残し閉店
    - panel: p6
      text: 大きすぎて潰れない、はずだった。そごうの崩壊は、その神話が幻だと証明した、バブルの墓標でした。
      caption: 「大きすぎて潰れない」神話の崩壊
