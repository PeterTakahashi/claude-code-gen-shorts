ja:
  title: 'シャープが台湾Foxconnに買われた日 #Shorts'
  description: '10年前の2016年、創業104年の大阪の電機メーカー、シャープが、台湾のFoxconnに3500億円で買収された。

    日本の電機大手が、初めて外資の傘下に入った歴史的事件を、30秒で振り返ります。


    #Shorts #倒産 #シャープ #Foxconn #日本企業

    '
  hook_caption: シャープ104年が外資に
  series_brand: Sharp買収
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 10年前の2016年、創業104年のシャープが、台湾のFoxconnに買収された、衝撃的な日を覚えていますか?日本の電機大手が、初めて外資の傘下に入った瞬間でした。
    caption: 2016年、シャープが台湾に買われた
  - panel: p2
    text: シャープの始まりは、1912年の大阪。創業者の早川徳次が、シャープペンシルを発明し、後にテレビや太陽電池で、日本を代表するメーカーへと成長したんです。
    caption: 1912年、大阪のシャープペンから始まる
  - panel: p3
    text: ところが2010年代、液晶への巨額投資が裏目に出て、2013年から2年で5450億円の赤字。100年企業の屋台骨が、一気に揺らぎました。
    caption: 液晶投資失敗で2年で5450億赤字
  - panel: p4
    text: 救済に手を挙げたのが、台湾のFoxconnでした。創業者テリー・ゴウは、当時のシャープ社長 高橋興三と握手し、3500億円で経営権を取得します。
    caption: テリー・ゴウが3500億円で買収
  - panel: p5
    text: 出資比率はおよそ66%。日本の電機大手が、外資の支配下に入るのは、これが初めて。日本のものづくりの誇りが、揺らいだ瞬間でした。
    caption: 66%出資、日本電機大手初の外資傘下
  - panel: p6
    text: それから10年。シャープブランドは残ったものの、経営の主導権は今も台湾側。104年続いた、日本の電機の象徴は、別の国の旗の下で、生きています。
    caption: 104年の象徴、今も台湾旗の下
en:
  title: 'How Japan Lost Control of Sharp #Shorts'
  description: 'In 2016, the iconic 104-year-old Japanese company Sharp was acquired by Taiwan''s Foxconn in a landmark deal. This is the 30-second story of how a national champion fell into foreign hands.


    #Shorts #History #Business #Sharp #Foxconn'
  hook_caption: A 104-Year-Old Giant... SOLD.
  series_brand: The Sharp Takeover
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: 'In 2016, a shockwave hit Japan’s tech industry: the 104-year-old giant, Sharp, had just been sold to Taiwan''s Foxconn.'
    caption: A Japanese Giant Falls
  - panel: p2
    text: The company started in 1912 with the invention of the 'Ever-Sharp Mechanical Pencil,' growing into a global powerhouse of electronics.
    caption: From Pencils to Powerhouse
  - panel: p3
    text: But a disastrously expensive bet on LCD screens brought the company to its knees, losing over 5 billion dollars in just two years.
    caption: A $5 Billion Mistake
  - panel: p4
    text: Stepping in with a lifeline was Taiwanese manufacturing giant, Foxconn, led by its legendary founder, Terry Gou.
    caption: The Rescue... or Takeover?
  - panel: p5
    text: The price was 3.5 billion dollars for a 66% controlling stake—a first for a major Japanese electronics brand.
    caption: $3.5 Billion for 66%
  - panel: p6
    text: Today, the Sharp brand lives on, but its destiny is controlled from Taiwan, a symbol of Japanese innovation now under a different flag.
    caption: Under a New Flag
