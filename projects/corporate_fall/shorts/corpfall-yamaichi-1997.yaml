ja:
  title: '100年続いた山一證券が一晩で消えた日 #Shorts'
  description: '1997年11月、創業100年の名門証券会社が、たった一晩で自主廃業を発表した。

    社長の涙の謝罪会見が、平成不況の象徴として、今も語り継がれる事件を30秒で解説します。


    #Shorts #倒産 #山一證券 #平成不況 #日本企業

    '
  hook_caption: 山一證券が消えた夜
  series_brand: バルトゥーン倒産企業
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「社員は悪くありません!」——テレビの記者会見で、社長が泣き崩れた、29年前の1997年の事件を知っていますか?
    caption: 社長が泣き崩れた1997年の会見
  - panel: p2
    text: 当時の山一證券は、1897年創業の100年企業で、日本四大証券の一角。バブル期には、誰もが安泰だと信じる、超優良ブランドでした。
    caption: 創業100年の四大証券の一角
  - panel: p3
    text: ところが内部では、バブル崩壊後の巨額の含み損を、簿外に隠す不正、いわゆる「飛ばし」が、長年続いていたんです。表向きの黒字は、嘘でした。
    caption: 「飛ばし」で巨額損失を簿外隠し
  - panel: p4
    text: 1997年11月、隠しきれない損失が、約2600億円規模で発覚し、大蔵省に呼ばれた経営陣は、その夜、自主廃業を、決断します。
    caption: 1997年11月、自主廃業を決断
  - panel: p5
    text: 翌日の会見で、当時の社長は、責任を問う記者団を前に、社員は悪くありません、悪いのは我々経営陣です、と号泣しながら頭を下げました。
    caption: 「社員は悪くありません」と号泣
  - panel: p6
    text: そして100年続いた名門は、たった一晩で、消滅。約7500人の社員が職を失い、平成不況を象徴する、もっとも痛切な一夜として、今も語り継がれています。
    caption: 100年企業が一晩で消滅
en:
  title: 'How a 100-Year-Old Company Vanished Overnight #Shorts'
  description: 'In 1997, a 100-year-old financial giant collapsed overnight. This is the story of Yamaichi Securities'' dramatic end, marked by its president''s tearful public apology.


    #Shorts #History #Japan #Finance #Business'
  hook_caption: Why This CEO Cried On National TV
  series_brand: BarlToon Bankrupt Companies
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: At a packed press conference in 1997, a CEO broke down in tears, shouting "My employees are not to blame!"
    caption: CEO breaks down
  - panel: p2
    text: His company, Yamaichi Securities, was a 100-year-old giant, one of Japan's 'Big Four' financial firms. It was considered untouchable.
    caption: A financial giant
  - panel: p3
    text: But behind the scenes, the firm was hiding enormous losses from the burst of Japan's bubble economy. Their profits were a complete lie.
    caption: Hiding huge losses
  - panel: p4
    text: 'In November 1997, the truth finally came out: over $2.2 billion in secret debt. That night, they made a drastic decision: to shut down for good.'
    caption: The truth comes out
  - panel: p5
    text: In his now-famous speech, he pleaded with the public, "It is we, the management, who are at fault! I am begging you... please help my employees find new jobs."
    caption: A desperate plea
  - panel: p6
    text: Overnight, the century-old firm was gone. 7,500 people lost their jobs, and the event became a painful symbol of Japan's 'Lost Decade.'
    caption: 7,500 jobs lost
