ja:
  title: '78歳が1円で再建したJAL、稲盛和夫の2年 #Shorts'
  description: '16年前の2010年、JAL は会社更生法を申請し、戦後最大の倒産企業に、なりました。

    そのJALを、当時78歳の京セラ創業者・稲盛和夫が、報酬1円の会長として引き受け、わずか2年で、再上場まで導いたんです。


    #Shorts #JAL #稲盛和夫 #京セラ #企業再生

    '
  hook_caption: 78歳が1円で再建した話
  series_brand: JAL再建
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 16年前の2010年、戦後最大の倒産から日本航空 JAL を救ったのは、武勇伝ある経営者ではなく、当時78歳の、引退済みの一人の老人でした。彼の報酬は、年俸ゼロではなく、年「1円」だったんです。
    caption: 78歳・年俸1円の会長
  - panel: p2
    text: 2010年1月19日、JAL は会社更生法を申請しました。負債総額は約2兆3,000億円。日本中の空港で、JAL機の運航停止リスクと、従業員4万人の雇用問題が、現実の影として、迫っていたんです。
    caption: 負債2兆3,000億、従業員4万人
  - panel: p3
    text: 政府がJALの会長就任を打診したのは、京セラとKDDIを一代で築いた、当時78歳の稲盛和夫でした。彼は航空業界の経験がなかったので、最初は固辞しましたが、「公益のため」という一点で、引き受けます。
    caption: 京セラ創業者、公益のため就任
  - panel: p4
    text: 稲盛は、会長報酬を、年「1円」に設定しました。そして2010年1月の更生法申請から、わずか2年8ヶ月後の2012年9月、JAL は東証一部に、再上場します。これは世界の航空再生史でも、異例のスピードでした。
    caption: 2年8ヶ月で再上場、報酬1円
  - panel: p5
    text: 彼が現場に持ち込んだのは、最新の経営理論ではなく、京セラ哲学を航空に翻訳した「JALフィロソフィ」という、薄い一冊でした。パイロットも整備士も客室乗務員も、まず「人として何が正しいか」から、教え直されたんです。
    caption: JALフィロソフィ、人として正しいか
  - panel: p6
    text: 78歳の老人が、報酬1円で、たった2年で国営級の航空会社を蘇らせた話は、日本の経営史に、静かに刻まれています。それは技術ではなく、私心を捨てた一人の人間の、覚悟の物語でした。
    caption: 私心を捨てた、覚悟の物語
en:
  title: 'How a 78-Year-Old Saved an Airline for a ¥1 Salary #Shorts'
  description: 'In 2010, Japan Airlines filed for one of the largest bankruptcies in Japanese history. The government asked 78-year-old Kazuo Inamori, founder of Kyocera, to save it. He did it for a salary
    of just ¥1, achieving a record-breaking turnaround in under 3 years.


    #Shorts #Business #Leadership #Japan #JAL'
  hook_caption: He Saved An Airline For 1 Cent
  series_brand: The JAL Turnaround
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: In 2010, Japan Airlines was in freefall, declaring one of the biggest bankruptcies in the country's history.
    caption: A National Crisis
  - panel: p3
    text: 'The government begged one man to come out of retirement and save it: 78-year-old Kazuo Inamori, the legendary founder of Kyocera.'
    caption: An Unlikely Savior
  - panel: p1
    text: With zero airline experience, he initially refused. But he eventually accepted the impossible job...
    caption: The Impossible Job
  - panel: p6
    text: '...on one condition: his annual salary would be just one yen. Essentially, he''d work for free.'
    caption: 'Salary: ¥1'
  - panel: p5
    text: He didn't bring complex spreadsheets. He brought a simple philosophy he taught to every employee, from pilots to cabin crew.
    caption: A Simple Philosophy
  - panel: p4
    text: And it worked. In just two years and eight months, JAL was profitable and relisted on the stock exchange—one of the fastest airline turnarounds ever.
    caption: Record-Breaking Comeback
