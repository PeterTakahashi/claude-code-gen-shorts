ja:
  title: 'VAIOがSonyから消えた日、PCの誇りを売った2014年 #Shorts'
  description: '12年前の2014年2月、Sony は自社のPCブランドである VAIO を、投資ファンドのJIPに、およそ50億円で売却しました。

    1996年に生まれた「日本のPCデザイン」の象徴は、誕生から18年で、Sonyの本社から、姿を消すことになります。


    #Shorts #VAIO #Sony #企業再編 #日本の家電

    '
  hook_caption: VAIOがSonyから消えた日
  series_brand: VAIO売却
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 12年前の2014年2月、Sony が一台のノートPCを、自社のロビーから、永遠に運び出した日が、あるんです。それは、VAIO ブランドが、Sony から切り離されることが、決まった日でした。
    caption: VAIOがSonyから運び出された日
  - panel: p2
    text: 2014年2月6日、Sony は東京本社で記者会見を開き、PC事業を、投資ファンドの日本産業パートナーズ JIP に、売却することを、正式に発表しました。会場の空気は、葬儀そのものだった、と、関係者は語っています。
    caption: 2014年2月6日、葬儀のような会見
  - panel: p3
    text: VAIO は、1996年に生まれた、Sony のノートPC ブランドです。紫がかった独特のシルバーと、レインボー光彩のロゴで、世界中のクリエイターから、Apple と並ぶ「日本のPC デザイン」として、愛されてきました。
    caption: 1996年生まれ、世界のクリエイター愛機
  - panel: p4
    text: 売却額は、およそ50億円。Sony の連結売上8兆円規模からすれば、わずかな額です。それでも、誕生から18年続いたPC事業を、本体から切り離さざるを得なかった現実が、平成日本の家電の凋落を、象徴していました。
    caption: 約50億円、18年の歴史に区切り
  - panel: p5
    text: 売却が決まった夜、VAIO の設計を担当してきた現場のエンジニアたちは、自分たちが描いた試作機から、Sony のロゴシールを、自らの手で、一枚ずつ、剥がしていったんです。彼らの図面は残り、本社のロゴだけが、消えていきました。
    caption: 自らの手でSonyロゴを剥がす夜
  - panel: p6
    text: VAIO は今も、長野県安曇野の工場で、製造を続けています。ただ、その背中から Sony のロゴが消えた2014年の日は、日本の家電が、世界の頂点から静かに降りていった象徴として、業界の記憶に、刻まれています。
    caption: 頂点から静かに降りた家電の象徴
en:
  title: 'The Day Sony Killed Its Most Iconic Laptop #Shorts'
  description: 'In February 2014, Sony sold its legendary VAIO PC brand for a mere ¥5 billion. It was a move that symbolized the end of an era for Japanese tech dominance.


    #Shorts #Sony #VAIO #TechHistory #Business'
  hook_caption: Why Sony Killed Its Most Iconic PC
  series_brand: The VAIO Sale
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In February 2014, Sony held a press conference that insiders said felt 'like a funeral'.
    caption: A somber announcement
  - panel: p3
    text: 'The news: they were selling their legendary VAIO PC brand, an icon of Japanese design once seen as Apple''s rival.'
    caption: An icon sold off
  - panel: p4
    text: The entire division was sold to an investment fund for just 5 billion yen, ending an 18-year history inside Sony.
    caption: Sold for just ¥5B
  - panel: p5
    text: That night, the engineers who built VAIO had to peel the Sony logos off their own prototype machines with their own hands.
    caption: Erasing the name
  - panel: p6
    text: The VAIO brand still exists, but that day marked a turning point—the moment Japan's legendary electronics industry quietly stepped down from the world stage.
    caption: End of an era
