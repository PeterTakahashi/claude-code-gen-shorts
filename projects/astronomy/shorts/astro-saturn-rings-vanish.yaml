ja:
  title: '土星の輪は、いま消えつつあるという話 #Shorts'
  description: |
    太陽系で最も美しい土星の輪。実はその輪が、少しずつ土星本体へと「雨」のように降り注ぎ、消えつつあることが分かっている。私たちは、輪のある土星を見られる幸運な時代に生きている。30秒で解説します。

    #Shorts #宇宙 #土星 #宇宙の雑学 #雑学
  hook_caption: 土星の輪は、いま消えつつある
  series_brand: 宇宙の今
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 太陽系で最も美しいと言われる、土星の輪。しかしこの輪が、いま少しずつ消えつつあることを、知っていますか。
      caption: 美しい土星の輪が消えつつある
    - panel: p2
      text: 輪の正体は、無数の氷や岩のかけらです。それらが土星の周りを回り、光を反射して、あの輝きを生んでいます。
      caption: 輪の正体は無数の氷と岩のかけら
    - panel: p3
      text: ところがその氷が、土星の重力と磁場に引かれ、雨のように本体へ降り注いでいるんです。輪は、少しずつ削られています。
      caption: 氷が雨のように土星へ降り注いでいる
    - panel: p4
      text: このペースでいくと、輪はおよそ1億年ほどで、ほとんど消えてしまうと考えられています。宇宙の時間では、ほんの一瞬です。
      caption: 約1億年で輪はほぼ消えるとされる
    - panel: p5
      text: 遠い未来、土星は輪を失い、ただの球になっているかもしれません。今の姿は、永遠ではないんです。
      caption: 遠い未来、土星は輪を失うかもしれない
    - panel: p6
      text: つまり私たちは、輪のある土星を見られる、幸運な時代に生きています。当たり前の絶景も、宇宙では一瞬のきらめきなのです。
      caption: 当たり前の絶景も宇宙では一瞬のきらめき
