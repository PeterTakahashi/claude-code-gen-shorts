ja:
  title: '宇宙の99.9999%は何もないという話 #Shorts'
  description: 'あなたの体も、太陽系も、銀河の間も、ほとんどが「何もない空間」でできている。

    現代天文学が示す、宇宙の本当のスケール感を、30秒で解説します。


    #Shorts #宇宙 #天文学 #スケール #物理

    '
  hook_caption: 宇宙の99.9999%は空っぽ
  series_brand: バルトゥーン宇宙
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 実は、宇宙の99.9999%以上は、星も銀河もない、ただの空っぽの空間でできている——という話、知っていますか?
    caption: 宇宙の99.9999%は何もない
  - panel: p2
    text: そもそも、あなたの体を作る原子からして、ほぼ空洞です。原子核は東京ドームの中の、ビー玉一個ほどの大きさなので、残り全部はスカスカなんです。
    caption: 原子の99.9999%は空洞
  - panel: p3
    text: スケールを広げても、状況は変わりません。太陽と地球の間は、約1億5千万キロあるから、太陽系の中身も、ほとんどが真空、ということになります。
    caption: 太陽と地球の間も真空ばかり
  - panel: p4
    text: さらに銀河と銀河の間は、もっと極端で、私たちの天の川とAndromedaの間には、250万光年の、ほぼ何もない空間が広がっています。
    caption: 銀河の間は250万光年の空白
  - panel: p5
    text: 観測可能な宇宙全体で見ても、銀河は薄い網目のような、宇宙の大規模構造に沿って並ぶだけなので、それ以外は全部、ただの巨大な空洞です。
    caption: 宇宙全体は網目状の銀河と空洞
  - panel: p6
    text: つまり、私たちの体も、星も、銀河も、宇宙のほぼ全部が、何もない、で出来ている。あなたという存在自体が、ほぼ虚無で構成されているんです。
    caption: あなた自身もほぼ虚無で出来ている
en:
  title: 'Why 99.9999% of Everything is... Nothing #Shorts'
  description: 'From the atoms in your body to the vast voids between galaxies, the universe is overwhelmingly empty. Here''s a 30-second tour of the true scale of reality.

    #Shorts #Space #Astronomy #Science #Physics'
  hook_caption: Almost Everything Is... Nothing
  series_brand: Toon Cosmos
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Did you know that over 99.9999% of the universe is made of absolutely nothing?
    caption: 99.9999% Nothing
  - panel: p2
    text: It starts with the atoms in your body. If an atom were the size of a football stadium, its nucleus would be just a tiny marble.
    caption: Atoms are mostly empty
  - panel: p3
    text: The same is true on a larger scale. The 150 million kilometers between the Sun and Earth? Almost entirely empty vacuum.
    caption: 'Solar system: empty'
  - panel: p4
    text: 'And the gap between galaxies is even more extreme: 2.5 million light-years of empty void separates us from Andromeda.'
    caption: Intergalactic void
  - panel: p5
    text: On the largest scale, galaxies just form a thin cosmic web. Everything in between is one colossal, empty void.
    caption: The Cosmic Void
  - panel: p6
    text: Which means your body, the stars, the Earth... your very existence is almost entirely empty space.
    caption: You are empty space
