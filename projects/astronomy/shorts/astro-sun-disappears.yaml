ja:
  title: '太陽が突然消えたら地球はどうなる #Shorts'
  description: 'もし、今この瞬間に太陽が消えたら——地球は何分後に気づき、何年後に凍りつくのか。

    物理学が描く、人類絶滅シナリオを、30秒で解説します。


    #Shorts #宇宙 #太陽 #物理 #thoughtexperiment

    '
  hook_caption: 太陽が消えたら地球は
  series_brand: 太陽消失
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 今この瞬間、太陽が突然消えたら、地球はどうなると思いますか?答えは、想像よりずっと、奇妙です。
    caption: 太陽が消えたら何が起こる?
  - panel: p2
    text: まず、空が真っ暗になるのは、8分20秒後です。太陽の光が地球に届くのに、ちょうどそれだけ、時間がかかるので、消えた事実すら、しばらく気づきません。
    caption: 8分20秒後、空が真っ暗になる
  - panel: p3
    text: 同時に、太陽の重力も消えるので、地球は公転を止めて、最後の速度のまま秒速30キロで、宇宙の彼方へ、まっすぐ飛んでいきます。
    caption: 公転停止、秒速30キロで直進
  - panel: p4
    text: 気温は、1週間で氷点下17度、1年で氷点下100度まで急降下します。海も、表面から凍り始め、数万年で、岩盤の底まで完全に凍結します。
    caption: 1週間で-17度、1年で-100度
  - panel: p5
    text: 人類は、地熱発電のある火山地帯で、数十年は生き延びる可能性がありますが、最終的に地球は、氷漬けの暗黒の惑星として、銀河を漂うだけになります。
    caption: 地球は氷の惑星として銀河を漂う
  - panel: p6
    text: つまり、太陽が消えてから人類絶滅まで、たった1年。光と重力という、当たり前の2つに、私たちの生命は、すべてを支えられているんです。
    caption: 太陽が消えれば1年で絶滅
en:
  title: 'What If The Sun Disappeared Right Now? #Shorts'
  description: 'If the Sun vanished this very second, how long would we have? Physics reveals the terrifying timeline for humanity''s extinction.


    #Shorts #Space #Sun #Physics #ThoughtExperiment'
  hook_caption: The Sun just vanished. Here's what's next.
  series_brand: When the Sun Vanishes
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: What if the sun vanished, right this second? The answer is stranger than you'd think.
    caption: What if the sun vanished?
  - panel: p2
    text: For 8 minutes and 20 seconds, we wouldn't even know. That's how long the last ray of sunlight takes to reach us before the sky goes instantly dark.
    caption: 8 minutes of ignorance
  - panel: p3
    text: At that same moment, the Sun's gravity would disappear. Earth would stop orbiting and fly off in a straight line, hurtling into deep space at 30 kilometers per second.
    caption: Earth goes rogue
  - panel: p4
    text: Within a week, the planet's average temperature would drop below freezing. After a year, it'd be a deadly minus 100 degrees Celsius.
    caption: A planet on ice
  - panel: p5
    text: A few humans might survive for decades near geothermal vents, but our planet would become a frozen rogue world, drifting silently through the galaxy.
    caption: The long, cold dark
  - panel: p6
    text: 'From the moment the sun vanishes, humanity''s extinction would take less than a year. Our entire existence relies on two things we take for granted: its light, and its gravity.'
    caption: Extinction in under 1 year
