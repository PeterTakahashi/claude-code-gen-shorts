ja:
  title: '1400年続いた世界最古企業、金剛組の宮大工 #Shorts'
  description: '日本の大阪に、聖徳太子の時代から続く、世界最古の現存企業がある。

    578年創業、金剛組。40世代以上にわたり、寺社建築の宮大工技術だけで、1400年以上を生き延びた、ある同族企業の物語を紹介します。


    #Shorts #職人 #老舗 #金剛組 #日本文化

    '
  hook_caption: 1400年続いた世界最古企業
  series_brand: バルトゥーン職人老舗
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 大阪に、世界で最も古い、現存企業があるのを知っていますか?創業は、なんと1448年前の578年。聖徳太子の時代です。
    caption: 創業1448年前、578年
  - panel: p2
    text: 始まりは、聖徳太子が四天王寺を建立するため、百済から3人の宮大工を招いたこと。その一人、金剛重光が初代となり、金剛組が誕生しました。
    caption: 始まりは百済から招かれた3人の宮大工
  - panel: p3
    text: 以来、応仁の乱、戦国、明治維新、第二次世界大戦と、日本史のすべての激動を、40世代以上にわたって、生き延びてきました。
    caption: 40世代以上、日本史を生き延びた
  - panel: p4
    text: 強みは、釘を一本も使わずに巨大な木組みを組み上げる、宮大工の技。設計図ではなく、棟梁から弟子へ、口伝と手の感覚で、受け継がれてきました。
    caption: 釘を使わない木組みを口伝で継承
  - panel: p5
    text: ただし2006年、現代の建設不況で経営は限界に達し、20年前、ついに高松建設の傘下に入りました。それでも社名と、技術は、残されたんです。
    caption: 20年前、高松建設の傘下に入る
  - panel: p6
    text: そして今も、金剛組の宮大工は、四天王寺の屋根の上で、千年前と同じ道具を握っています。1400年続く技は、今日も生きています。
    caption: 1400年続く技、今も健在
en:
  title: 'This Company Has Been in Business for 1,400 Years #Shorts'
  description: 'In Osaka, Japan, lies Kongo Gumi, the world''s oldest continuously operating company, founded in 578 AD.

    For over 40 generations, this family of master carpenters has built and maintained Japan''s most sacred temples. This is their story.


    #Shorts #History #Craftsmanship #Japan #KongoGumi'
  hook_caption: This Company Was Founded in 578 AD
  series_brand: Artisan Legacy
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In Osaka, Japan, you'll find the world's oldest continuously operating company, founded way back in the year 578.
    caption: Founded in 578 AD
  - panel: p2
    text: Its story began when Prince Shotoku invited master builders from Korea to construct the magnificent Shitennoji Temple, establishing the company Kongo Gumi.
    caption: A Royal Commission
  - panel: p3
    text: For over 1,400 years and 40 generations, the family business has survived wars, crises, and the fall of empires.
    caption: 40 Generations of Survival
  - panel: p4
    text: Their secret is the art of miyadaiku—crafting massive temples using complex wooden joints, with no nails at all.
    caption: No Nails, Only Skill
  - panel: p5
    text: But by 2006, the ancient firm faced bankruptcy. It was absorbed by a larger corporation, seemingly ending its family-run history.
    caption: The End of an Era?
  - panel: p6
    text: Yet the craft endured. Today, Kongo Gumi’s masters still maintain Japan’s temples, their 14-century-old skills alive and well.
    caption: The Craft Survives
