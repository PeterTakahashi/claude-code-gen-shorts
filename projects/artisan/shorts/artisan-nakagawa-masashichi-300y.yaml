ja:
  title: '奈良300年の麻職人、中川政七商店 #Shorts'
  description: '奈良に、310年続いた1716年創業の老舗があるのを、ご存じですか?

    伝統の麻織物から現代のライフスタイルブランドへ、14代続く中川政七商店の物語を、30秒で紹介します。


    #Shorts #職人 #老舗 #奈良 #中川政七商店

    '
  hook_caption: 奈良300年の麻職人
  series_brand: 中川政七商店
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 奈良に、310年前の1716年から続く、麻織物の老舗があるのを、ご存じですか?その名は、中川政七商店です。
    caption: 奈良の中川政七商店、創業1716年
  - panel: p2
    text: 創業者の中屋喜兵衛は、奈良晒という、奈良の伝統的な手織麻を、商う小さな店を、興福寺の門前で開いたんです。江戸幕府の御用達商人でもありました。
    caption: 江戸時代、奈良晒の御用達商人として開業
  - panel: p3
    text: 中川政七商店は、創業から310年、14代にわたって、奈良晒の家業を、絶やさず受け継いできました。明治・大正・昭和の動乱を、家業として乗り越えたんです。
    caption: 14代続いた奈良晒の家業
  - panel: p4
    text: 13代目から、当主のすべては、政七という襲名を、継いでいます。現当主の14代目政七は、慶應SFCを卒業後の2008年に、家業を継承した、若き経営者です。
    caption: 14代目政七、慶應SFC卒の若き当主
  - panel: p5
    text: 14代目が、日本の工芸を元気にする、という経営理念を掲げたので、中川政七商店は、奈良の老舗から、全国60店舗を展開する、現代ライフスタイル企業へと、変貌しました。
    caption: 日本の工芸を元気にする経営理念
  - panel: p6
    text: 麻織物から始まった奈良の家業が、現代日本のライフスタイル文化を、再定義し続けています。家訓を変えず、しかし時代に、変わり続ける——それが、310年続いた理由です。
    caption: 310年続いた、変わらず、変わり続ける
en:
  title: 'This Family Business is Over 300 Years Old #Shorts'
  description: 'Founded in 1716, Nakagawa Masashichi Shoten has transformed from a traditional linen weaver in Nara into a modern Japanese lifestyle brand. Here''s the 300-year story of how 14 generations
    kept their craft alive.


    #Shorts #Japan #Craftsmanship #History #Business'
  hook_caption: They've run the same business since 1716
  series_brand: Nakagawa Masashichi Shoten
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In Nara, Japan, one family has been passing down the same craft since 1716.
    caption: Founded in 1716
  - panel: p2
    text: It began as a small shop selling traditional hand-woven linen, even becoming an official purveyor to the Shogun's government.
    caption: Serving the Shogun
  - panel: p3
    text: For 14 generations, the family business has survived wars, disasters, and massive social change.
    caption: 14 Generations
  - panel: p4
    text: But in 2008, a young, 14th-generation heir took the reins with a bold new vision.
    caption: A New Vision
  - panel: p5
    text: He set out to 'energize Japanese crafts,' transforming the company into a modern lifestyle brand with stores all across Japan.
    caption: Modern Lifestyle Brand
  - panel: p6
    text: Their secret to lasting over 300 years? Honor tradition, but never stop changing with the times.
    caption: The Secret to 300 Years
