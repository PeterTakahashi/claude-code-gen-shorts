ja:
  title: '日本最古の酒蔵、平安時代から続く須藤本家 #Shorts'
  description: |
    茨城県にある須藤本家は、平安時代から800年以上、55代にわたって日本酒を造り続けてきた、日本最古とされる酒蔵。その秘密は、酒そのものより「森を守ること」にありました。30秒で解説します。

    #Shorts #老舗 #須藤本家 #日本酒 #雑学
  hook_caption: 平安時代から続く日本最古の酒蔵
  series_brand: 老舗の流儀
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 茨城県に、日本でいちばん古いと言われる酒蔵があります。須藤本家。その歴史は、800年以上にもなります。
      caption: 茨城県にある日本最古とされる酒蔵
    - panel: p2
      text: 創業は、なんと平安時代。武士が台頭する、はるか昔から、この蔵は日本酒を造り続けてきました。
      caption: 創業は武士が台頭する前の平安時代
    - panel: p3
      text: 長く続いた秘密は、酒蔵を囲む森にあります。木々の根が、酒造りに欠かせない、きれいな地下水を生み出しているんです。
      caption: 蔵を囲む森が酒造りの水を生んでいる
    - panel: p4
      text: だから須藤本家は、55代にわたって、酒造りの技と同じくらい、この森を大切に守り抜いてきました。
      caption: 55代にわたり技とともに森を守ってきた
    - panel: p5
      text: 当主は言います。森を切れば、水が濁り、酒は終わる、と。彼らが受け継いでいるのは、レシピだけではないんです。
      caption: 森を切れば水が濁り酒は終わるという
    - panel: p6
      text: 守るべきは、目の前の商品ではなく、それを生む環境そのもの。800年続く蔵は、いちばん大事なものを、知っているのです。
      caption: 800年続く蔵は何を守るべきか知っている
