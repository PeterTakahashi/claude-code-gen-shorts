ja:
  title: '京都の老舗虎屋、500年続いた家訓 #Shorts'
  description: '京都の老舗、虎屋。創業はおよそ500年前の1526年。17代にわたり、皇室御用達の和菓子を作り続けてきた。

    規模より品質を守る家訓を貫いた、京都の老舗の物語を、30秒で紹介します。


    #Shorts #職人 #老舗 #虎屋 #和菓子

    '
  hook_caption: 京都虎屋500年の家訓
  series_brand: 虎屋500年
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 京都に、500年前の1526年から続く、和菓子の老舗があるのを知っていますか?その名は、虎屋。室町時代の終わりからの、現存する家業です。
    caption: 京都の虎屋、創業1526年
  - panel: p2
    text: 虎屋は、後陽成天皇の時代から、皇室御用達の和菓子司として、京都御所のすぐ近くで暖簾を掲げました。明治の東京遷都とともに、本拠を東京赤坂に移しています。
    caption: 皇室御用達、明治に赤坂へ
  - panel: p3
    text: 創業から今日まで、17代の当主が、500年の家業を、絶やさず受け継いできました。応仁の乱の直後から続く、世界でも稀な、同族経営の和菓子家です。
    caption: 17代続く同族経営の和菓子家
  - panel: p4
    text: 17代目の黒川光博は、職人たちに「規模を追わず、味を守れ」と説き続けました。安易な工場大量生産を、決してしない、というのが、虎屋の不文律です。
    caption: 17代目当主 黒川光博の信条
  - panel: p5
    text: 家訓は「不易流行」。変えてはならない本質を守りつつ、時代に合わせた一手だけは、躊躇わずに打つ。だからこそ、500年もの間、品質が、ぶれませんでした。
    caption: 家訓は「不易流行」
  - panel: p6
    text: そして今日も、虎屋の職人たちは、500年前と同じ手仕事で、一粒の羊羹を、仕上げています。日本の老舗が守ってきたのは、味だけではなく、流儀そのものです。
    caption: 500年続く手仕事、今日も健在
en:
  title: 'This Family''s Secret to a 500-Year-Old Business #Shorts'
  description: 'Since 1526, the same family has run the legendary sweet shop Toraya, serving Emperors for generations. This is the simple rule that kept their 500-year legacy alive.

    #Shorts #Japan #History #Business #Craftsmanship'
  hook_caption: How a Family Business Lasted 500 Years
  series_brand: 'Toraya: 500 Years'
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In Kyoto, Japan, a family business called Toraya began in 1526, during the age of the samurai.
    caption: Founded in 1526
  - panel: p3
    text: For nearly 500 years, it's been passed down through 17 generations of the same family.
    caption: 17 generations
  - panel: p1
    text: For centuries, they were the official confectioners to the Emperor himself.
    caption: By Imperial Appointment
  - panel: p4
    text: 'Their secret? A simple family rule: ''Pursue quality, not size.'''
    caption: Quality over quantity
  - panel: p5
    text: This means honoring tradition while embracing change, never sacrificing their craft for mass production.
    caption: Tradition meets modern
  - panel: p6
    text: To this day, every single sweet is crafted by hand—a 500-year-old tradition you can still taste.
    caption: Still made by hand
