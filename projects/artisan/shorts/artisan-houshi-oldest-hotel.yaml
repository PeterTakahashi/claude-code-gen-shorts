ja:
  title: '1300年続く世界最古の宿、石川県の法師 #Shorts'
  description: |
    石川県にある温泉旅館「法師」は、今から約1300年前に創業し、46代にわたって受け継がれてきた。かつてギネスに世界最古の宿として認定された老舗が、なぜ千年以上続けられたのかを30秒で解説します。

    #Shorts #老舗 #法師旅館 #日本の職人 #雑学
  hook_caption: 1300年続く世界最古の宿
  series_brand: 老舗の流儀
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 石川県に、世界でいちばん古いと言われる宿があります。その名は法師。創業から、なんと約1300年が経っています。
      caption: 石川県にある世界最古とされる宿「法師」
    - panel: p2
      text: 始まりは、今から約1300年前の718年。一人の僧侶が、山あいに湧く温泉のそばに、宿を開いたのが起源だと伝わります。
      caption: 約1300年前の718年に僧侶が開いた
    - panel: p3
      text: それから、武士の時代も、江戸の時代も、戦争の時代も越えて、宿は46代にわたり、途切れることなく受け継がれてきました。
      caption: 戦乱の時代を越え46代受け継がれた
    - panel: p4
      text: 続けられた理由は、派手な改革ではありません。温泉と、もてなしの心という芯を、頑なに変えずに守り続けたことにあります。
      caption: もてなしの芯を変えずに守り続けた
    - panel: p5
      text: しかし、千年以上の歴史は、当主にとって誇りであると同時に、決して途絶えさせられないという、重い覚悟でもあります。
      caption: 千年の歴史は誇りであり重い覚悟でもある
    - panel: p6
      text: 帝国がいくつも滅んだ時間を、宿は静かに生き延びてきた。あなたの仕事は、千年後に残っているでしょうか。
      caption: あなたの仕事は千年後に残っているだろうか
