  notes: 最終話として、イーロンの多岐にわたる事業が火星移住という単一の壮大な目標へと収束する様子を描く。彼の生涯の集大成でありながら、物語はまだ終わらないという希望的なクリフハンガーで締めくくることで、彼のビジョンが続く未来を暗示する。
