    location: カリフォルニア、アメリカ
    emotional_significance: 人生で最も深い悲しみと無力感。この喪失が、命の儚さと人類存続の重要性を私に刻み付けた。
    factual_certainty: certain
  - year: 2004
    age: 33
    event: 電気自動車のスタートアップ、テスラモーターズに筆頭株主として投資し、会長に就任。
    location: サンカルロス、アメリカ
    emotional_significance: 持続可能なエネルギーへの移行という、もう一つの大きな挑戦が始まった。
    factual_certainty: certain
  - year: 2006
    age: 35
    event: SpaceX初のロケット、ファルコン1の打ち上げが失敗し、発射直後に爆発。
    location: クェゼリン環礁
    emotional_significance: 夢が炎に包まれて海に消えた。だが、失敗は選択肢の一つでしかないと自分に言い聞かせた。
