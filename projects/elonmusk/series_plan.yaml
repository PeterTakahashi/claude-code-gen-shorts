- id: ch10
  title_ja: 第十話 人を乗せて
  title_en: 'Chapter 10: Carrying People'
  time_range: 2019-2021
  ages_covered: 48-50
  central_theme: After 18 years of struggle, what does it feel like to finally fulfill the original, core mission?
  emotional_arc: From the immense pressure of carrying the nation's hopes to the profound, emotional release of safely launching
    astronauts, achieving the goal that motivated SpaceX from the very beginning.
  opening_hook: NASA astronauts Bob Behnken and Doug Hurley walk out in their sleek, SpaceX-designed suits. They are about
    to board a private spacecraft to go to orbit. It's a moment many thought would never come.
  key_beats:
  - Final preparations for the Demo-2 mission, the first crewed launch from US soil in nine years.
  - The personal pressure on Elon; if this fails, lives will be lost.
  - A weather delay scrubs the first launch attempt, ratcheting up the tension.
  - His relationship with the musician Grimes is a focus of media attention.
  - The birth of their son, X Æ A-12, adding a new personal dimension.
  - 'Launch day: the astronauts ride to the pad in a Tesla.'
  - The countdown is flawless. The Falcon 9 and Crew Dragon lift off.
  - Elon watches from the control center, his face etched with anxiety.
  - The spacecraft safely reaches orbit. The room erupts, but Elon is quiet.
  - He is interviewed afterwards, choking up with emotion. "I'm a little emotional. It's been 18 years working towards this
    goal."
  climax: A close-up on Elon's face as the rocket clears the tower. A single tear rolls down his cheek. It's the culmination
    of his life's work to that point.
  cliffhanger: 'Months later, now lauded as a national hero and named Time''s Person of the Year, he is at home, scrolling
    through Twitter. He sees a debate he finds foolish. A familiar, obsessive look enters his eyes. He leans forward, his
    face illuminated by the phone''s glow. Voiceover: 「彼らは、この広場を正しく使えていない」 (They don''t know how to use this town square properly.)
    Cut.'
