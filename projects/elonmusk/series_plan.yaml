    emotional_significance: NASAの宇宙飛行士を乗せた我々のロケットが空へ昇るのを見た時、創業からの全ての苦労が報われたと感じた。
    factual_certainty: certain
  - year: 2021
    age: 50
    event: TIME誌の「パーソン・オブ・ザ・イヤー」に選出される。テスラの時価総額が1兆ドルを突破。
    location: 世界中
    emotional_significance: 世界が、私の見てきた未来をようやく認め始めた。しかし、私にとって戦いはまだ始まったばかりだ。
    factual_certainty: certain
  - year: 2022
    age: 51
    event: 紆余曲折の末、ソーシャルメディアのTwitterを440億ドルで買収。
    location: サンフランシスコ、アメリカ
    emotional_significance: 言論の自由という文明の基盤を守るため、新たな、そして最も厄介な戦場に足を踏み入れた。
