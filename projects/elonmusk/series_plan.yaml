    emotional_significance: 不可能だと言われ続けたことを実現した。宇宙へのコストを劇的に下げるための、最も重要な一歩だった。
    factual_certainty: certain
  - year: 2016
    age: 45
    event: 脳とコンピューターを接続するニューラリンク社と、地下トンネルを掘削するボーリング・カンパニーを設立。
    location: カリフォルニア、アメリカ
    emotional_significance: 人類の能力拡張と都市の交通問題という、さらに新たなフロンティアへの挑戦を開始した。
    factual_certainty: certain
  - year: 2017
    age: 46
    event: 大衆向け電気自動車「モデル3」の生産地獄（Production Hell）に陥り、工場に泊まり込みで指揮を執る。
    location: フリーモント、アメリカ
    emotional_significance: 会社の存亡をかけた総力戦。肉体的にも精神的にも限界を超えた、最も過酷な戦いの一つだった。
    factual_certainty: certain
  - year: 2018
    age: 47
    event: ファルコンヘビーの初打ち上げで、自身のテスラ・ロードスターを宇宙に送り込む。「資金は確保した」ツイートでSECと対立。
    location: 宇宙 / カリフォルニア
    emotional_significance: 技術的な偉業と、個人的な衝動が世界を騒がせた。成功の光と、それに伴う危うい影が同時に現れた年。
    factual_certainty: certain
  - year: 2020
    age: 49
    event: SpaceXが、アメリカの地から9年ぶりに有人宇宙飛行（クルードラゴン Demo-2）を成功させる。
