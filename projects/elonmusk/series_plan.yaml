  - year: 1999
    age: 28
    event: Zip2をコンパックに約3億ドルで売却。その資金でオンライン金融サービスX.comを設立。
    location: パロアルト、アメリカ
    emotional_significance: 最初の大きな富。しかし、私にとってそれはゴールではなく、次の壮大な挑戦への軍資金に過ぎなかった。
    factual_certainty: certain
  - year: 2000
    age: 29
    event: X.comが競合のコンフィニティと合併し、PayPalとなる。新婚旅行中にCEOを解任される。
