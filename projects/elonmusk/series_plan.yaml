- id: ch8
  title_ja: 第八話 生産地獄
  title_en: 'Chapter 8: Production Hell'
  time_range: 2017-2018
  ages_covered: 46-47
  central_theme: Can willpower alone bend the physical reality of manufacturing?
  emotional_arc: From the hubris of promising half a million cars to the humbling, excruciating reality of the factory floor,
    pushing him to the absolute limits of his physical and mental endurance.
  opening_hook: 'A shot of the massive, empty Tesla factory in Fremont. Voiceover: 「我々は、世界で最も進んだ車を作った。だが、問題は『車』ではなかった。『工場』だった。」(We
    had built the world''s most advanced car. But the problem wasn''t the car. It was the factory.)'
  key_beats:
  - The initial Model 3 production line fails catastrophically due to over-automation.
  - Tesla burns through cash, once again nearing bankruptcy.
  - Elon takes personal control, sleeping on the factory floor for months.
  - Intense, brutal scenes of yelling at engineers, working 22-hour days.
  - The company is described as a 'war zone'.
  - The desperate measure of building a new assembly line in a giant tent in the parking lot.
  - Key suppliers doubt they can survive.
  - 'A moment of breakthrough: a bottleneck is cleared, and the production rate finally starts to climb.'
  - The company barely hits its production targets at the end of a quarter, staving off collapse.
  climax: Elon, looking disheveled and utterly spent, watches the final car of the quarter roll off the makeshift tent assembly
    line, meeting their impossible goal. He doesn't celebrate, just sits down on a crate, too exhausted to move.
  cliffhanger: 'Weeks later, looking haggard but relieved, he is scrolling Twitter. He sees short-sellers betting against
    Tesla. A flash of anger crosses his face. He begins to type: "Am considering taking Tesla private at $420. Funding secured."
    His thumb hovers over the ''Post'' button. Cut.'
