research:
  subject: イーロン・マスク
  birth_year: 1971
  death_year_or_null: null
  timeline:
  - year: 1971
    age: 0
    event: 南アフリカのプレトリアで、父エロルと母メイの間に長男として生まれる。
    location: プレトリア、南アフリカ
    emotional_significance: 物語の始まり。後に彼の原動力となる複雑な家庭環境の第一歩だった。
