  - year: 1980
    age: 9
    event: 両親が離婚。主に父エロルの元で育つことを選ぶ。
    location: プレトリア、南アフリカ
    emotional_significance: 父との複雑な関係が始まり、孤独感と自立心が形成される重要な時期。
    factual_certainty: certain
  - year: 1983
    age: 12
    event: 独学でプログラミングを学び、ビデオゲーム『Blastar』を開発、PC雑誌に500ドルで売却する。
    location: プレトリア、南アフリカ
    emotional_significance: 自分のアイデアを現実に変え、価値を生み出せるという最初の成功体験だった。
    factual_certainty: certain
  - year: 1988
    age: 17
    event: アパルトヘイト下の南アフリカでの兵役を避けるため、母の故郷であるカナダに移住。
    location: カナダ
    emotional_significance: 過去を捨て、より大きな可能性を求めて新世界へ旅立つ、人生最初の大きな賭けだった。
    factual_certainty: certain
  - year: 1992
    age: 21
    event: カナダのクイーンズ大学から、奨学金を得てアメリカのペンシルベニア大学に編入。
    location: フィラデルフィア、アメリカ
    emotional_significance: 世界の中心であるアメリカで、自分の野心を実現するための学問的基盤を築いた。
    factual_certainty: certain
  - year: 1995
    age: 24
    event: スタンフォード大学の博士課程を2日で中退し、弟のキンバルと共に最初の会社Zip2を設立。
    location: パロアルト、アメリカ
    emotional_significance: 学問の道ではなく、インターネット革命の熱狂の中で自らの手で未来を作ることを選んだ決断の時。
