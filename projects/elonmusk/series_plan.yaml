  callbacks_to_earlier_episodes:
  - The ISS docking in this episode is the direct payoff for founding SpaceX in ch3.
  notes: 'This episode shows the companies maturing, but the central drama must remain focused on the next big risk: the landing.'
- id: ch7
  title_ja: 第七話 巨人の帰還
  title_en: 'Chapter 7: Return of the Giant'
  time_range: 2015-2016
  ages_covered: 44-45
  central_theme: When a sci-fi dream becomes reality, what new, bigger promise must you make?
  emotional_arc: From the heart-stopping tension of the landing attempt to the sublime, historic moment of success, which
    immediately creates a new, terrifyingly large obligation to his customers and the world.
  opening_hook: 'Continuing the cliffhanger: The Falcon 9 booster is meters from the ground. The live feed is shaking. The
    sound is a deafening roar. In mission control, everyone is on their feet, silent.'
  key_beats:
  - The booster touches down perfectly. A sonic boom echoes across Cape Canaveral.
  - A beat of stunned silence in mission control, then an explosion of ecstatic celebration.
  - The iconic image of the landed booster, standing tall amidst the steam.
  - Elon sprints outside, overwhelmed by the moment.
  - The achievement solidifies his reputation as a visionary who can deliver the impossible.
  - His personal life remains turbulent, divorcing and remarrying Talulah Riley.
  - He unveils the Tesla Model 3, the affordable EV for the masses.
  - The plan is to get 100,000 pre-orders.
  - He watches the pre-order counter on a screen during the launch event.
  climax: 'The perfect, silent image of the landed booster standing at the launch site, looking like a silver monument from
    the future. Voiceover: 「不可能だと言われた。だから、やった。」 (They said it was impossible. So we did it.)'
  cliffhanger: At the Model 3 launch event, the pre-order counter on the giant screen behind him keeps ticking up, past 100,000,
    past 200,000, towards 400,000. The crowd is roaring. Elon smiles, but we see a close-up of his face, a flicker of panic
    in his eyes as he comprehends the scale of the manufacturing challenge ahead. Cut.
