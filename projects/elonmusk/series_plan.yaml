    location: クェゼリン環礁 / カリフォルニア
    emotional_significance: 絶望の淵からの奇跡的な生還。決して諦めなければ、不可能は可能になるのだと証明された瞬間だった。
    factual_certainty: certain
  - year: 2010
    age: 39
    event: テスラがナスダックに上場。女優のタルラ・ライリーと結婚。
    location: ニューヨーク / スコットランド
    emotional_significance: 公私ともに、激動の時代の終わりと新たな章の始まりを感じさせた。
    factual_certainty: certain
  - year: 2012
    age: 41
    event: SpaceXのドラゴン宇宙船が、民間企業として初めて国際宇宙ステーション（ISS）とのドッキングに成功。
