ja:
  title: 'マスクが Twitter を 440億ドルで買った日 #Shorts'
  description: '2022年、イーロン・マスクが Twitter を 440億ドルで買い取った日。本社に洗面台を抱えて入った冗談と共に、青い鳥は X に姿を変えていきます。


    #Shorts #イーロンマスク #X #Twitter #人物伝

    '
  hook_caption: Twitter を 440億ドルで買った男
  series_brand: イーロン・マスク伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 本社に、洗面台を抱えて、堂々と入ってきた男がいます。
    caption: 本社に洗面台を抱えて入る
  - panel: p2
    text: イーロン・マスク、Twitter を 440億ドルで買った日です。
    caption: Twitter を 440億ドルで買収
  - panel: p3
    text: 2022年、4月、当時51歳のマスクは、Twitter 社の取締役会から、取締役のオファーを受けました。
    caption: 2022年4月、取締役オファー
  - panel: p4
    text: しかし数週間後、彼はその席を辞退。代わりに、Twitter 全体の、440億ドル買収を、提案したんです。
    caption: 代わりに 440億ドル買収提案
  - panel: p5
    text: 訴訟を経て、10月、買収完了。
    caption: 10月、買収完了
  - panel: p6
    text: 「Let that sink in」、これで分かったろ——青い鳥は、X へと、姿を変えていったのでした。
    caption: 「Let that sink in」、青い鳥は X へ
en:
  title: 'How Elon Musk Bought Twitter for $44 Billion #Shorts'
  description: 'In 2022, Elon Musk completed his dramatic takeover of Twitter, starting with a sink and ending with a rebrand. This is the story of the wildest $44 billion purchase in tech.


    #ElonMusk #Twitter #X #Business #Shorts'
  hook_caption: The wildest $44 billion purchase ever
  series_brand: The Elon Musk Story
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In October 2022, Elon Musk walked into Twitter headquarters carrying a bathroom sink.
    caption: Let that sink in.
  - panel: p3
    text: 'His journey to buy the company didn''t start with a bang, but with a simple offer: a seat on the board.'
    caption: A seat on the board
  - panel: p4
    text: But Musk didn't want a seat. He wanted the whole company, making a stunning $44 billion offer to buy it outright.
    caption: $44 Billion Offer
  - panel: p2
    text: After intense pressure and negotiation, the board of directors finally accepted his massive proposal.
    caption: Deal Agreed
  - panel: p5
    text: But the drama wasn't over. Musk tried to back out, leading to a high-stakes legal battle to force the sale.
    caption: Court Battle
  - panel: p6
    text: Ultimately, the deal was done. The new owner was in, and the iconic blue bird's fate was sealed.
    caption: New Ownership
