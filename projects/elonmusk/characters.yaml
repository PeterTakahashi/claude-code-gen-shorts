# Cast for the Elon Musk biographical short.
# Three life-stage variants of Elon (child / teen / adult) get visual designs.
# Family, brother, and minor figures are description-only (text injection in
# panel prompts; no individual stylesheet generated).

characters:
  - id: elon_child
    name_ja: イーロン (10歳)
    description_en: "a thin, dreamy 10-year-old white boy of South African heritage with the characteristic young-Elon-Musk facial features: a slightly broad forehead even at this age, deep-set blue-grey eyes set slightly wide, a slightly broad straight nose, faintly oval face with round cheeks; light brown hair messy and slightly long; pale skin with faint freckles; an introspective and slightly haunted expression; quiet bearing"
    outfit_en: "a casual 1980s South African schoolboy outfit — short-sleeved cotton button-up shirt in pale blue, beige shorts, scuffed leather sandals"
    voice_style_id: 1310138977
    voice_speed: 1.0
    voice_instructions: null
    selected_candidate: 1
    expressions:
      - bookish concentrated reading
      - distant daydreaming gaze
      - small hesitant smile
      - bruised face after bullying with downcast eyes
      - wide-eyed wonder at a computer screen
      - quiet determination
    poses:
      - "Front view standing, holding a thick encyclopedia volume open with both hands"
      - "Three-quarter view sitting cross-legged on the floor with a stack of books"
      - "Side profile leaning over an early home computer with intent focus"
      - "Back view walking away alone toward a horizon"

  - id: elon_teen
    name_ja: イーロン (17歳)
    description_en: "a lanky 17-19-year-old white young man with the characteristic young-Elon-Musk facial features: a high broad forehead with hairline just beginning its faint recession, deep-set blue-grey intense eyes set slightly wide, a slightly broad straight nose, a square chin starting to define, a serious quiet mouth; light brown hair short and a bit tousled; pale skin; lean build still growing into adult proportions; slightly slouched posture; the introspective bearing of a teenager who reads heavily"
    outfit_en: "a 1980s/early-1990s late-teens outfit — fitted dark jeans, a plain white t-shirt under a dark zip-up windbreaker or simple jacket, plain sneakers"
    voice_style_id: 1310138977
    voice_speed: 1.0
    voice_instructions: null
    selected_candidate: 1
    expressions:
      - resolute decision face
      - apprehensive looking up at airport departures board
      - exhausted absorbed in study
      - quiet intensity gazing forward
      - melancholy farewell
      - focused at a university lecture

  - id: elon_adult
    name_ja: イーロン (27歳)
    description_en: "a 27-37-year-old white man with the characteristic Elon Musk facial features: a high broad forehead with noticeable receding hairline, deep-set blue-grey eyes set slightly wide, a slightly broad straight nose, a strong square jaw with faint dimple in the chin, clean-shaven with a faint stubble shadow, a serious thoughtful mouth that rarely smiles; short brown hair neatly cut and styled (when in public) or messy (when in startup mode); pale skin; lean-to-medium athletic build; an air of barely-contained intensity"
    outfit_en: "1990s/2000s Silicon Valley startup founder casual — a plain dark navy t-shirt or button-down with rolled sleeves, dark jeans, white sneakers; sometimes a cheap dress shirt and tie when meeting investors; office wear is rumpled from sleeping in it"
    voice_style_id: 1310138977
    voice_speed: 1.0
    voice_instructions: null
    selected_candidate: 1
    expressions:
      - sleep-deprived intense focus at a CRT monitor
      - quiet exhausted smile
      - frustration when demoted
      - calm satisfaction holding a check
      - haunted look at next horizon
      - exhausted laughing with brother

  # ===== Family / supporting cast (description-only, no stylesheet) =====
  - id: father_errol
    name_ja: 父・エロール
    description_en: "a stern white South African man in his 40s, dark hair starting to grey at the temples, sharp angular features, intense piercing eyes, clean-shaven, wearing a 1980s engineer's pale dress shirt and dark slacks; an imposing and authoritarian presence"
    outfit_en: "a 1980s South African engineer's outfit — pale blue or beige short-sleeved dress shirt, dark slacks, leather belt"
    voice_style_id: 1310138976
    voice_instructions: "Read with cold authoritarian weight, slight contempt under polite surface — 1980s engineer father."
    selected_candidate: null

