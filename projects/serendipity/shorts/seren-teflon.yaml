ja:
  title: 'フライパンの加工は偶然の失敗から生まれた、テフロン誕生秘話 #Shorts'
  description: |
    1938年、ある化学者が「消えたガス」の正体を調べたところ、何もくっつかず、熱にも薬品にも強い謎の白い粉が見つかった。それが、今や台所に欠かせないテフロン。偶然から生まれた大発明を30秒で解説します。

    #Shorts #偶然の発見 #テフロン #科学 #雑学
  hook_caption: フライパンの加工は偶然の失敗から生まれた
  series_brand: 偶然が変えた世界
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 1938年、一人の化学者が、首をかしげました。満タンのはずのガスボンベが、なぜか空のように軽かったからです。
      caption: 1938年、満タンのはずのガスが消えていた
    - panel: p2
      text: 不思議に思った彼は、ボンベを切り開きます。すると中には、ガスではなく、見たこともない白いロウのような粉が残っていました。
      caption: ボンベの中に謎の白い粉が残っていた
    - panel: p3
      text: その粉を調べると、驚きの性質が分かります。何もくっつかず、強い薬品にも溶けず、熱にもびくともしなかったんです。
      caption: 何もくっつかず薬品にも熱にも強い
    - panel: p4
      text: この偶然できた物質こそ、テフロンでした。やがてそれは、何も焦げつかないフライパンの加工として、世界中の台所に広がります。
      caption: それが焦げつかないフライパンの加工に
    - panel: p5
      text: 用途は、台所だけではありません。今では、宇宙服や、体内に入れる医療器具にまで使われています。
      caption: 宇宙服や医療器具にまで使われている
    - panel: p6
      text: 失敗だと思った実験の中に、世界を変える発明が眠っていた。あなたの「うまくいかなかった」も、実は宝かもしれません。
      caption: あなたの失敗も実は宝かもしれない
