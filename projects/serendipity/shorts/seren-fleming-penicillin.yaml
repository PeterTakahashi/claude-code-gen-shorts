ja:
  title: 'サボったらノーベル賞、ペニシリン誕生秘話 #Shorts'
  description: '1928年、ロンドンの細菌学者フレミングは、4週間の夏休みから戻ってきて、培養皿を片付け忘れていたことに気づいた。

    その「サボり」が、人類最大の薬、ペニシリンを生んだ。


    #Shorts #ペニシリン #フレミング #偶然 #ノーベル賞 #serendipity

    '
  hook_caption: サボってノーベル賞
  series_brand: バルトゥーン偶然の大発見
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「4週間サボって戻ってきたら、ノーベル賞が転がっていた」——98年前の1928年、ロンドンで本当にあった話を知っていますか?
    caption: サボった先にノーベル賞があった話
  - panel: p2
    text: 当時47歳の細菌学者フレミングは、夏休みに、培養皿を、机に出しっぱなしのまま、家族と田舎へ旅立っていました。
    caption: 培養皿を出しっぱなしで夏休みへ
  - panel: p3
    text: 戻ってみると、皿の中で、青カビの周りだけ、ブドウ球菌が、きれいに死んでいた。本来なら捨てるはずのその皿を、彼は捨てなかったんです。
    caption: 青カビの周りだけ菌が死んでいた
  - panel: p4
    text: 「このカビは、何かを出している」——そう直感したフレミングは、その物質をペニシリンと名付け、論文に、すぐ記録しました。
    caption: 「カビが何かを出している」と直感
  - panel: p5
    text: それから16年後の1944年、ペニシリンは、第二次大戦の戦場で、何百万人もの兵士の感染症を治す、人類初の抗生物質になります。
    caption: 16年後、戦場で何百万人を救う
  - panel: p6
    text: そして1945年、フレミングはノーベル賞を受賞。「サボらなかったら、ペニシリンは無かった」——偶然は、整理整頓を、嫌うようです。
    caption: 偶然は整理整頓を嫌う
en:
  title: 'The Lazy Mistake That Won a Nobel Prize #Shorts'
  description: 'In 1928, Alexander Fleming forgot to clean up his lab before a long vacation. That one messy mistake led to Penicillin, one of the greatest medical discoveries in history.

    #Shorts #History #Science #Penicillin #DidYouKnow'
  hook_caption: His Messy Lab Saved Millions
  series_brand: Accidental Discoveries
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In 1928, scientist Alexander Fleming was studying deadly bacteria in his London lab.
    caption: A dangerous experiment
  - panel: p2
    text: 'But before leaving on a 4-week vacation, he made a careless mistake: leaving a culture dish completely uncovered.'
    caption: The careless mistake
  - panel: p3
    text: When he returned, a strange mold had contaminated the dish... and it was destroying all the bacteria around it.
    caption: A strange contamination
  - panel: p4
    text: Fleming realized this mold was releasing a substance that could kill infections. He named it Penicillin.
    caption: A secret weapon
  - panel: p5
    text: By World War II, that discovery was being used to save millions of soldiers on the battlefield.
    caption: Saving millions of lives
  - panel: p6
    text: For his 'lazy' mistake, Fleming won a Nobel Prize, proving that sometimes a little mess can change the world.
    caption: A Nobel-winning mess
