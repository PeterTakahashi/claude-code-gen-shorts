panels:
- id: p1
  prompt: '9:16 vertical anime/webtoon style illustration:

    Year 1928 London England, interior of St Mary''s Hospital

    bacteriology laboratory at St Mary''s Paddington, a cluttered

    workbench piled with dozens of round glass petri dishes,

    morning light slanting through tall Victorian windows,

    a 47-year-old Scottish bacteriologist man in white lab coat

    and brown three-piece tweed suit standing transfixed staring

    at one open petri dish in his hand, his eyes wide with quiet

    shock, a strange ring of clear space surrounding a fuzzy

    green-blue mold colony on the agar inside the dish — the

    visual of "the moment a 4-week-vacation laziness produced

    the medicine of the century". Mid close-up. Clearly British

    1920s laboratory setting. No Japanese text.

    Character: {fleming}.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    Late summer 1928, the same St Mary''s London laboratory shown

    four weeks earlier completely empty, the workbench cluttered

    with petri dishes left uncovered, sunlight dim through closed

    shutters, dust visible in the air, a small handwritten note

    on the bench reading in decorative English only "GONE ON

    HOLIDAY", an open window in the background hinting that

    airborne spores have drifted in. No people. The visual of

    "the empty lab where a miracle was brewing because the

    scientist skipped work". Wide shot. Clearly 1920s British

    lab. No Japanese text.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

