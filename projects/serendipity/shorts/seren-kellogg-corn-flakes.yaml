ja:
  title: '医者が患者のために作った健康食、それがシリアルだった #Shorts'
  description: '今から132年前の1894年、アメリカの医師ジョン・ハーヴェイ・ケロッグが、患者の消化のために作った健康食。

    弟ウィルが小麦を焦がしてしまった偶然から、世界中の朝食「コーンフレーク」が誕生しました。


    #Shorts #偶然の発明 #ケロッグ #シリアル誕生 #雑学

    '
  hook_caption: シリアル誕生は医者の失敗
  series_brand: シリアル誕生
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 朝食の定番シリアルが、もとは医者が患者の便秘を治すために作った健康食だったって、知っていますか。
    caption: シリアルは患者用の健康食だった
  - panel: p2
    text: 132年前の1894年、アメリカ Michigan 州の Battle Creek Sanitarium で、ケロッグ博士は、患者の消化を改善する食べ物を、日々探していました。
    caption: 132年前、ケロッグ博士の病院食
  - panel: p3
    text: ある日、弟のウィルが、煮た小麦を、何時間もオーブンに、放置してしまったので、生地は完全に乾ききっていました。
    caption: 弟が小麦を焦がした偶然の日
  - panel: p4
    text: 捨てるのがもったいないからローラーで潰したら、生地がくっつかず、1粒ずつ薄い金色の薄片に、分かれて落ちてきたんです。
    caption: 1粒ずつフレークに分かれた瞬間
  - panel: p5
    text: 患者に出したら大評判で、その薄片は Corn Flakes と名付けられ、今では世界180か国で愛される朝食に、なっています。
    caption: 世界180か国の朝食になった
  - panel: p6
    text: 病院の食事として生まれた失敗作が、世界中の朝の食卓を変えた——偶然と、捨てない判断が、歴史を作ったんです。
    caption: 偶然と機転が世界を変えた
en:
  title: 'How a Kitchen Mistake Created Your Breakfast #Shorts'
  description: 'In 1894, Dr. John Kellogg was trying to create a healthy, digestible food for his patients. But after his brother made a mistake in the kitchen, they accidentally invented one of the world''s
    most popular breakfasts.


    #Shorts #History #Invention #Kelloggs #FoodFacts'
  hook_caption: Your Breakfast Was an Accident
  series_brand: The Birth of Cereal
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In 1894, Dr. John Kellogg ran a health sanitarium where he was obsessed with creating the perfect healthy food for his patients.
    caption: A Doctor's Mission
  - panel: p3
    text: One day, his brother Will, who ran the kitchen, accidentally left a batch of boiled wheat out for way too long.
    caption: A Kitchen Mistake
  - panel: p4
    text: The dough was totally ruined... or so they thought. Instead of tossing it, they tried pressing it through rollers.
    caption: A Crazy Idea
  - panel: p1
    text: But instead of a sticky sheet, out came the world's very first toasted flakes.
    caption: The First Flakes
  - panel: p5
    text: The patients loved them. This happy accident would soon be known across the globe as Kellogg's Corn Flakes.
    caption: An Instant Hit
  - panel: p6
    text: And that's how a failed recipe for hospital food ended up on breakfast tables everywhere.
    caption: Breakfast Is Served
