ja:
  title: '石川のテキ屋が六本木ヒルズに来た日 #Shorts'
  description: '2010年代、亀山敬司は本社を石川から東京の六本木ヒルズへ移し、

    シリコンバレー風オフィスに、若いエンジニアを大量採用。

    田舎の貸ビデオ店は、本格的IT企業へと変貌した。


    #Shorts #亀山敬司 #DMM #六本木ヒルズ #人物伝

    '
  hook_caption: 石川のテキ屋が六本木ヒルズへ
  series_brand: 亀山敬司伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 石川県の貸ビデオ店主が、ある日、本社ごと、六本木ヒルズに引っ越しました。
    caption: 本社を六本木ヒルズへ移転
  - panel: p2
    text: 2008年頃まで、DMMの本社は、石川県加賀市の、地味な郊外ビルの中にありました。
    caption: 2008年頃まで、本社は石川
  - panel: p3
    text: しかし亀山敬司は、ITで本気で戦うなら、東京の中心、そして、最新のオフィスが、必要だと判断します。
    caption: 東京の中心、最新オフィスが必要
  - panel: p4
    text: 2010年代、彼は本社機能を、東京の六本木ヒルズに、移しました。
    caption: 2010年代、六本木ヒルズへ
  - panel: p5
    text: オフィスは、シリコンバレー風。若いエンジニアを、数百人単位で、大量採用したんです。
    caption: シリコンバレー風オフィスへ
  - panel: p6
    text: 田舎のテキ屋が、本格IT企業に変貌した瞬間、それが、この六本木の夜景だったんです。
    caption: 田舎のテキ屋が、IT企業へ変貌
en:
  title: 'How a Small-Town Hustler Took Over Tokyo''s Richest Zip Code #Shorts'
  description: 'In the 2010s, Keishi Kameyama moved his company DMM from a sleepy rural town to Tokyo''s prestigious Roppongi Hills.

    He built a Silicon Valley-style office, hired hundreds of young engineers, and transformed his video rental business into a tech empire.

    #Shorts #KeishiKameyama #DMM #Tokyo #Business'
  hook_caption: He Moved His Office From Here... To HERE
  series_brand: The Keishi Kameyama Story
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: Until 2008, this modest building in rural Ishikawa was the headquarters for one of Japan's future tech giants, DMM.
    caption: Humble Beginnings
  - panel: p3
    text: But its founder, Keishi Kameyama, knew that to truly compete in tech, they needed to be in the heart of Tokyo.
    caption: A Bold Decision
  - panel: p4
    text: So in the 2010s, he moved the entire company to Roppongi Hills, one of the most prestigious addresses in Japan.
    caption: The Big Move
  - panel: p5
    text: He built a Silicon Valley-style campus and went on a massive hiring spree for young engineering talent.
    caption: Silicon Valley Vibe
  - panel: p1
    text: The small-town video rental business had officially transformed into a legitimate IT powerhouse.
    caption: A Tech Giant is Born
  - panel: p6
    text: This view from the top wasn't just a skyline. It was a statement.
    caption: View From The Top
