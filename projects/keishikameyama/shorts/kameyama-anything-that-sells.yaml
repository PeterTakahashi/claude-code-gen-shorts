    semi-transparent floating icons representing his many businesses —

    a video play button, a game controller, a 3D printer, a solar panel,

    a Bitcoin coin, an English-conversation speech bubble, an online-salon

    group symbol — all hovering around him like a satellite cloud. Cool

    blue office light. The icon labels are stylized symbols only, no text.

    Wide mid-shot.

    Character: {subject_adult}.

