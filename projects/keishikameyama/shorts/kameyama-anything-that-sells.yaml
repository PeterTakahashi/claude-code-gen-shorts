ja:
  title: '「儲かるものは何でもやる」DMMの哲学 #Shorts'
  description: '動画、ゲーム、英会話、3Dプリンタ、太陽光、暗号通貨、オンラインサロン。

    亀山敬司のDMMは、儲かりそうなものは、ジャンルを問わず、何でもやる。

    屋台仕込みのこの哲学が、グループを4000億円企業に育てた。


    #Shorts #亀山敬司 #DMM #暗号通貨 #人物伝

    '
  hook_caption: 儲かるものは何でもやる
  series_brand: 亀山敬司伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「儲かるものは、ジャンル問わず、何でもやる」。これが、DMM創業者、亀山敬司の哲学です。
    caption: 儲かるものは、何でもやる
  - panel: p2
    text: 2000年代、彼は、貸ビデオから、オンライン動画配信へと、事業の柱を、移しました。
    caption: 2000年代、オンライン動画配信
  - panel: p3
    text: 2010年代には、ブラウザゲーム、そして、フィリピン人講師のオンライン英会話まで、手を出します。
    caption: ゲーム、オンライン英会話へ
  - panel: p4
    text: さらに、2018年には、暗号通貨取引所、DMM Bitcoinまで、立ち上げました。
    caption: 2018年、DMM Bitcoin開始
  - panel: p5
    text: 近年は、有料オンラインサロン、3Dプリンタ、太陽光、農業まで、ジャンルは無限です。
    caption: オンラインサロン、3Dプリンタ、農業
  - panel: p6
    text: 屋台で身についた「売れるものを、嗅ぎ分ける本能」は、40年経っても、止まらないんです。
    caption: 屋台仕込みの嗅覚は、止まらない
en:
  title: 'The ''Anything Goes'' Philosophy of Japan''s DMM #Shorts'
  description: 'Video, games, English lessons, crypto, solar power... DMM founder Keishi Kameyama would enter any business if it looked profitable.

    This simple philosophy, learned from his early days at a street stall, grew his group into a 400 billion yen empire.


    #Shorts #DMM #KeishiKameyama #Business #Japan'
  hook_caption: His rule? If it makes money, do it.
  series_brand: The Keishi Kameyama Story
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: “If it makes money, we do it. No matter the industry.” This is the core philosophy of DMM founder, Keishi Kameyama.
    caption: 'The #1 Rule'
  - panel: p2
    text: In the 2000s, he pivoted from video rentals to one of Japan's first major online streaming services.
    caption: Video Streaming
  - panel: p3
    text: By the 2010s, DMM had expanded into browser games and even online English tutoring.
    caption: Games & Tutoring
  - panel: p4
    text: Then in 2018, jumping on the latest trend, he launched the crypto exchange DMM Bitcoin.
    caption: Crypto Exchange
  - panel: p5
    text: 'Today, their portfolio seems endless: 3D printing, solar power, agriculture, and online communities.'
    caption: A Limitless Portfolio
  - panel: p6
    text: This instinct for what sells—honed at a street stall 40 years ago—is what built his 400 billion yen empire.
    caption: A 400 Billion Yen Instinct
