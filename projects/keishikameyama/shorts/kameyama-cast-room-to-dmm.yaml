  prompt: '9:16 vertical anime/webtoon style illustration:

    November 1999, a modest office room in 加賀 Ishikawa Japan at night. A

    40-year-old Keishi Kameyama leans back in a simple office chair, arms

    folded, looking calmly at a beige CRT monitor that displays a freshly

    designed Japanese website with the prominent English text "DMM.com" on

    the screen, the room dimly lit by the monitor glow, a single desk lamp

    casting a warm pool. His expression is quietly intense — the look of a

    man who has just lit a fuse. Mid-shot side angle.

    Character: {subject_adult}.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    1986 evening, a quiet local shopping street in 加賀 Ishikawa Japan. A

    small single-story Japanese 貸ビデオ rental shop with a modest plastic

    sign reading 「キャストルーム」 in Japanese katakana hand-rendered, glowing

    warm yellow interior visible through the front glass, VHS tape boxes

    lined up on shelves inside, a few parked bicycles outside. Wide

    establishing shot. Slightly worn 1980s Hokuriku neighborhood

    atmosphere. No figures visible.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    Late 1980s interior of the same small Japanese 貸ビデオ rental shop in

    Ishikawa. A 27-year-old Keishi Kameyama in a casual work jacket standing

    between two tall metal shelves stacked with VHS video tapes in plain

    colored sleeves, holding one tape in his hand, examining it with a

