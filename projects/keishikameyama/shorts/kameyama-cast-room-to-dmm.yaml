    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

    Early 1990s Saturday night inside the busy 貸ビデオ rental shop in 加賀.

    A dozen Japanese 客 of varied ages browsing the wall-to-wall shelves of

    VHS tapes, picking up boxes, reading the backs, a queue forming at the

