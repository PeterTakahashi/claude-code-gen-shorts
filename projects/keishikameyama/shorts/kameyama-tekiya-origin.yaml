ja:
  title: '露天商から4000億円企業を作った男 #Shorts'
  description: '1970年代、石川県加賀温泉郷で、若き亀山敬司は露天商として人生をスタートさせた。

    そして30年後、彼はDMM.comを、年商4000億円規模の企業へと育て上げる。


    #Shorts #亀山敬司 #DMM #人物伝

    '
  hook_caption: 露天商から4000億円企業へ
  series_brand: 亀山敬司伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 石川県の温泉街で、露天商をやっていた男が、30年後、年商4000億円の企業を作りました。
    caption: 露天商から4000億円企業へ
  - panel: p2
    text: 亀山敬司。1970年代、加賀温泉郷の夜の屋台で、安いアクセサリーを売って、生計を立てていました。
    caption: 1970年代、加賀温泉郷の屋台
  - panel: p3
    text: テキ屋稼業で身についたのは、客を一瞬で読む力、そして、売れるものを嗅ぎ分ける本能でした。
    caption: 客を読む力、売れるものを嗅ぐ本能
  - panel: p4
    text: 1980年代、彼は地元で、小さな貸ビデオ店「キャストルーム」を、開きます。
    caption: 1980年代、貸ビデオ店を開業
  - panel: p5
    text: そして1999年、40歳のとき、彼はインターネットに賭けて、DMM.comを、立ち上げたんです。
    caption: 1999年、DMM.comを立ち上げ
  - panel: p6
    text: 屋台で培った嗅覚は、ネットの世界でも、まったく同じように、通用したんです。
    caption: 屋台の嗅覚は、ネットでも通じた
en:
  title: 'How a Street Vendor Built a $3B Empire #Shorts'
  description: 'In the 1970s, Keishi Kameyama sold cheap trinkets at a festival stall. Decades later, his company DMM.com would be a multi-billion dollar giant.


    This is the story of how street smarts built an online empire.


    #Shorts #KeishiKameyama #DMM #Entrepreneurship #Japan'
  hook_caption: From Street Stall to $3B Empire
  series_brand: The Keishi Kameyama Story
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In the 1970s, Keishi Kameyama was just a kid working a festival stall in a small Japanese spa town.
    caption: A festival stall
  - panel: p3
    text: But on the streets, he learned to read people in a heartbeat and developed a killer instinct for what sells.
    caption: A killer instinct
  - panel: p4
    text: In the 80s, he used that instinct to level up, opening a small video rental shop.
    caption: Video rental shop
  - panel: p5
    text: Then in 1999, at age 40, he took his biggest gamble yet, launching an internet company called DMM.com.
    caption: Betting on the internet
  - panel: p1
    text: That street stall kid had built a company that would one day pull in over 3 billion dollars a year.
    caption: A $3 billion empire
  - panel: p6
    text: Proving that the same street smarts that sell trinkets can build an online empire.
    caption: Street smarts to dot-com
