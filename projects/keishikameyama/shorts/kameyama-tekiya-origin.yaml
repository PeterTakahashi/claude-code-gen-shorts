    where DMM headquarters occupies several floors, hands casually in his

    jeans pockets, looking calmly up at the building with a small unreadable

    half-smile, the warm orange sunset reflected on the glass towers. Wide

    mid-shot framing him centered, the building dominating the upper frame.

    Conveys: this empire was built by a former street vendor.

    Character: {subject_adult}.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    A summer night in 1975, 加賀温泉郷 in Ishikawa prefecture Japan. A narrow

    festival street lined with traditional Japanese 屋台 food and trinket

    stalls under glowing red 提灯 paper lanterns, drifting smoke from grilled

    食べ物 stalls, 浴衣 wearing 観光客 strolling past. In the foreground, a

    young 25-year-old Keishi Kameyama in a dark work jacket and faded jeans

    stands behind a small modest 露天 stall selling cheap accessories and

    trinkets, calmly observing the crowd with sharp street-smart eyes.

    Character: {subject_young}.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    Close mid-shot of the same 加賀温泉郷 night stall. The young Kameyama

    leans casually against his stall counter, a calm slight half-grin on his

    face, talking to a 浴衣 wearing 温泉 tourist who is laughing as he

    considers buying a cheap accessory. The lantern light warms one side of

    Kameyama''s face, the other half in shadow. Conveys the moment of a born

    salesman closing a sale — the same instinct that will one day build DMM.

    Character: {subject_young}.

    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

