ja:
  title: '東芝粉飾1518億円、3年で社運がゼロになった日 #Shorts'
  description: '2015年、創業140年の名門・東芝が、過去7年で1,518億円の利益を

    水増ししていたことが発覚。たった3年で、社運は事実上ゼロまで落ちた。

    戦後最大級と呼ばれた企業不祥事を、30秒で振り返ります。


    #Shorts #東芝 #粉飾決算 #企業不祥事 #日本経済

    '
  hook_caption: 名門140年が3年で消えた日
  series_brand: 東芝粉飾事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 創業140年の名門・東芝が、たった3年で、社運をほぼゼロまで失った——その始まりは、2015年7月の、社長の謝罪会見でした。
    caption: 140年の名門が崩れた日
  - panel: p2
    text: 11年前の2008年、リーマン・ショックで業績が悪化したため、当時の経営陣は、現場に対し「Challenge」と呼ばれる、達成不可能な利益目標を、強要し続けました。
    caption: 2008年、達成不能なChallengeが始まった
  - panel: p3
    text: 数字を作れと迫られた現場社員たちは、工事進行基準や、在庫評価を、こっそり操作し、利益を、紙の上だけで膨らませていったんです。
    caption: 現場社員が紙の上だけで利益を膨らます
  - panel: p4
    text: 7年前の2008年から2014年までの累計で、水増しされた利益は、約1,518億円。日本の上場企業として、戦後最大級の規模に、達しました。
    caption: 7年で1,518億円の水増し
  - panel: p5
    text: 2015年7月、上田廣一・元東京高検検事長が率いた第三者委員会が、この不正を、正式に認定。社長・田中久雄氏ら、歴代3代の社長が、即日辞任しました。
    caption: 2015年7月、第三者委員会が認定
  - panel: p6
    text: その後の3年で、東芝は半導体子会社の Toshiba Memory を、約2兆円で売却。看板事業を、自ら手放した瞬間、戦後最大の名門は、事実上ゼロまで、解体されました。
    caption: 3年で看板事業を売り、社運がゼロに
en:
  title: 'How Toshiba Faked $1.2 Billion in Profits #Shorts'
  description: 'In 2015, electronics giant Toshiba was caught in a massive accounting scandal. They had faked $1.2 billion in profits over seven years, leading to the sale of their most valuable division.

    #Shorts #Toshiba #Business #Scandal #Finance'
  hook_caption: How a $1.2B lie killed a 140-year-old giant.
  series_brand: The Toshiba Scandal
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: In July 2015, the President of 140-year-old Toshiba took a deep bow. This was the beginning of the end.
    caption: A giant collapses
  - panel: p2
    text: It all started after the 2008 financial crisis. Top execs forced impossible profit targets, which they called 'Challenges,' on their divisions.
    caption: Impossible 'Challenges'
  - panel: p3
    text: Pressured to 'make the numbers,' accountants began cooking the books, inventing profits that only existed on paper.
    caption: Cooking the books
  - panel: p4
    text: Over seven years, they inflated profits by 152 billion yen—that's over 1.2 billion US dollars.
    caption: $1.2 Billion Lie
  - panel: p5
    text: An independent committee finally exposed the fraud. The CEO and two of his predecessors resigned immediately.
    caption: The scheme exposed
  - panel: p6
    text: To survive, Toshiba was forced to sell its crown jewel—its memory chip business. The 140-year-old giant was brought to its knees.
    caption: Sold its crown jewel
