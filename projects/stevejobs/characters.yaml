# Cast for the Steve Jobs biographical short.
# Three life-stage variants of Jobs (child / young adult / mature) get visual designs.
# Family, partners, and minor figures are description-only (text injection in
# panel prompts; no individual stylesheet generated initially).

characters:
  - id: jobs_child
    name_ja: スティーブ (10歳)
    description_en: "a thin slightly intense white boy of about 10 years old with the characteristic young-Steve-Jobs facial features: a slightly long oval face, deep-set dark intelligent eyes, a slightly broad straight nose, a serious thoughtful mouth, brown shaggy hair somewhat untidy and falling near eyebrows, pale skin, a watchful introspective bearing"
    outfit_en: "a casual late-1960s California schoolboy outfit — simple striped or plain t-shirt, faded jeans, sneakers, sometimes a denim jacket"
    voice_style_id: 1310138977
    voice_speed: 1.0
    voice_instructions: null
    selected_candidate: 1
    expressions:
      - intent absorbed reading
      - quiet defiant gaze
      - small precise focus on a mechanical object
      - lonely watching other children play
      - thoughtful curiosity
    poses:
      - "Front view crouched looking at an electronic component"
      - "Three-quarter sitting on a curb reading a book"
      - "Side profile gazing thoughtfully out a window"
      - "Back view walking through an orchard alone"

  - id: jobs_young
    name_ja: スティーブ (20歳前後)
    description_en: "a young adult of about 18-25 in the mid 1970s with the characteristic young-Steve-Jobs facial features: oval face, dark intense eyes set slightly close, slightly broad straight nose, full lips often pressed into a serious line, brown shoulder-length hair somewhat hippie style, often barefoot, slim lanky build, sometimes patchy beard, the seeker bearing of someone who has just returned from India"
    outfit_en: "1970s counterculture / Reed-college dropout aesthetic — well-worn t-shirts, simple linen or cotton tops, jeans, sometimes traditional Indian kurta after the India trip, often barefoot, sometimes simple sandals"
    voice_style_id: 1310138977
    voice_speed: 1.0
    voice_instructions: null
    selected_candidate: 1
    expressions:
      - quiet intensity at a workbench
      - seeker-like meditative calm
      - intense pitching to investors
      - young charismatic founder presenting
      - private moment of doubt

  - id: jobs_adult
    name_ja: スティーブ (40歳前後)
    description_en: "the iconic mature Steve Jobs aged 40-55 with characteristic Jobs features: oval face with sharper bone structure, deep-set dark piercing eyes, slightly broad straight nose, thin lips often pressed into a precise line, clean-shaven, characteristic round wire-rimmed glasses (rimless or thin-rimmed), short-cropped hair beginning to thin and grey, slim athletic build, the stage-magic bearing of a master presenter"
    outfit_en: "the iconic Steve Jobs uniform — black mock-turtleneck (Issey Miyake), faded blue Levi's 501 jeans, New Balance sneakers (grey or white). For sick periods after 2003: noticeably thinner build, the same outfit but looser"
    voice_style_id: 1310138977
    voice_speed: 1.0
    voice_instructions: null
    selected_candidate: 1
    expressions:
      - presenting onstage with quiet authority
      - intense conversation with a designer
      - private moment of vulnerability illness
      - reverent attention to a beautiful object
      - calm confronting illness

  # ===== Family / supporting cast =====
  - id: paul_jobs
    name_ja: ポール・ジョブズ (養父)
    description_en: "Steve's adoptive father — a working-class white American man in his 40s-60s, weathered hands, short cropped hair greying at temples, kind serious face with lined eyes, the bearing of a mechanic who taught his son craft"
    outfit_en: "1960s-1970s working man — short-sleeved button shirt, worn jeans, sturdy work boots, sometimes mechanic overalls with grease stains"
    voice_style_id: null
    voice_instructions: null
    selected_candidate: null

  - id: clara_jobs
    name_ja: クララ・ジョブズ (養母)
    description_en: "Steve's adoptive mother — a gentle white American woman in her 40s-60s, brown hair sometimes greying tied back, kind warm face with thoughtful eyes, the bearing of a former accountant who deeply loved her son"
    outfit_en: "1960s-1970s suburban housewife — modest dress or blouse with skirt, simple jewelry, comfortable house shoes"
    voice_style_id: null
    voice_instructions: null
    selected_candidate: null

  - id: woz
    name_ja: スティーブ・ウォズニアック (ウォズ)
    description_en: "Steve Wozniak — a slightly stocky white American man around the same age as Jobs, curly dark brown hair, full beard often unkempt, round warm face with kind smiling eyes, the bearing of a genius engineer who is genuinely happy at his workbench"
    outfit_en: "1970s engineer hobbyist — plaid button-down shirt over plain t-shirt, jeans, sometimes a wide tie pulled loose, often with a soldering iron in hand or pocket protector full of pens"
    voice_style_id: null
    voice_instructions: null
    selected_candidate: null

  - id: chrisann_brennan
    name_ja: クリスアン・ブレナン
    description_en: "Chrisann Brennan in her late teens and 20s — slim white woman with long straight light brown or strawberry blonde hair often parted in the middle hippie-style, oval face with thoughtful expressive blue eyes, fair skin, a gentle artistic bearing with quiet melancholy beneath, looks slightly bohemian"
    outfit_en: "1970s hippie / artist California aesthetic — simple long flowing dresses or long skirts with peasant blouses, often barefoot or in simple sandals, sometimes a denim jacket, simple jewelry, occasionally with a baby in arms"
