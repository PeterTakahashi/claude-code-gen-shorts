    Character: {jobs_child}.

    '
- id: p3
  prompt: '13-year-old Steve Jobs frustrated at his bedroom desk, looking at the schematic on the magazine, hands open in mild exasperation, recognizing he cannot source the specialized HP-made parts locally,
