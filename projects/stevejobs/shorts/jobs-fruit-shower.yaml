ja:
  title: 'ジョブズが風呂に入らなかった本当の理由 #Shorts'
  description: '天才スティーブ・ジョブズが、若い頃シャワーを浴びなかった本当の理由。Atari社の同僚たちは毎日苦情を言ったが、彼は気にしなかった。


    #Shorts #スティーブジョブズ #Apple #人物伝

    '
  hook_caption: ジョブズが風呂に入らなかった理由
  series_brand: スティーブ・ジョブズ伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 同僚が、毎日、彼の体臭に苦情を訴え、夜勤に回された男がいます。
    caption: 夜勤に飛ばされた天才
  - panel: p2
    text: スティーブ・ジョブズ。1974年、19歳、Atari 社のエンジニアでした。
    caption: 1974年、Atari 社、19歳
  - panel: p3
    text: 彼は、果物だけ食べていれば体臭は出ない、と本気で信じていたから、シャワーをほとんど浴びなかったんです。
    caption: 果物だけで体臭は出ない、と信じていた
  - panel: p4
    text: 同僚たちが、毎日、苦情を言っても、ジョブズは取り合いません。
    caption: 同僚の苦情は無視
  - panel: p5
    text: 会社は、最終的に、彼を夜勤に回すしかなかった。
    caption: 夜勤に回された
  - panel: p6
    text: 天才の奇行は、若い頃から、もう、ここまで筋金入りだったんですね。
    caption: 若い頃からこのレベル
en:
  title: 'Why Steve Jobs Was Banned From The Day Shift #Shorts'
  description: 'At 19, Steve Jobs''s coworkers at Atari complained so much about his body odor that he was moved to the night shift. Here''s the bizarre reason why he refused to shower.


    #Shorts #SteveJobs #Atari #Apple #History'
  hook_caption: Banned From The Day Shift
  series_brand: 'Steve Jobs: The True Story'
  voice_speaker: Ryan
  narration:
  - panel: p4
    text: In 1974, engineers at Atari filed constant complaints about one of their coworkers.
    caption: Endless complaints
  - panel: p2
    text: The employee was a 19-year-old prodigy named Steve Jobs.
    caption: A 19-year-old prodigy
  - panel: p3
    text: He believed his strict fruit-only diet meant he never had to shower, a theory his colleagues strongly disagreed with.
    caption: The 'fruit diet' theory
  - panel: p5
    text: With morale plummeting, management had to find a solution.
    caption: ''
  - panel: p1
    text: They reassigned Jobs to the night shift, where he could work completely alone.
    caption: The Night Shift
  - panel: p6
    text: This was the same obsessive focus that would one day build the world's biggest company.
    caption: Genius at work
