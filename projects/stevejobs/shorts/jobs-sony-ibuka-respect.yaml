ja:
  title: 'ジョブズが密かに憧れていた、日本の老人 #Shorts'
  description: |
    Apple の創業者スティーブ・ジョブズは、生涯ある日本人を「世界で最も尊敬する経営者」と公言していた。Sony の創業者、井深大である。

    #Shorts #スティーブジョブズ #Apple #Sony #井深大 #日本
  hook_caption: ジョブズが憧れた日本の老人
  series_brand: ジョブズと井深大
  voice_speed: 1.4
  narration:
    - panel: p1
      text: スティーブ・ジョブズが、若い頃から執着していた1つの製品があります。それは、ある日本人が作った、小さな黒い装置でした。
      caption: ジョブズが執着した日本製品
    - panel: p2
      text: 主役は、井深大。Sony の創業者で、Walkman や Trinitron テレビを世に送り出した男です。
      caption: 井深大、Sony 創業者
    - panel: p3
      text: ジョブズは Apple本社の壁に、Sony 製品の写真と、井深の肖像を、貼っていました。社員に、「我々が目指すのは、これだ」と語ったんです。
      caption: Apple本社の壁に井深の肖像
    - panel: p4
      text: 1980年代、ジョブズはついに東京 Sony 本社で、井深と面会します。そこで彼は、「あなたは、私の人生で最も尊敬する経営者です」と、頭を下げたと言われています。
      caption: 1980年代、東京で井深と対面
    - panel: p5
      text: 後に Apple が iMac、iPod、iPhone を出した時、ジョブズは、自分の理想は最初から、井深と Sony だったと、繰り返し語りました。
      caption: iMac、iPod、iPhone の原点
    - panel: p6
      text: 世界一の起業家が、生涯憧れ続けた一人の日本人。井深大の哲学は、形を変えて、Apple の中で、今も生きています。
      caption: 井深の哲学、Apple に生きる
