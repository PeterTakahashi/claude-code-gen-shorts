ja:
  title: 'ジョブズが自分の会社から追放された日 #Shorts'
  description: 'Apple の創業者が、自分が立ち上げた会社から、自分が連れてきた男によって追放された1985年5月。30歳で全てを失ったジョブズが、その後どうなったのか。


    #Shorts #スティーブジョブズ #Apple #人物伝

    '
  hook_caption: 30歳で自分の会社を失った創業者
  series_brand: スティーブ・ジョブズ伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: Apple の創業者が、自分の作った会社から、自分が連れてきた男に、追放された日があります。
    caption: 創業者が、自分の会社を失う
  - panel: p2
    text: 1985年5月、クパチーノの Apple 本社、取締役会議室。
    caption: 1985年5月、Apple本社
  - panel: p3
    text: ジョブズが、自分でペプシから引き抜いた男、ジョン・スカリーが、言いました——「スティーブ。取締役会は、決定を下した」。
    caption: 「取締役会は決定を下した」
  - panel: p4
    text: 当時30歳のジョブズは、自分が立ち上げた会社から、自分が連れてきた男によって、その日、追放されたんです。
    caption: 30歳で自分の会社を失った
  - panel: p5
    text: しかし、その12年後、ジョブズは買収された NeXT を通じて、Apple に CEO として帰還することになります。
    caption: 12年後、CEOとして帰還
  - panel: p6
    text: iMac、iPod、iPhone を世に送り出した、第二幕の始まり。追放の日が、彼の人生で、最大の財産になった瞬間でした。
    caption: 追放こそ、最大の財産だった
en:
  title: 'The Day Steve Jobs Was Fired From Apple #Shorts'
  description: 'In 1985, Steve Jobs was forced out of Apple by the very CEO he hired. But this spectacular failure set the stage for one of the greatest comebacks in business history.


    #Shorts #SteveJobs #Apple #History #Biography'
  hook_caption: FIRED from the company he created
  series_brand: The Steve Jobs Story
  voice_speaker: Aiden
  narration:
  - panel: p3
    text: Imagine being fired from the company you started.
    caption: Fired from his own company
  - panel: p4
    text: That's what happened to Steve Jobs in 1985, at the hands of the CEO HE had personally recruited.
    caption: By the man he hired
  - panel: p1
    text: At just 30 years old, the board sided with the new CEO, John Sculley, and Jobs was out.
    caption: He was just 30
  - panel: p5
    text: He walked away from Apple with nothing but a box of his personal belongings.
    caption: Forced out
  - panel: p6
    text: But 12 years later, he returned to a nearly bankrupt Apple, ready for Act Two.
    caption: 12 years later...
  - panel: p6
    text: This comeback gave us the iMac, iPod, and iPhone, proving that being fired was the best thing that ever happened to him.
    caption: His greatest failure
