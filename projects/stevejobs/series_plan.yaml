- id: ch8
  title_ja: おもちゃの雪辱
  title_en: Revenge of the Toys
  time_range: 1991-1996
  ages_covered: 36-41
  central_theme: 一度敗れた者が、全く違う戦場で雪辱を果たすことは可能か？
  emotional_arc: NeXTの失敗で資金的に追い詰められる中、ジョブズはピクサーに全てを賭ける。ディズニーとの厳しい交渉の末、世界初の長編フルCGアニメ『トイ・ストーリー』の製作にこぎつける。製作は困難を極めるが、彼は独裁者ではなく、クリエイターを信じる支援者として振る舞うことを学ぶ。映画の大成功とピクサーのIPOにより、彼は億万長者として、そして偉大なプロデューサーとして劇的な復活を遂げる。
  opening_hook: ディズニーの幹部ジェフリー・カッツェンバーグが、『トイ・ストーリー』の初期バージョンを酷評し、製作中止を宣告する。ピクサーチームは絶望に包まれる。
  key_beats:
  - ディズニーと長編映画『トイ・ストーリー』の製作契約を結ぶ。
  - 製作は難航。脚本は何度も書き直され、ジョブズは私財を投じ続けて会社を支える。
  - 彼は製作には直接口を出さず、ジョン・ラセターらクリエイターの才能を信じ、守ることに徹する。
  - ついに『トイ・ストーリー』が完成する。
  - 公開後、映画は世界的な大ヒットとなり、アニメーションの歴史を変える。
  - 映画公開の翌週、ピクサーは株式公開（IPO）に踏み切り、大成功を収める。
  - ジョブズは一夜にして、アップル時代をはるかに超える資産を持つビリオネアとなる。
  climax: 『トイ・ストーリー』のプレミア上映。エンドロールが流れ始めると、満員の観客から割れんばかりの拍手と喝采が巻き起こる。暗闇の中、ジョブズは隣に座るローレンの手を握り、静かに涙を流す。
  cliffhanger: ビリオネアとして復活したジョブズの元に一本の電話が入る。相手はアップルの当時のCEO、ギル・アメリオ。「スティーブ、助けが必要なんだ」。電話の向こうで、かつて彼を追放した会社が瀕死の悲鳴を上げていた。— FADE
