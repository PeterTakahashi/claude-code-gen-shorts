- id: ch7
  title_ja: 砂漠の二つの種
  title_en: Two Seeds in the Desert
  time_range: 1985-1991
  ages_covered: 30-36
  central_theme: すべてを失った時、人は再び何かを創造することができるのか？
  emotional_arc: アップルを追われたジョブズは、「荒野」の時代に入る。彼は二つの会社、NeXTとピクサーを立ち上げる。NeXTは彼の完璧主義が再び暴走し苦戦するが、ピクサーではテクノロジーとアートの融合という新たな夢を見出す。そして、私生活ではローレン・パウエルと出会い、初めて本当の意味での安らぎと家族を得る。
  opening_hook: アップルを辞めたジョブズが、数人の忠実な元部下と共に、がらんとしたオフィスで新会社「NeXT」を立ち上げる。彼は言う。「今度は、正しくやろう」。
  key_beats:
  - 教育市場向けの完璧なコンピュータを作るため、NeXTを設立。
  - ジョージ・ルーカスからコンピュータグラフィックス部門を買収し、「ピクサー」と名付ける。
  - NeXT Cubeは技術的には優れていたが、高価すぎて商業的に失敗する。
  - 一方、ピクサーではジョン・ラセターの作る短編CGアニメに可能性を見出す。
  - スタンフォード大学で講演中、聴衆の中にいたローレン・パウエルと運命的に出会う。
  - 初めてのデートで、彼は心の壁を取り払い、彼女にプロポーズする。
  - ヨセミテ国立公園で仏教式の結婚式を挙げ、穏やかな時間を過ごす。
  climax: ピクサーの試写室で、ジョン・ラセターが短編アニメ『ティン・トイ』を披露する。おもちゃの視点から描かれたその作品は、技術だけでなく、心に訴えかける力を持っていた。ジョブズは、これが未来だと確信する。
  cliffhanger: ローレンと結婚し、幸せな家庭を築いたジョブズ。しかし、NeXTの経営は悪化の一途をたどる。銀行口座の残高が底を突きかけている。ローレンが心配そうに彼を見る。「スティーブ、私たち、大丈夫よね？」。彼は何も答えられない。—
    FADE TO BLACK.
