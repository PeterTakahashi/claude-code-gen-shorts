- id: ch3
  title_ja: ガレージの創世記
  title_en: Garage Genesis
  time_range: 1976-1978
  ages_covered: 21-23
  central_theme: 夢を形にするためには、何を犠牲にしなければならないのか？
  emotional_arc: ガレージでアップルを創業し、世界を変えるという純粋な情熱が燃え上がる。しかし、ビジネスの現実は厳しく、彼は資金繰りに奔走し、次第に冷酷な交渉人へと変貌していく。Apple IIの成功で頂点を極めるが、その裏で恋人クリスアンの妊娠を否定し、自らが最も恐れていた「捨てる」側の人間になってしまう。
  opening_hook: ポール・ジョブズのガレージ。ジョブズとウォズニアックが最初のApple Iコンピュータを半田付けしている。熱気と夢がガレージに満ちている。
  key_beats:
  - 実家のガレージでアップルコンピュータを創業。
  - Apple Iを地元のコンピュータショップに売り込むが、苦戦する。
  - マイク・マークラから決定的な投資を受け、会社が本格的に始動する。
  - ウォズニアックが設計した画期的なApple IIの開発に情熱を注ぐ。
  - 「シンプルで美しい製品」にこだわり、電源やケースのデザインにまで口を出す。
  - 恋人クリスアン・ブレナンが妊娠を告げるが、ジョブズは冷たく突き放し、自分の子ではないと否定する。
  - ウェストコースト・コンピュータ・フェスタでApple IIを発表。大きな注目を集める。
  climax: Apple IIが爆発的に売れ始め、若きジョブズとウォズニアックはシリコンバレーの寵児となる。会社のオフィスでシャンパンを開け、成功を祝う。
  cliffhanger: 成功の祝賀会の後、一人になったジョブズのもとにクリスアンから電話がかかる。「娘が生まれたわ。名前はリサ」。ジョブズは無言で電話を切り、その場に立ち尽くす。— FADE TO BLACK.
