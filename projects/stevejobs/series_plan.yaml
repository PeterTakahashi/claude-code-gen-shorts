- id: ch2
  title_ja: 荒野と天啓
  title_en: Wilderness and Epiphany
  time_range: 1972-1976
  ages_covered: 17-21
  central_theme: 本当の価値は、社会のルールの中にあるのか、それともその外にあるのか？
  emotional_arc: 制度的な学問（リード大学）に反発し、中退。彼は自分自身の道を求め、カリグラフィーの美や東洋思想といった、直感的で本質的なものに惹かれていく。インドでの放浪は彼を精神的に鍛え上げたが、同時に孤独も深めた。しかし、その経験の果てに、テクノロジーと精神性を融合させるという新たな天啓を得る。
  opening_hook: リード大学の授業料が高すぎると感じ、両親に負担をかけたくないジョブズは中退を決意。しかしキャンパスに残り、興味のある授業だけを聴講し始める。
  key_beats:
  - リード大学を中退し、空き瓶拾いで生計を立てながらカリグラフィーの授業にもぐる。
  - 書体の美しさに魅了される。「点は後になって繋がる」という哲学の萌芽。
  - アタリ社でビデオゲーム開発の仕事に就くが、その奇行で夜勤に回される。
  - 精神的な悟りを求め、すべてを捨ててインドへ旅立つ。
  - インドでの厳しい放浪生活。西洋的な価値観が崩壊する。
  - ヒマラヤの麓で、テクノロジーと人文科学を融合させるというビジョンを見る。
  - 帰国後、ウォズニアックが個人で作った驚異的なコンピュータ基板（後のApple I）と再会する。
  climax: インドから帰国し、髪を剃り、ぼろをまとったジョブズが、ウォズニアックの部屋で彼の作った基板がゲームを映し出すのを見る。その瞬間に、インドで得た精神的なビジョンと、目の前のテクノロジーが一つに繋がる。
  cliffhanger: ジョブズはウォズニアックの基板を手に持ち、真剣な眼差しで言う。「ウォズ、これを売るんだ。会社を立ち上げよう」。いたずら好きで内気なウォズは「冗談だろ？」と困惑した表情を浮かべる。— FADE TO BLACK.
