- id: ch6
  title_ja: 王国の失墜
  title_en: The Fall of the Kingdom
  time_range: '1985'
  ages_covered: '30'
  central_theme: 自ら作った王国から追放されるとき、人は何を見出すのか？
  emotional_arc: Macの販売不振をめぐり、ジョブズとスカリーの対立は修復不可能なレベルに達する。ジョブズはクーデターを試みるが失敗し、自分が創設した会社から全ての役職を剥奪される。人生の中心を失い、絶望のどん底に突き落とされるが、その暗闇の中で、彼は今まで知らなかった自分のルーツ（実の妹）と繋がるという皮肉な運命に導かれる。
  opening_hook: ジョブズとスカリーが会議室で激しく口論している。「会社を破壊する気か！」「君こそ私のビジョンを理解していない！」。二人の間の信頼は完全に崩壊している。
  key_beats:
  - Macの売上不振が続き、社内のジョブズへの風当たりが強まる。
  - ジョブズはスカリーを追放しようと取締役会に働きかけるが、逆にスカリーに察知される。
  - スカリーは取締役会を味方につけ、ジョブズの権限を剥奪することを決議させる。（Ch1のフックがここで回収される）
  - 自分が設立した会社で、ジョブズは全ての仕事を失い、名ばかりの会長となる。
  - 人気のないアップルの駐車場で、私物が入った段ボール箱を抱え、呆然と立ち尽くす。
  - 数ヶ月後、彼はアップルを正式に辞任する。
  - 失意の中、私立探偵から連絡があり、実の妹が見つかったと告げられる。
  climax: 取締役会で、スカリーがジョブズの権限剥奪を宣告する。かつての仲間たちは目を伏せ、誰も彼を助けない。ジョブズは裏切られたという表情で、一人、会議室を後にする。
  cliffhanger: がらんとした自宅の書斎。ジョブズは電話の受話器を握りしめている。電話の向こうから聞こえる、会ったことのない妹モナ・シンプソンの声。「もしもし…スティーブ？」。彼は言葉を発することができない。— FADE TO BLACK.
