  opening_hook: ジョブズがアップルのキャンパスを歩いている。壁には色褪せたポスター、社員には覇気がない。彼が愛した会社は見る影もなくなっていた。
  key_beats:
  - 経営危機に陥ったアップルが、OS獲得のためNeXTを買収。ジョブズは相談役として復帰する。
  - 復帰後、彼は会社の惨状を目の当たりにし、自分が動かなければ会社が死ぬと悟る。
  - 取締役会を説得し、CEOのギル・アメリオを追放。暫定CEO（iCEO）に就任する。
  - 最初の全社ミーティングで、彼は裸足でステージに上がり、社員に正直に語りかける。「この会社は船のようなものだ。そして船底には穴が空いている」。
  - 彼は大ナタを振るい、ニュートンを含む70%以上の製品を中止させる。社内からは悲鳴が上がる。
  - マイクロソフトのビル・ゲイツに電話し、ライバルからの投資を取り付けるという屈辱的な決断を下す。
  - 広告代理店と共に「Think Different.」キャンペーンを立ち上げる。
  climax: 役員会議室で、ジョブズが巨大なホワイトボードにシンプルな4つのマスを描く。「コンシューマー、プロ。デスクトップ、ポータブル。我々が作るのは、この4つだけだ」。役員たちは彼の狂気と明晰さに息をのむ。
  cliffhanger: 編集室で「Think Different.」のCMの最終版を見ているジョブズ。「Here's to the crazy ones...」のナレーションが流れる。彼は満足げに頷くが、その時、デザインスタジオの責任者から電話が入る。「スティーブ、見せたいものがある」。それは会社の運命を変える試作品だった。—
