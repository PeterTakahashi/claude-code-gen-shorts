foreshadowing:
- id: kokoro_no_tobira
  description: 'A recurring INTERIOR door symbolizes Steve''s psychological state, from his initial wound of abandonment to
    his own acts of rejection. The emotional question is: Can he ever truly open himself up to others, or will he die with
    the door closed?'
  type: object
  intended_emotional_arc: A door as a child's retreat from pain transforms into a weapon of rejection, then a symbol of his
    own exile, and finally a barrier of regret he can no longer cross.
  chain:
  - episode: ch1
    beat: After learning he is adopted, young Steve quietly closes his simple wooden bedroom door on his concerned parents,
      shutting out their comfort. The soft click is the first sound of his inner world closing off.
    role: plant
  - episode: ch3
    beat: After denying paternity of Lisa, Steve closes a sleek, modern office door on Chrisann Brennan. The sharp, definitive
      thud of the door is an act of aggressive denial, a weaponized barrier.
    role: transform
  - episode: ch6
    beat: After being fired, Steve stands alone in an empty Apple office. We see him from the hallway as the boardroom door
      is closed on him by others. The door is now a symbol of his own abandonment and powerlessness.
    role: transform
  - episode: ch11
    beat: An older, sick Steve has a difficult conversation with Lisa. She leaves, leaving her bedroom door slightly ajar.
      He looks at the sliver of light, wanting to follow, to open it fully, but remains frozen. The door becomes a symbol
      of a final, unresolved opportunity for connection.
    role: payoff
- id: naritakunakatta_oya
  description: 'The cycle of abandonment, planted by the sterile legal language of his adoption, is repeated when Steve rejects
    his own daughter. The emotional question is: Can he recognize and break the cycle of the wound he carries?'
  type: phrase
  intended_emotional_arc: A phrase that defined his own feeling of being unwanted becomes the justification he uses to make
    his own child unwanted, culminating in a moment of horrifying self-recognition and, finally, apology.
  chain:
  - episode: ch1
    beat: A young Steve finds his adoption papers. A close-up shows the legal phrase:「実親による養育が困難」 ('Raising the child is difficult
      for the biological parents'). This becomes his internal scar.
    role: plant
  - episode: ch3
    beat: In a fight with a pregnant Chrisann, Steve yells, 「僕には無理だ！」 ('I can't do it!'), echoing the sentiment that raising
      a child is too 'difficult'. He is unconsciously repeating the pattern.
    role: echo
  - episode: ch4
    beat: Forced by a paternity test to pay child support, Steve tells his lawyer, 「父親としての養育は困難だ」 ('Raising her as a father
      is difficult'). He is now consciously weaponizing the same logic that wounded him.
    role: transform
  - episode: ch11
    beat: Lisa visits her ailing father and tells him, "It always felt like I was a problem that was too difficult for you."
      Hearing the word 'difficult' from her voice, he finally sees the pattern and offers a genuine, tearful apology, breaking
      the cycle.
    role: payoff
- id: kaerubeki_basho
  description: 'Paul Jobs'' garage workbench serves as a recurring symbol of creation and paternal love. The emotional question
    is: What is the true source of innovation—mythic genius or simple, honest craftsmanship?'
  type: setting
  intended_emotional_arc: The workbench transforms from a symbol of a father's love to a mythical origin story, then a standard
    of 'soul' he finds lacking in corporate labs, and finally a memory of what truly mattered.
  chain:
  - episode: ch1
    beat: 'The first flashback is a child''s-eye view of Paul Jobs'' workbench: neatly arranged tools, the smell of wood,
      and his father''s gentle hands. It represents safety and the power of craft.'
    role: plant
  - episode: ch3
    beat: The same workbench is now chaotically covered in wires and parts as Steve and Woz build the Apple I. The space has
      been transformed from paternal craft to the crucible of revolution.
    role: transform
  - episode: ch9
    beat: Returning to Apple, Steve walks through Jony Ive's sterile, state-of-the-art design lab. He runs a hand over a pristine
      metal workbench, and for a moment, a translucent overlay of his father's wooden bench appears. He feels something is
      missing.
    role: echo
  - episode: ch12
    beat: Near the end, a frail Steve looks at an old photo of himself and his father in the garage. His gaze is fixed not
      on the computer they built, but on his father's hands on the workbench, finally understanding that the love and values
      his father taught him were the true foundation.
    role: payoff
- id: tsuuka_no_hensen
  description: 'The meaning of specific sums of money transforms throughout Steve''s life. The emotional question is: Can
    wealth fill the void left by his core wound, or does it merely amplify his loneliness?'
  type: object
  intended_emotional_arc: Money evolves from proof of worth, to fuel for ambition, to a weapon of revenge, and finally to
    an irrelevant number in the face of mortality.
  chain:
  - episode: ch1
    beat: Steve and Woz count a small wad of cash from selling Blue Boxes, around $200. The crisp bills in his hand mean 'We're
      smarter than the system.'
    role: plant
  - episode: ch3
    beat: 'The camera focuses on the first major investment check for Apple: $250,000. For Steve, this number means ''My vision
      is real and validated.'''
    role: echo
  - episode: ch8
    beat: 'After the Pixar IPO, a newspaper headline displays his new net worth: ''$1.5 Billion''. He looks at the number
      with cold satisfaction. It means ''I have won. I have beaten those who exiled me.'''
    role: transform
  - episode: ch12
    beat: A lawyer discusses his multi-billion dollar estate. Steve ignores him, looking at his family in the garden. The
      enormous number is meaningless compared to a simple, tangible moment of life. The payoff is that the largest sum means
      less to him than the first.
    role: payoff
- id: it_is_not_good_enough
  description: 'Steve''s signature phrase of criticism, ''It''s not good enough,'' reveals his internal struggle with his
    own perceived imperfections. The question is: Is his perfectionism a creative gift or a destructive curse?'
  type: phrase
  intended_emotional_arc: The phrase evolves from a passionate motivator to a tool of cruelty, then matures into focused leadership,
    before finally being turned inward in a moment of tragic self-awareness.
  chain:
  - episode: ch3
    beat: In the garage, Steve tells Wozniak an early design 'is not good enough,' with a fiery passion to make something
      great together.
    role: plant
  - episode: ch4
    beat: He screams 'It's not good enough!' at a terrified engineer on the Lisa team, turning the phrase into a weapon of
      fear.
    role: transform
  - episode: ch10
    beat: 'He tells the iPod team their prototype ''is not good enough,'' but immediately follows it with an inspiring, concrete
      goal: ''Three clicks to any song.'' The phrase is now a tool of visionary leadership.'
    role: transform
  - episode: ch11
    beat: After cancer surgery, Steve sees his gaunt, scarred reflection in a mirror and whispers to himself, 'It's not good
      enough.' The brutal judgment he inflicted on others is finally directed at his own mortal, imperfect body.
    role: payoff
- id: hadashi_no_hankotsu
  description: 'Steve''s recurring habit of walking barefoot. The emotional question is: Is his non-conformity a source of
    genuine freedom or a defense mechanism against a world that rejected him?'
  type: gesture
  intended_emotional_arc: The gesture transforms from a symbol of hippie rebellion to a sign of arrogant disrespect, then
    to a calculated branding tool, and finally to a mark of pure vulnerability.
  chain:
  - episode: ch2
    beat: At Reed College, Steve walks barefoot on the campus green, an expression of counter-culture freedom.
    role: plant
  - episode: ch3
    beat: He props his bare, dirty feet on a boardroom table, horrifying investors. It is an act of youthful arrogance and
      a power play.
    role: echo
  - episode: ch9
    beat: On stage for his first all-hands meeting after returning as iCEO, he is barefoot. It's a calculated signal to employees
      that the rebellious, creative soul of Apple is back.
    role: transform
  - episode: ch12
    beat: In his final days, a shot focuses on his bare feet walking slowly and unsteadily on the floor of his home. No longer
      a statement, his bareness is now a simple, profound sign of his human frailty.
    role: payoff
- id: calligraphy_no_ten
  description: 'The seemingly useless art of calligraphy becomes a central metaphor for Steve''s life philosophy. The emotional
    question is: Can trusting in beauty and intuition, without a practical goal, lead to the greatest outcomes?'
  type: object
  intended_emotional_arc: A youthful, impractical passion for fonts is first seen as a frivolous distraction, then becomes
    the secret ingredient of a revolution, and is finally articulated as the core philosophy of his life.
  chain:
  - episode: ch2
    beat: At Reed College, Steve is captivated by the beautiful typography on posters for a calligraphy class he audits. This
      is a pure, impractical love of beauty.
    role: plant
  - episode: ch5
    beat: During Mac development, Steve's obsession with creating multiple, elegant fonts is a point of conflict with engineers
      who see it as a waste of resources.
    role: echo
  - episode: ch5
    beat: At the Macintosh launch, the friendly 'Hello' on screen, rendered in a beautiful font, is key to the machine's revolutionary,
      human-centric appeal. The impractical passion is vindicated.
    role: transform
  - episode: ch11
    beat: 'In his Stanford speech, he tells the calligraphy story and delivers the line: ''You can''t connect the dots looking
      forward; you can only connect them looking backwards.'' The visual motif is explicitly transformed into his life''s
      central philosophy.'
    role: payoff
- id: gates_to_iu_kagami
  description: 'The evolving relationship with rival Bill Gates. The emotional question is: Was Gates a villain to be defeated,
    or a mirror reflecting the pragmatic side of genius that Steve lacked?'
  type: character_relationship
  intended_emotional_arc: The relationship moves from arrogant dismissal to bitter betrayal, to a humiliating plea for help,
    and finally to a quiet, profound respect between the only two men who shared a similar path.
  chain:
  - episode: ch3
    beat: A young, nerdy Bill Gates visits Apple. Steve treats him with dismissive arrogance, seeing him as a lesser mind.
    role: plant
  - episode: ch5
    beat: Steve discovers Microsoft is developing Windows and screams at Gates in a boardroom, 'I trusted you, and now you're
      stealing from us!' The rivalry is now a deep personal betrayal.
    role: transform
  - episode: ch9
    beat: To save a dying Apple, Steve must make a deal with Microsoft. Bill Gates appears on a giant screen behind Steve
      at a keynote, a moment of ultimate public humiliation and pragmatism for Steve.
    role: transform
  - episode: ch11
    beat: In one of their last joint interviews, years later, the animosity is gone. They trade compliments and share insights,
      having reached a place of mutual, hard-earned respect. The war is over.
    role: payoff
- id: kuro_no_turtleneck
  description: 'The color black, from the NeXT Cube to his iconic turtleneck, represents his evolving philosophy of simplicity
    and control. The emotional question is: Is simplicity a tool for clarity or a means of erasure?'
  type: color_palette
  intended_emotional_arc: Black evolves from a symbol of impractical, sophisticated failure to a uniform of absolute control,
    and finally to a stark metaphor for the ultimate reality of death.
  chain:
  - episode: ch7
    beat: The perfect, matte black NeXT Cube is revealed. It is an aesthetic masterpiece and a commercial failure. Black here
      means beautiful but impractical perfection.
    role: plant
  - episode: ch9
    beat: 'Upon his return to Apple, Steve adopts his uniform: the black turtleneck. Black now symbolizes his new, focused,
      ruthless efficiency and the creation of his own iconic brand.'
    role: transform
  - episode: ch11
    beat: At the iPhone keynote, he is a lone figure in black on a dark stage, holding a black device. He has merged with
      his creation. Black represents the peak of his reality distortion field—a perfect, controlled universe.
    role: transform
  - episode: ch12
    beat: The final shot of the series is not of Steve, but a final, silent FADE TO BLACK. The ultimate simplicity, no longer
      a design choice but the inevitable void he has spent his life trying to fill with 'dents in the universe.'
    role: final
- id: ringo_to_iu_kajitsu
  description: 'The literal apple fruit appears at key moments, its meaning changing with Steve''s philosophy and health.
    The emotional question is: What is the true source of life—radical ideology or simple nature?'
  type: object
  intended_emotional_arc: The apple transforms from a symbol of quirky identity, to a weapon of ideological purity, to a flawed
    tool of denial against death, and finally back to a simple, life-giving fruit.
  chain:
  - episode: ch2
    beat: During his fruitarian phase, a young Steve is constantly eating an apple. It's the source of his company's name
      and part of his counter-culture identity.
    role: plant
  - episode: ch3
    beat: While arguing with Chrisann about her pregnancy, he bites into an apple while lecturing her on purity and diet.
      The fruit becomes a symbol of his rigid, controlling ideology.
    role: transform
  - episode: ch11
    beat: Diagnosed with cancer, he attempts to cure himself with a radical fruit diet. His kitchen is full of apples. The
      fruit is now a symbol of his hubris and his belief that he can bend reality to his will.
    role: transform
  - episode: ch12
    beat: In his final days, Laurene brings him a single, peeled and sliced apple. He manages one small bite. The apple is
      no longer a brand or an ideology; it is simply food, a final, humble connection to the natural world.
    role: payoff
- id: tatta_hitotsu_no_button
  description: 'The design obsession with removing buttons, culminating in the iPhone''s Home button. The emotional question:
    Is ultimate simplicity a gift to the user, or the ultimate act of control by the creator?'
  type: object
  intended_emotional_arc: The quest for fewer buttons evolves from a niche design principle to a ruthless development mantra,
    and finally becomes the ultimate symbol of his philosophy to make technology disappear.
  chain:
  - episode: ch4
    beat: Shown a three-button Xerox mouse, Steve immediately insists, 'It has to have one.' This plants his core hardware
      philosophy.
    role: plant
  - episode: ch10
    beat: While designing the iPod, he rejects a multi-button layout and demands the creation of the simple, intuitive scroll
      wheel. His obsession with reduction is intensifying.
    role: echo
  - episode: ch11
    beat: 'In a secret iPhone meeting, Steve makes the final call: no physical keyboard, just one button on the face. The
      Home button. It is the ultimate act of dictating the user''s experience.'
    role: transform
  - episode: ch12
    beat: A final montage of people effortlessly using iPhones and iPads shows that his goal was not just to remove buttons,
      but to make the interface so direct that the technology itself becomes invisible, leaving only the experience. The user's
      finger is the final 'button.'
    role: payoff
