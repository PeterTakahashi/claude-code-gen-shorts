- id: ch5
  title_ja: 海賊たちの革命
  title_en: The Pirate's Revolution
  time_range: '1984'
  ages_covered: '29'
  central_theme: 革命は世界を変えるが、その熱狂は永遠には続かない。
  emotional_arc: ジョブズとMacチームは、狂信的な情熱でMacintoshを完成させる。伝説のCM「1984」と感動的な発表会で、ジョブズは時代の寵児として頂点を極める。それは単なる製品発表ではなく、IBMという巨人に立ち向かう文化的な革命だった。しかし、その輝かしい勝利の裏で、売上不振という厳しい現実が忍び寄る。
  opening_hook: Macintosh開発チームは発売日前の過酷なデバッグ作業に追われている。ジョブズは「素晴らしいものじゃなきゃダメなんだ！」とチームを鼓舞し、自らもコーディングに没頭する。
  key_beats:
  - Macintosh開発が大詰めを迎え、チームは疲労困憊している。
  - リドリー・スコット監督による画期的なCM「1984」の制作。
  - 取締役会は「1984」CMを嫌い、放送中止を求めるが、ジョブズは独断で放送枠を買い取り、強行する。
  - スーパーボウルでCMが放送され、アメリカ中に衝撃を与える。
  - 1984年1月24日、株主総会でのMacintosh発表会。ジョブズは天才的なプレゼンターとしての才能を開花させる。
  - Macintoshが自ら「Hello」と喋り、会場は熱狂の渦に包まれる。
  - ビル・ゲイツとのライバル関係が表面化する。
  climax: スポットライトを浴びたジョブズが、黒いバッグからMacintoshを取り出す。フロッピーディスクを挿入すると、スクリーンに文字が現れ、合成音声が響く。「こんにちは、私はマッキントッシュです…」。聴衆は総立ちとなり、喝采が鳴り響く。
  cliffhanger: 発表会の熱狂から数週間後。スカリーが厳しい表情で売上報告書をジョブズの机に置く。「スティーブ、問題がある」。グラフは予測を大きく下回っていた。ジョブズの得意げな表情が固まる。— FADE TO BLACK.
