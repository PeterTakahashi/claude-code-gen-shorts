- id: ch10
  title_ja: 色彩と魂
  title_en: Color and Soul
  time_range: 1998-2001
  ages_covered: 43-46
  central_theme: テクノロジーは、いかにして人の感情と繋がり、生活を豊かにすることができるのか？
  emotional_arc: ジョブズは、デザイナーのジョナサン・アイブと魂のパートナーシップを築き、退屈なPC業界にiMacで「色」と「楽しさ」を取り戻す。アップルは劇的に復活し、彼は再び時代のアイコンとなる。iMacの成功に続き、彼は音楽という、よりパーソナルで感情的な領域に踏み込み、iPodで世界の人々の音楽体験を根底から変えてしまう。
  opening_hook: アップルのデザインスタジオ。ジョブズとジョナサン・アイブが、半透明のプラスチックで作られたiMacの試作品を前に、何時間もディテールについて語り合っている。二人の間には完璧な共鳴があった。
  key_beats:
  - ジョブズとアイブの協力で、iMac G3が開発される。
  - ボンダイブルーのiMacが発表され、大ヒット。アップル復活の象徴となる。
  - Apple Storeの構想を練り、リテール体験そのものをデザインしようとする。
  - 音楽業界がデジタル化の波に乗り遅れていることに気づく。
  - 「ポケットに1000曲を」というシンプルなコンセプトのもと、iPod開発プロジェクトを極秘に開始する。
  - エンジニアたちに不可能な小型化を要求し、現実歪曲フィールドを駆使して開発を推し進める。
  - 2001年10月23日、iPodを発表するが、当初のメディアの反応は冷ややかだった。
  climax: ジョブズが、試作品のiPodを水槽に落とすエピソード。「気泡が出るだろう？まだスペースがある証拠だ。もっと小さくしろ」。彼の完璧への執着と、常識を覆す発想が凝縮された瞬間。
  cliffhanger: iPod発表後、ジョブズは家族と穏やかな時間を過ごしている。しかし、彼は密かに体の不調を感じていた。ある日、定期検診の結果を聞くために訪れた病院で、医師が深刻な顔でCTスキャン画像を指し示す。— FADE TO BLACK.
