- id: ch11
  title_ja: 点と点
  title_en: Connecting the Dots
  time_range: 2003-2007
  ages_covered: 48-52
  central_theme: 死を意識することは、いかにして最高の創造を生み出す原動力となるか？
  emotional_arc: 膵臓がんの診断を受け、ジョブズは初めて自らの死と直面する。彼は手術を拒み、独自の治療法を試すが、それは彼の傲慢さの表れでもあった。死の淵から生還した彼は、スタンフォード大学の卒業式で自らの人生を振り返り、「点と点を繋ぐ」という哲学を語る。そして、残された時間で、自らのビジョンの集大成であるiPhoneを、狂気的な情熱で完成させようと奔走する。
  opening_hook: 医師から膵臓がんを告知されるジョブズ。彼はその事実を受け入れられず、これは間違いだと主張する。
  key_beats:
  - 癌の診断を受けるが、9ヶ月間手術を拒否し、食事療法などを試みる。
  - 家族の説得でついに手術を受け、一命をとりとめる。
  - 2005年、スタンフォード大学の卒業式で伝説的なスピーチを行う。「ハングリーであれ。愚か者であれ」。
  - iPodの成功に満足せず、携帯電話と融合させるプロジェクトを極秘に開始する。
  - iPhone開発は、社内の2チームを競わせるなど、熾烈を極める。
  - 彼の健康は回復していないが、その事実を隠し、プロジェクトを強引に推進する。
  - 発表会直前、iPhoneのプロトタイプはまだ不安定で、デモが成功する保証はどこにもなかった。
  climax: スタンフォード大学の卒業式のスピーチ。「自分がもうすぐ死ぬことを思い出すのは、人生の大きな決断をする上で最も重要なツールだ」。彼は穏やかに、しかし力強く、自らの死生観を語る。
  cliffhanger: 2007年、Macworldのステージ袖。発表まであと数分。ジョブズは黒のタートルネック姿で、手の中でiPhoneのプロトタイプを握りしめている。彼の顔には汗が滲んでいる。デモが失敗すれば、すべてが終わる。彼は深く息を吸い、ステージへと一歩踏み出す。—
    FADE TO BLACK.
