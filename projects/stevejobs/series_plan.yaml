- id: ch12
  title_ja: 宇宙の片隅に
  title_en: A Ding in the Universe
  time_range: 2007-2011
  ages_covered: 52-56
  central_theme: 人が遺せるものとは何か？ 製品か、会社か、それとも思想そのものか。
  emotional_arc: iPhoneは世界を変え、ジョブズは生きる伝説となる。しかし、彼の体は病魔に蝕まれ、痩せ衰えていく。彼は自らの死期を悟りながらも、最後の力を振り絞り、iPadと、未来のアップルのための新社屋の設計に情熱を注ぐ。それは、彼がいなくなった後も、彼が信じた創造の精神が生き続けるための最後の戦いだった。
  opening_hook: iPhone発表会。デモは完璧に成功し、世界は新しい時代の幕開けに熱狂する。ステージ上のジョブズは、安堵と誇りに満ちた表情を浮かべる。
  key_beats:
  - iPhoneの大成功により、アップルは世界で最も価値のある企業の一つになる。
  - ジョブズの健康状態は悪化し、公の場に現れるたびにその痩せた姿が憶測を呼ぶ。
  - 彼は病をおして、コンピュータとスマートフォンの間を埋める新デバイス、iPadの開発を指揮する。
  - 2010年、椅子に座りながらも、気迫のこもったプレゼンでiPadを発表する。
  - CEOをティム・クックに譲ることを決断する。
  - 最後の仕事として、彼が「宇宙船」と呼ぶアップルの新社屋「Apple Park」の設計に没頭する。
  - 家族に見守られながら、自宅で静かに息を引き取る。（このシーンは直接描かず、示唆するに留める）
  climax: CEO退任後、やつれた体でクパチーノ市議会に出席し、新社屋の建設計画を自らプレゼンする。「私たちは、世界最高のオフィスビルを建てるチャンスがある」。彼の声は弱々しいが、その目には未来への確信が宿っていた。
  cliffhanger: 最後のシーン。時間は少し遡り、ジョブズはデザインスタジオで、Apple Parkの巨大な模型を前にJony Iveと立っている。彼は模型の完璧な円を指でなぞる。「完璧でなければ意味がない。ただの円じゃない。始まりも終わりもない、無限のループなんだ」。彼は顔を上げ、チームを見つめる。その目は、病を感じさせない、かつての燃えるような情熱に満ちている。—
    FREEZE FRAME. FADE TO BLACK.
