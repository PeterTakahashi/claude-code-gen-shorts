research:
  subject: スティーブ・ジョブズ
  birth_year: 1955
  death_year_or_null: 2011
  timeline:
  - year: 1955
    age: 0
    event: サンフランシスコで生まれ、ポールとクララ・ジョブズ夫妻の養子となる。
    location: サンフランシスコ、カリフォルニア州
    emotional_significance: 私は「選ばれた」存在だと聞かされて育ったが、心のどこかでは「捨てられた」という感覚が消えることはなかった。
    factual_certainty: certain
  - year: 1968
    age: 13
    event: ヒューレット・パッカードの共同創業者ビル・ヒューレットに直接電話をかけ、周波数カウンタの部品を依頼し、夏の仕事を得る。
    location: パロアルト、カリフォルニア州
    emotional_significance: 欲しいものがあるなら、ただ手を伸ばして掴めばいいのだと、この時学んだ。
    factual_certainty: certain
  - year: 1971
    age: 16
    event: 友人スティーブ・ウォズニアックと共に、無料で長距離電話をかけられる「ブルーボックス」を製作・販売する。
    location: クパチーノ、カリフォルニア州
    emotional_significance: 二人でなら、巨大なシステムを出し抜き、世界をコントロールできるのだという全能感を初めて味わった。
    factual_certainty: certain
  - year: 1972
    age: 17
    event: リード大学に入学するも、わずか1学期で中退。しかしその後も大学に居座り、カリグラフィー（書道）の授業など、興味のある科目だけを聴講する。
    location: ポートランド、オレゴン州
    emotional_significance: 人生の点は、後になって初めて繋がる。この無目的に見えた学びが、後にMacの美しいフォントとして結実するとは、当時は知る由もなかった。
    factual_certainty: certain
  - year: 1974
    age: 19
    event: 精神的な悟りを求め、インドへ放浪の旅に出る。ヒッピー文化と東洋思想に深く傾倒する。
    location: インド
    emotional_significance: 西洋の合理主義だけではない、直感と精神の世界があることを肌で感じた。この経験が、私の製品デザインの根底にあるシンプルさの哲学を形作った。
    factual_certainty: certain
  - year: 1976
    age: 21
    event: スティーブ・ウォズニアック、ロン・ウェインと共に、実家のガレージでアップルコンピュータを創業。
    location: ロスアルトス、カリフォルニア州
    emotional_significance: 世界を変えるという途方もない夢が、埃っぽいガレージの中で、半田ごての匂いと共に産声を上げた瞬間だった。
    factual_certainty: certain
  - year: 1977
    age: 22
    event: アップルIIを発表。個人向けコンピュータとして初めて商業的に大成功を収める。
    location: クパチーノ、カリフォルニア州
    emotional_significance: テクノロジーが、専門家だけでなく、すべての人の手に渡る未来が見えた。我々は革命の先頭に立っていた。
    factual_certainty: certain
  - year: 1978
    age: 23
    event: 恋人クリスアン・ブレナンとの間に娘リサが生まれるが、当初、父親であることを法的に否定する。
    location: カリフォルニア州
    emotional_significance: 私は自分の過去と向き合えず、最も大切なはずの存在から目を背けるという、人生最大の過ちを犯した。
    factual_certainty: certain
  - year: 1983
    age: 28
    event: ペプシコーラの社長だったジョン・スカリーを「このまま一生砂糖水を売り続けるか、私と世界を変えるか」と口説き、アップルのCEOに迎える。
    location: クパチーノ、カリフォルニア州
    emotional_significance: 私は自分の未熟さを棚に上げ、会社を導く「大人」を外から連れてきてしまった。それが悲劇の始まりだった。
    factual_certainty: certain
  - year: 1984
    age: 29
    event: 初代Macintoshを発表。画期的なグラフィカルユーザインタフェースを備え、伝説的なCM「1984」と共に鮮烈なデビューを飾る。
    location: クパチーノ、カリフォルニア州
    emotional_significance: これは単なる新製品ではなかった。コンピュータを「人のための道具」にするという、私の信念の結晶だった。
    factual_certainty: certain
  - year: 1985
    age: 30
    event: 業績不振とジョン・スカリーとの対立の末、自分が創設したアップルから追放される。
    location: クパチーノ、カリフォルニア州
    emotional_significance: 人生の中心だったすべてを失った。あの時の絶望感と屈辱は、言葉では言い尽くせない。
    factual_certainty: certain
  - year: 1985
    age: 30
    event: アップルを去った後、教育・研究市場向けのコンピュータを開発する新会社「NeXT」を設立。
    location: レッドウッドシティ、カリフォルニア州
    emotional_significance: 私は再び初心者になる必要があった。この「荒野」の時代が、結果的に私をより成熟させてくれた。
    factual_certainty: certain
  - year: 1986
    age: 31
    event: ジョージ・ルーカスからコンピュータグラフィックス部門を1000万ドルで買収し、「ピクサー」と名付ける。
    location: エメリービル、カリフォルニア州
    emotional_significance: テクノロジーとアートの融合。それは私がずっと追い求めてきたテーマであり、ピクサーはその完璧な表現だった。
    factual_certainty: certain
  - year: 1991
    age: 36
    event: ローレン・パウエルと結婚。ヨセミテ国立公園で仏教式の結婚式を挙げる。
    location: ヨセミテ国立公園、カリフォルニア州
    emotional_significance: 彼女と出会い、初めて心から安らげる場所、本当の家族を見つけることができた。
    factual_certainty: certain
  - year: 1995
    age: 40
    event: ピクサーが制作した世界初の長編フルCGアニメーション映画『トイ・ストーリー』が公開され、世界的な大ヒットとなる。
    location: ハリウッド、カリフォルニア州
    emotional_significance: アップルでの失敗とは全く違う形で、私は再び世界を驚かせることができた。それは最高の雪辱だった。
    factual_certainty: certain
  - year: 1996
    age: 41
    event: 経営危機に陥ったアップルがNeXTを4億2900万ドルで買収。ジョブズは「相談役」としてアップルに復帰する。
    location: クパチーノ、カリフォルニア州
    emotional_significance: 追放された我が家への、予期せぬ形での帰還。運命の輪が一周したのを感じた。
    factual_certainty: certain
  - year: 1997
    age: 42
    event: 暫定CEO（iCEO）に就任。「Think Different.」キャンペーンを開始し、瀕死のアップルを再建する道を歩み始める。
    location: クパチーノ、カリフォルニア州
    emotional_significance: 会社を救うため、私は過去の製品ラインを切り捨て、非情な決断を下した。それはアップルの魂を取り戻すための儀式だった。
    factual_certainty: certain
  - year: 1998
    age: 43
    event: 革新的なデザインのiMacを発表。大ヒットとなり、アップル復活の象徴となる。
    location: クパチーノ、カリフォルニア州
    emotional_significance: 退屈なベージュの箱しかなかった業界に、我々は色と楽しさを取り戻した。再び、未来は我々のものだった。
    factual_certainty: certain
  - year: 2001
    age: 46
    event: 携帯音楽プレイヤー「iPod」を発表。「ポケットに1000曲を」というコンセプトで音楽業界に革命を起こす。
    location: クパチーノ、カリフォルニア州
    emotional_significance: テクノロジーは、人の暮らしに寄り添い、感情を豊かにするものでなければならない。iPodはその証明だった。
    factual_certainty: certain
  - year: 2003
    age: 48
    event: 膵臓がんの診断を受ける。手術を9ヶ月間拒否し、食事療法などを試みる。
    location: パロアルト、カリフォルニア州
    emotional_significance: 死という現実を前に、私は自分の信念と直感を信じようとした。しかし、それは科学を軽視した傲慢さだったのかもしれない。
    factual_certainty: certain
  - year: 2005
    age: 50
    event: スタンフォード大学の卒業式で、自らの人生、愛、そして死について語る伝説的なスピーチを行う。
    location: スタンフォード、カリフォルニア州
    emotional_significance: 死を意識することこそが、本当に生きるための最良の道具だと、私は心から伝えたかった。「Stay hungry, stay foolish.」と。
    factual_certainty: certain
  - year: 2007
    age: 52
    event: iPhoneを発表。タッチスクリーン、携帯電話、インターネット端末を融合させ、再び世界を変える。
    location: サンフランシスコ、カリフォルニア州
    emotional_significance: これこそが、私が夢見てきた究極のデバイスだった。すべての点が繋がり、一つの魔法のような製品が生まれた。
    factual_certainty: certain
  - year: 2010
    age: 55
    event: タブレット端末「iPad」を発表。コンピュータとスマートフォンの間を埋める新たなカテゴリを創造する。
    location: サンフランシスコ、カリフォルニア州
    emotional_significance: ソファに寝転がってインターネットを楽しめる、最高にパーソナルな体験。テクノロジーが、ついにここまで来たのだ。
    factual_certainty: certain
  - year: 2011
    age: 56
    event: 8月にCEOを退任し、10月5日に家族に見守られながら自宅で死去。
    location: パロアルト、カリフォルニア州
    emotional_significance: 私は宇宙に痕跡を残したかった。それができたかどうかは、歴史が判断するだろう。
    factual_certainty: certain
