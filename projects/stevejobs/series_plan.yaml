- id: ch4
  title_ja: 楽園の父と蛇
  title_en: The Father of Eden and the Serpent
  time_range: 1979-1983
  ages_covered: 24-28
  central_theme: 完璧な世界を創ろうとする情熱は、いつ暴走し、創造主自身を破滅させるのか？
  emotional_arc: 億万長者となったジョブズは、次なる野心的なプロジェクト「Lisa」で完璧を追求するあまり、チームを疲弊させ、プロジェクトから追放される。彼はその屈辱をバネに、社内で海賊チームを結成し「Macintosh」開発を始める。しかし、会社を経営する「大人」が自分にはいないと悟り、外から理想の父親像（ジョン・スカリー）を招き入れてしまう。
  opening_hook: ジョブズはパロアルト研究所（Xerox PARC）で、マウスとグラフィカルユーザインタフェース（GUI）のデモを見て衝撃を受ける。「どうして君たちはこれを製品化しないんだ！」
  key_beats:
  - Xerox PARCでGUIの天啓を得、次世代コンピュータ「Lisa」にその技術を投入する。
  - 完璧主義と罵詈雑言でLisaチームを恐怖で支配する。
  - 取締役会はジョブズの暴走を問題視し、彼をLisaプロジェクトから外す。
  - 屈辱を感じたジョブズは、社内の小さなチームを乗っ取り「Macintosh」開発を秘密裏に開始する。
  - Macチームのオフィスに海賊の旗を掲げ、反逆者としてのアイデンティティを確立する。
  - 自らの経営能力の未熟さを痛感し、理想の指導者を探し始める。
  - ペプシコーラの社長、ジョン・スカリーに狙いを定める。
  climax: ジョブズはスカリーを口説き落とすため、メトロポリタン美術館に呼び出す。そして、あの有名な殺し文句を口にする。「このまま一生、砂糖水を売り続けたいか？ それとも私と一緒に来て、世界を変えたいか？」
  cliffhanger: スカリーはジョブズの言葉に心を動かされ、しばらく沈黙する。彼の答えはまだわからない。ジョブズは息を飲んでその表情を見つめる。— FADE TO BLACK.
