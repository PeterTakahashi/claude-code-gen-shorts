ja:
  title: 'Zaif 67億円が消えた深夜 #Shorts'
  description: '※この動画は歴史・事件解説です。投資助言ではありません。仮想通貨投資は元本割れリスクがあります。


    8年前の2018年9月、大阪の暗号通貨取引所Zaifから、BTC・BCH・MONAの合計67億円分が、流出した。

    Coincheck事件のわずか8か月後に再発した、日本の暗号資産事件を、30秒で振り返ります。


    #Shorts #Zaif #仮想通貨事件 #事件解説 #暗号資産

    '
  hook_caption: Zaif、67億円が消えた
  series_brand: Zaif事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 8年前の2018年9月、大阪に本社を置く暗号通貨取引所Zaifから、合計67億円分のBTC・BCH・MONAが、流出した事件を、覚えていますか?
    caption: Zaifから67億円分の暗号資産が流出
  - panel: p2
    text: 流出が起きたのは、9月14日の夕方から夜にかけてです。運営会社Tech BureauのCEO朝山貴生は、社内アラートで異変に気づきましたが、すでに数億円が、外部のアドレスへ動いた後でした。
    caption: 9月14日夜、Tech Bureau社内が騒然
  - panel: p3
    text: 原因は、Coincheck事件と同じ、ホットウォレットへの偏重保管でした。8か月前の教訓が、業界全体には、徹底されていなかったんです。
    caption: 8か月前のCoincheck事件の教訓が活きず
  - panel: p4
    text: 9月20日、朝山CEOらは記者会見で深々と頭を下げ、フィスコグループからの資本支援と、事業譲渡を、同時に発表しました。会社単体での再建は、断念しています。
    caption: 9月20日、フィスコへ事業譲渡を発表
  - panel: p5
    text: その後、金融庁はTech Bureauに対して、業務改善命令を発出しました。最終的に、暗号資産交換業の登録は、抹消されています。
    caption: 金融庁が業務改善命令、登録抹消へ
  - panel: p6
    text: Coincheckに続くZaif事件によって、日本の暗号資産取引所は、ホットウォレット制限と、コールド保管率の規制が、厳格化されました。2018年は、日本仮想通貨史の、転換点でした。
    caption: 2018年、日本暗号資産規制の転換点
en:
  title: 'How $60 Million in Crypto Vanished From a Japanese Exchange #Shorts'
  description: 'In September 2018, Japanese crypto exchange Zaif lost $60 million in a devastating hack. This is the story of how it happened, just 8 months after another major heist rocked Japan''s crypto
    industry.


    #Shorts #Crypto #Hacking #TrueStory #Japan'
  hook_caption: Their Screen Cracked, Then $60M Disappeared
  series_brand: The Zaif Heist
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In September 2018, a late-night alert lit up the screens at Japanese crypto exchange Zaif. It was the start of a $60 million heist.
    caption: The $60M Heist Begins
  - panel: p2
    text: By the time the CEO was notified, millions of dollars in Bitcoin, Bitcoin Cash, and Monacoin had already been drained to an external address.
    caption: Too Little, Too Late
  - panel: p3
    text: 'The cause was a critical security flaw: keeping the majority of funds in an internet-connected ''hot wallet'', the same mistake that doomed another exchange just 8 months earlier.'
    caption: A Lesson Unlearned
  - panel: p4
    text: Six days later, the CEO bowed in apology, announcing the company couldn't recover on its own and would be acquired by the Fisco group.
    caption: A Public Apology
  - panel: p5
    text: Japan's Financial Services Agency stepped in, issuing a business improvement order before ultimately revoking the company's license to operate.
    caption: Regulators Step In
  - panel: p6
    text: The Zaif incident became a major turning point, forcing Japan to implement much stricter regulations on how crypto exchanges must secure customer funds.
    caption: A Turning Point for Crypto
