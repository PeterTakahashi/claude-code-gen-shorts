ja:
  title: 'Mt.Gox、85万BTCが消えた日 #Shorts'
  description: '※この動画は歴史・事件解説です。投資助言ではありません。仮想通貨投資は元本割れリスクがあります。


    12年前の2014年2月、東京渋谷にあった世界最大のビットコイン取引所Mt.Goxが、ある日突然サイトを閉鎖した。

    消えたのは、85万BTC。当時のレートで4.5億ドル、現在価値では数兆円規模の事件を、時系列で振り返ります。


    #Shorts #MtGox #ビットコイン #仮想通貨事件 #事件解説

    '
  hook_caption: 85万BTCが消えた朝
  series_brand: バルトゥーン仮想通貨事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 12年前の2014年2月、東京・渋谷にあった世界最大のビットコイン取引所が、ある朝突然、サイトを閉じた事件を知っていますか?
    caption: ある朝、世界最大の取引所が消えた
  - panel: p2
    text: 運営はMt.Gox、CEOはフランス人プログラマーのマルク・カルプレスでした。元はカードゲームの交換サイトだったので、本格的な金融セキュリティの経験は、ほぼゼロだったんです。
    caption: 元はカードゲーム交換サイトだった
  - panel: p3
    text: その脆弱性を突かれ、2011年頃から数年かけて、ホットウォレットから少しずつBTCが抜き取られていきました。
    caption: 数年かけて少しずつ抜かれていた
  - panel: p4
    text: 2014年2月28日、カルプレスは東京で記者会見を開き、深々と頭を下げて破綻を発表。日本式の謝罪を、世界中のメディアが報じます。
    caption: 2月28日、東京で謝罪会見
  - panel: p5
    text: 消えたビットコインは、約85万BTC。当時のレートで4.5億ドル、現在価値では数兆円規模の流出となりました。
    caption: 消えたのは約85万BTC
  - panel: p6
    text: そして取引所はそのまま消滅。破産手続きは12年経った今も続き、債権者への返還はようやく始まったばかりです。
    caption: 破産手続きは今なお続く
en:
  title: 'How Mt. Gox Lost 850,000 Bitcoin #Shorts'
  description: 'In February 2014, the world''s largest Bitcoin exchange, Mt. Gox, suddenly collapsed. 850,000 BTC vanished, worth over $450 million at the time. This is the story of crypto''s first great
    disaster.


    #Shorts #MtGox #Bitcoin #Crypto #CaseFile'
  hook_caption: The Day 850,000 Bitcoin Disappeared
  series_brand: Crypto Case Files
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In February 2014, the world's largest Bitcoin exchange, located in Tokyo, simply vanished overnight.
    caption: The world's largest exchange... gone.
  - panel: p2
    text: It was called Mt. Gox. But it didn't start as a financial company... it was originally a website for trading fantasy game cards.
    caption: From trading cards to Bitcoin.
  - panel: p3
    text: Hackers exploited its weak security, slowly draining Bitcoin from its wallets for years, completely undetected.
    caption: Drained for years.
  - panel: p4
    text: Finally, CEO Mark Karpelès held a press conference, announcing the exchange was bankrupt in an apology broadcast worldwide.
    caption: A public apology.
  - panel: p5
    text: The total damage? 850,000 Bitcoin, worth $450 million at the time, and billions today.
    caption: 850,000 Bitcoin lost.
  - panel: p6
    text: The exchange was erased. Even a decade later, victims are only just beginning to get their money back.
    caption: A decade later...
