ja:
  title: 'FTXが10日で崩壊した本当の理由 #Shorts'
  description: '※この動画は歴史・事件解説です。投資助言ではありません。仮想通貨投資は元本割れリスクがあります。


    2022年11月、4年前の世界最大級の暗号通貨取引所FTXは、ひとつのリークと、ライバルの一言から、わずか10日で崩壊した。

    顧客資金80億ドルが、行方不明のまま、創業者は法廷へ送られた事件を、時系列で解説します。


    #Shorts #FTX #SBF #仮想通貨事件 #事件解説

    '
  hook_caption: 10日で消えた320億ドル
  series_brand: バルトゥーン仮想通貨事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 4年前の2022年11月、時価総額320億ドルの暗号通貨取引所が、たった10日で消えた事件を知っていますか?
    caption: 10日で320億ドルが消えた
  - panel: p2
    text: 発端は11月2日、姉妹会社Alameda Researchの内部資料リークでした。資産の大半が、自社発行のFTTトークンだったので、信用は一気に崩れます。
    caption: 11月2日、Alameda資産が暴露
  - panel: p3
    text: 4日後、ライバルのBinance CEOが、保有FTTの全売却をTwitterで宣言。価格は一日で暴落しました。
    caption: Binance CEOがFTT売却を宣言
  - panel: p4
    text: 信用を失った顧客は、一斉に出金を要求。72時間で60億ドルが引き出され、取引所は事実上の取り付け騒ぎに陥ります。
    caption: 3日で60億ドルの取り付け騒ぎ
  - panel: p5
    text: 11月9日、最後の望みだったBinanceの救済買収も、デューデリジェンスの結果、土壇場で白紙撤回されました。
    caption: 救済買収が白紙撤回
  - panel: p6
    text: そして11月11日、FTXは破産申請。顧客資金80億ドルが行方不明のまま、創業者は後に詐欺罪で25年の実刑判決を受けました。
    caption: 11月11日、破産申請
en:
  title: 'How the $32 Billion FTX Empire Collapsed in 10 Days #Shorts'
  description: 'In November 2022, one of the world''s largest crypto exchanges imploded, wiping out billions. This is the timeline of how a leaked document and a rival''s tweet led to an $8 billion hole
    and a 25-year prison sentence for its founder.


    #Shorts #FTX #SBF #Crypto #Finance'
  hook_caption: How $32 Billion Vanished In 10 Days
  series_brand: Crypto Case Files
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In November 2022, a crypto exchange worth $32 billion completely imploded in just 10 days.
    caption: $32 Billion Vanished
  - panel: p2
    text: It all started on November 2nd, when a leaked document showed its sister company's finances were propped up by its own token.
    caption: The First Domino
  - panel: p3
    text: Four days later, the CEO of rival exchange Binance tweeted he was selling all his holdings of that token, sparking a panic.
    caption: A Rival's Tweet
  - panel: p4
    text: Terrified customers rushed to get their money out, withdrawing $6 billion in just 72 hours in a massive digital bank run.
    caption: $6 Billion Bank Run
  - panel: p5
    text: A last-ditch rescue deal from that same rival was their only hope, but after a quick look at the books, the offer was withdrawn.
    caption: The Deal is Off
  - panel: p6
    text: On November 11th, FTX declared bankruptcy. $8 billion in customer funds were gone, and its founder was later sentenced to 25 years for fraud.
    caption: Game Over
