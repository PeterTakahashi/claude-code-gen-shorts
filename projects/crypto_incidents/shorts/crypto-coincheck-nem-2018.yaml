ja:
  title: 'Coincheck、580億NEMが消えた深夜 #Shorts'
  description: '※この動画は歴史・事件解説です。投資助言ではありません。仮想通貨投資は元本割れリスクがあります。


    8年前の2018年1月、東京渋谷の暗号通貨取引所Coincheckから、580億円分のNEMが、わずか数十分で流出した。

    日本の仮想通貨規制を一変させた、深夜の事件を、30秒で振り返ります。


    #Shorts #Coincheck #NEM #仮想通貨事件 #事件解説

    '
  hook_caption: 580億NEMが消えた深夜
  series_brand: Coincheck事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 8年前の2018年1月、東京渋谷の暗号通貨取引所から、たった一晩で580億円分のNEMが消えた事件を、覚えていますか?
    caption: 580億円のNEMが一晩で消えた
  - panel: p2
    text: 流出元はCoincheck、当時のCEOは20代の和田晃一良。深夜0時すぎ、社内モニターが赤く点滅し始め、若いチームは異変に気づいたんです。
    caption: 当時20代のCEO和田晃一良
  - panel: p3
    text: 原因は、本来オフライン保管すべき顧客資産のNEMを、利便性のため、ネットに繋がったホットウォレットに、ほぼ全額置いていたこと。鍵が破られた瞬間、全部、抜かれました。
    caption: NEMをホットウォレットに全額保管
  - panel: p4
    text: 1月26日深夜、Coincheckは緊急記者会見を開き、和田CEOらが、深々と頭を下げました。会見の終了時刻は、深夜1時半。日本の仮想通貨史に残る夜です。
    caption: 1月26日深夜、緊急謝罪会見
  - panel: p5
    text: 直後、金融庁が立ち入り検査に入り、業務改善命令を発出。この事件を境に、日本の仮想通貨取引所は、厳格な登録制へと、一気に転換しました。
    caption: 金融庁が動き、登録制が一気に進む
  - panel: p6
    text: 同じ年、Coincheckは大手証券のマネックスに買収され再建。580億円のNEM流出は、日本の暗号資産規制の出発点として、今も語り継がれています。
    caption: 日本の暗号資産規制の出発点
en:
  title: 'The Night ¥58 Billion in Crypto Vanished #Shorts'
  description: 'This video is for historical and educational purposes and is not investment advice. Cryptocurrency investment carries risk of principal loss.

    In January 2018, ¥58 billion worth of NEM vanished from the Tokyo exchange Coincheck. Here''s the story of the hack that changed crypto in Japan forever.

    #Shorts #Coincheck #Crypto #History #Japan'
  hook_caption: $500 Million Vanished Overnight
  series_brand: The Coincheck Hack
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In January 2018, 58 billion yen worth of crypto vanished from a Tokyo exchange in a single night.
    caption: ¥58 Billion Gone
  - panel: p2
    text: The exchange was Coincheck. Just after midnight, red alerts lit up their office as the young team realized something was terribly wrong.
    caption: Midnight Disaster
  - panel: p3
    text: Their fatal mistake? They kept nearly all customer funds in an online 'hot wallet' for convenience, instead of in secure offline storage.
    caption: The 'Hot Wallet' Mistake
  - panel: p4
    text: That same night, the company's 27-year-old CEO held an emergency press conference, ending in a deep bow of apology at 1:30 AM.
    caption: 1:30 AM Apology
  - panel: p5
    text: Japan's financial regulators immediately raided their offices. The incident triggered a massive government crackdown, forcing all exchanges under a strict new licensing system.
    caption: Government Crackdown
  - panel: p6
    text: Coincheck was later acquired and rebuilt, but the half-billion dollar heist became the defining moment that shaped Japan's entire crypto industry.
    caption: A New Era of Regulation
