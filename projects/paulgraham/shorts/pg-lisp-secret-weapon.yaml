id: pg-lisp-secret-weapon
parent_chapter: null
panels:
- id: p1
  prompt: '9:16 vertical anime/webtoon style illustration:

    2001 — close-up of a beige CRT monitor in a dim home office,

    displaying a minimalist black-text-on-white webpage titled "Beating

    the Averages" on paulgraham dot com style layout, the simple text

    essay visible. Paul Graham in his late 30s sits in the dim back of

    the frame at his keyboard, his glasses softly catching the screen

    reflection, a quiet faint smile on his face. Warm desk-lamp lighting.

    Wide mid-shot. The exact moment the secret weapon was revealed to

    the world.

    Character: {subject_young}.

    '
- id: p2
  prompt: '9:16 vertical anime/webtoon style illustration:

    A split-frame composition. Left half: Paul Graham in his late 20s

    hunched at a beige CRT monitor in a tiny Cambridge office, Lisp code

    with many parentheses visible green-on-black on screen, a faint

    smile of satisfaction. Right half: a generic late-90s corporate

    office with three frustrated programmers in plain shirts staring at

    dense C++ code on their monitors, looking tired and stuck. The

    contrast: tiny startup outrunning big companies. No specific

    recognizable faces on the right side.

    Character: {subject_young}.

    '
- id: p3
  prompt: '9:16 vertical anime/webtoon style illustration:

    A close-up of a wooden desk in 1996. Two thick technical books sit

    stacked — the top one with a plain green cover reading "On Lisp",

    the lower one with a red cover reading "ANSI Common Lisp", both

    visibly worn from heavy use. A pair of wire-rimmed glasses lies on

    top, a steaming mug of tea beside them. Warm afternoon sunlight from

    a window. Conveys: these were the textbooks for a one-man

    programming-language religion.

    '
- id: p4
  prompt: '9:16 vertical anime/webtoon style illustration:

    Late 1996, the Viaweb office. Paul Graham in his late 20s stands

    casually at his desk, finger about to press the Enter key on a

    keyboard, a small terminal window visible on the CRT screen showing

    a deployment line, a calm confident half-smile on his face, a

    cluttered desk with empty coffee cups around him. Conveys: while

    competitors took weeks to ship features, he shipped multiple times a

    day. Mid-shot.

    Character: {subject_young}.

    '
- id: p5
  prompt: '9:16 vertical anime/webtoon style illustration:

    A symbolic illustration — a young programmer in his 20s sits at a

    generic 90s computer, surrounded by a faint visible glass-wall-like

    boundary that limits his view, beyond which abstract floating

    symbols of more powerful expressions and Lisp parentheses hover just

    outside his reach, unseen by him. He looks down at his own simpler

    code, oblivious. Warm-cool lighting contrast inside vs outside the

    wall. Conveys "the Blub paradox" — the inability to see what you

    can''t access. No specific recognizable face.

    '
- id: p6
  prompt: '9:16 vertical anime/webtoon style illustration:

    Year 2001, a quiet evening home office. Paul Graham, late 30s,

    sits at a simple wooden desk typing on a thin laptop, the open

    essay "Beating the Averages" visible on the screen with a partly

    written paragraph, a thoughtful faint smile on his face, warm

    orange desk-lamp glow, the dark window behind him slowly catching

    the first stars of evening. Over-shoulder framing. The contemplative

    moment a hacker chose to reveal the secret he kept for years.

    Character: {subject_young}.

    '
ja:
  title: '誰も使わない言語で大企業に勝った男 #Shorts'
  description: '1995年、ポール・グレアムは「Lisp」という当時誰も使わない言語で

    Viawebを作り、巨大企業を圧倒した。エッセイ『Beating the Averages』に

    記された秘密兵器の話。


    #Shorts #ポールグレアム #Lisp #Viaweb #人物伝

    '
  hook_caption: 誰も使わない言語で大企業に勝った
  series_brand: ポール・グレアム伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 誰も使わない、変なプログラミング言語だけで、巨大企業に勝った男がいます。
    caption: 誰も使わない言語で勝った
  - panel: p2
    text: 1995年、ポール・グレアムが、Viawebを開発したとき、彼が選んだのは、Lispという、1958年に作られた古い言語でした。
    caption: 1995年、選んだのはLisp
  - panel: p3
    text: 当時、誰もが、CやC++を使っていました。Lispは、大学の研究室でしか、使われていない言語だったんです。
    caption: 当時の主流はC、C++
  - panel: p4
    text: しかし、Lispの強力な抽象化のおかげで、彼らは、競合他社の10倍の速さで、新機能をリリースできました。
    caption: 10倍の開発速度を実現
  - panel: p5
    text: 2001年、彼は、『Beating the Averages』という有名なエッセイで、その秘密を、ついに公開します。
    caption: 2001年、エッセイで秘密公開
  - panel: p6
    text: 彼の著書『On Lisp』『ANSI Common Lisp』は、今でも、Lispハッカーたちの聖典になっているんです。
    caption: 著書は今も聖典として残る
en:
  title: 'He Beat Giants With a Forgotten Programming Language #Shorts'
  description: 'In 1995, Paul Graham used Lisp, a language many considered obsolete, to build Viaweb and outpace massive competitors. His essay ''Beating the Averages'' revealed this unfair advantage.

    #Shorts #PaulGraham #Lisp #Programming #Viaweb'
  hook_caption: His Secret Weapon Was a 'Dead' Language
  series_brand: The Paul Graham Story
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In 1995, one programmer chose a forgotten language to take on the tech giants.
    caption: A forgotten language
  - panel: p5
    text: While everyone else was building with C++, Paul Graham picked Lisp, an obscure language from 1958.
    caption: An 'ancient' choice
  - panel: p4
    text: This was his secret weapon. It let his startup, Viaweb, ship new features 10 times faster than their rivals.
    caption: 10x faster
  - panel: p6
    text: He later revealed his strategy in a now-famous essay, 'Beating the Averages'.
    caption: The secret revealed
  - panel: p3
    text: His mastery was so profound, his books on Lisp are still considered bibles for hackers today.
    caption: The Lisp Bibles
