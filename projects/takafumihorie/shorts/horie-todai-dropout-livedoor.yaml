ja:
  title: '東大中退で22歳で会社を作った男 #Shorts'
  description: '東京大学に入りながら中退し、22歳でオン・ザ・エッヂ (後の Livedoor) を創業した堀江貴文。1996年の Web 黎明期、日本にまだインターネットを知らない人が大多数の時代の話。


    #Shorts #堀江貴文 #ホリエモン #人物伝

    '
  hook_caption: 東大中退、22歳で起業
  series_brand: 堀江貴文伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 東大に合格した男が、すぐに中退して、22歳で起業しました。
    caption: 東大合格→即中退→22歳で起業
  - panel: p2
    text: 1996年、堀江貴文、22歳。場所は、東京の、6畳一間のアパートでした。
    caption: 1996年、22歳、6畳一間でスタート
  - panel: p3
    text: 会社の名前は、オン・ザ・エッヂ。後の、Livedoor です。
    caption: 社名はオン・ザ・エッヂ (後の Livedoor)
  - panel: p4
    text: 彼は、日本人の、ほとんどが、インターネットを、知らない時代に、企業の Web サイトを、作りまくりました。
    caption: ネット黎明期、Webサイト制作で急成長
  - panel: p5
    text: そして、わずか数年で、社員数百人の会社に、育て上げたんです。
    caption: 数年で社員数百人規模に
  - panel: p6
    text: 東大の安定を捨てた、22歳の選択が、後の、日本の IT 史を、変えていきます。
    caption: 22歳の選択が日本IT史を変えた
en:
  title: 'The College Dropout Who Hacked Japan''s Internet Boom #Shorts'
  description: 'He quit Japan''s most prestigious university to start a company in a tiny apartment. This is the story of Takafumi Horie, the controversial founder of Livedoor, who changed Japan''s internet
    forever.


    #Shorts #Biography #Tech #Japan #TakafumiHorie'
  hook_caption: 'He Quit Japan''s #1 University To Do WHAT?'
  series_brand: The Takafumi Horie Story
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: In 1996, a 22-year-old student got into Japan's top university... and immediately dropped out.
    caption: Quit Japan's Best School
  - panel: p3
    text: His name was Takafumi Horie. He and a friend started a company in a tiny Tokyo apartment.
    caption: A 22-Year-Old Founder
  - panel: p4
    text: They called it 'On The Edge,' and their business was building websites... when most of the country had never even been online.
    caption: The Dawn of the Web
  - panel: p1
    text: Working day and night, Horie coded the first wave of Japan's new internet economy.
    caption: Coding the Future
  - panel: p5
    text: In just a few years, that tiny startup exploded into a massive company that would later become Livedoor.
    caption: From Startup to Giant
  - panel: p6
    text: That one choice to abandon a safe path for a risky idea would change Japan's tech industry forever.
    caption: Changed an Industry Forever
