ja:
  title: '全財産を寄付すると決めた男 #Shorts'
  description: '2000年、ビル・ゲイツは Microsoft の経営から身を引き、世界最大の慈善基金 Gates Foundation を立ち上げた。

    彼は、自分の資産のほぼ全てを、生前に寄付しきると、公に、宣言している。


    #Shorts #ビルゲイツ #ゲイツ財団 #人物伝

    '
  hook_caption: 全財産を生前に寄付する
  series_brand: ビル・ゲイツ伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 世界一の大富豪が、財産のほぼ全てを、生前に寄付しきる、と宣言しています。それが、ビル・ゲイツです。
    caption: 全財産を生前に寄付すると宣言
  - panel: p2
    text: 2000年、44歳の彼は、Microsoft の CEO を、退き、妻と、世界最大の慈善基金を、立ち上げました。
    caption: 2000年、Microsoft CEO を退任
  - panel: p3
    text: ターゲットは、ポリオ、マラリア、結核——先進国が、もう、忘れた感染症との、戦いでした。
    caption: 忘れられた感染症との戦い
  - panel: p4
    text: 2010年には、盟友ウォーレン・バフェットと共に、Giving Pledge を、立ち上げ、超富裕層に、寄付を、呼びかけました。
    caption: Giving Pledge を立ち上げた
  - panel: p5
    text: そして2024年、彼は、残りの資産およそ1000億ドルを、20年以内に、全て、使い切ると、発表したんです。
    caption: 2024年、1000億ドル全寄付を発表
  - panel: p6
    text: 創業者から、史上最大の寄付者へ——ビル・ゲイツの、本当の代表作は、第二の人生の方かもしれません。
    caption: 代表作は第二の人生かもしれない
en:
  title: 'Why Bill Gates Is Giving Away His Entire Fortune #Shorts'
  description: 'In 2000, Bill Gates stepped down as CEO of Microsoft to start the world''s largest charitable foundation. He has pledged to give away virtually all of his wealth in his lifetime.


    #Shorts #BillGates #Philanthropy #GatesFoundation #Inspiration'
  hook_caption: He's Giving Away $100 Billion
  series_brand: The Bill Gates Story
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: What if one of the richest people on Earth decided to give away nearly all of his money? That's exactly what Bill Gates is doing.
    caption: Giving It All Away
  - panel: p2
    text: In 2000, at the height of his power, he shocked the world by stepping down as CEO of Microsoft to start the planet's largest private foundation.
    caption: He Left Microsoft
  - panel: p3
    text: 'His new mission: to wage war on diseases the developed world had mostly forgotten, like polio, malaria, and tuberculosis.'
    caption: Fighting Forgotten Diseases
  - panel: p4
    text: Then in 2010, he teamed up with Warren Buffett to launch The Giving Pledge, challenging other billionaires to donate most of their wealth.
    caption: The Giving Pledge
  - panel: p5
    text: And now, he's announced he'll spend his remaining fortune—around $100 billion—within the next 20 years.
    caption: His Final $100 Billion
  - panel: p6
    text: From tech titan to history's greatest philanthropist, Bill Gates's true legacy may not be the company he built, but the world he's trying to save.
    caption: His True Legacy
