ja:
  title: 'ビル・ゲイツが、TOYOTA で学んだ秘訣 #Shorts'
  description: |
    33年前の1993年、Bill Gates は、愛知県豊田市の元町工場を、訪ねました。
    彼が、そこで吸収した「かんばん」の哲学は、その後の Microsoft の、ソフト開発を、根本から、変えたんです。

    #Shorts #ビルゲイツ #トヨタ #カンバン #人物伝
  hook_caption: ゲイツが豊田で学んだ秘訣
  series_brand: カンバンとMS
  voice_speed: 1.4
  narration:
    - panel: p1
      text: ビル・ゲイツが、Microsoft の開発のすべてを、変えるきっかけになった、小さな紙片を、知っていますか? それが、トヨタの「かんばん」です。
      caption: ゲイツの全てを変えた小さな紙
    - panel: p2
      text: 33年前の1993年、ゲイツは、愛知県豊田市の元町工場を、訪ね、当時の会長、豊田英二の案内で、現場を、歩きました。
      caption: 33年前の1993年、元町工場を視察
    - panel: p3
      text: 豊田が、見せたのは、紙片を、ラインに吊るすだけの仕組み。後工程が、必要な分だけ、前工程から、引っ張る——これが、ジャストインタイム生産です。
      caption: 紙片で工場全体を制御する仕組み
    - panel: p4
      text: 部品を、押し込まず、必要なときに、必要な分だけ、引き取る。在庫を、ほぼゼロにする、この発想は、ゲイツの中で、衝撃でした。
      caption: 押し込まず引き取る、在庫ゼロ思想
    - panel: p5
      text: Redmond に戻ったゲイツは、Windows 95 の開発に、それを応用します——毎日ビルド、毎日テスト、必要なときに、機能を引っ張る方式に、変えたんです。
      caption: Windows 95 を毎日ビルド方式に
    - panel: p6
      text: 今も、世界中のソフト会社が使う、Agile や DevOps の原型は、33年前の、豊田の工場にありました。ゲイツの帝国を支えたのは、日本の紙片、だったんです。
      caption: Agile の原型は豊田の紙片
en:
  title: 'The Toyota Secret That Saved Microsoft #Shorts'
  description: 'In 1993, Bill Gates visited Toyota''s Motomachi plant in Aichi, Japan. The "kanban" philosophy he absorbed there fundamentally changed how Microsoft built software—and quietly became the origin of modern Agile development.


    #Shorts #BillGates #Toyota #Kanban #History'
  hook_caption: The Toyota Secret That Saved Microsoft
  series_brand: The Bill Gates Story
  voice_speaker: Ryan
  narration:
    - panel: p1
      text: In 1993, a small paper card on a Toyota factory line changed Bill Gates forever.
      caption: The card that changed everything
    - panel: p2
      text: Toyota chairman Eiji Toyoda personally walked Gates through the Motomachi plant in Aichi, Japan.
      caption: A personal tour from the chairman
    - panel: p3
      text: The system was called "kanban"—small paper cards that pulled parts only when needed.
      caption: Pull, do not push
    - panel: p4
      text: No stockpiles. No waste. The factory was pulled forward by the customer's demand itself.
      caption: Zero inventory, total flow
    - panel: p5
      text: Back at Microsoft, Gates applied it to Windows 95—daily builds, daily tests, pull what you need.
      caption: From cars to code
    - panel: p6
      text: Modern Agile and DevOps trace their roots to that single Toyota factory visit.
      caption: A paper card that built an empire
