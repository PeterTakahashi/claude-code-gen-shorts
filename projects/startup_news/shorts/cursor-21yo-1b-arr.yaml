ja:
  title: '21歳が作ったAIエディタが2年で1000億円を売り上げた話 #Shorts'
  description: '2022年、MITの寮で2人の学生が、AIコードエディタ Cursor を作り始めた。

    そして3年後の2025年、Cursorの年間売上は10億ドル——日本円で1500億円を、突破した。


    #Shorts #Cursor #スタートアップ #AI #シリコンバレー

    '
  hook_caption: 21歳のAIエディタが2年で1000億円
  series_brand: スタートアップNEWS
  voice_speed: 1.4
  narration:
  - panel: p1
    text: たった3年で、年間売上が10億ドルを突破した、ソフトウェアの話を、知っていますか? 主役は、21歳のMIT中退生たちでした。
    caption: 3年でARR 10億ドル達成
  - panel: p2
    text: 2022年、Michael Truellたちは、MITの寮で、AIコードエディタを作り始めました。名前は、Cursorです。
    caption: 2022年、MITの寮で開発開始
  - panel: p3
    text: Cursorの強みは、コードを打つ前に、AIが続きを書いてくれる、ことでした。あまりに快適すぎて、エンジニアが、戻れなくなったんです。
    caption: AIが先回りでコードを書く
  - panel: p4
    text: 2024年、Andreessen Horowitzなど、トップVCが殺到し、評価額は、わずか1年で90億ドルに、達しました。
    caption: 2024年、評価額90億ドルへ
  - panel: p5
    text: そして2025年、Cursorの年間売上は、ついに10億ドルを、突破します。これは、ソフトウェア史上、最速のARR成長記録です。
    caption: 2025年、史上最速のARR 10億ドル
  - panel: p6
    text: 21歳のMIT中退生が、わずか3年で、AI時代のIDEを、ゼロから1兆円企業に、育てる。これが、2025年のシリコンバレーの、リアルです。
    caption: 21歳が3年で1兆円企業を作った
en:
  title: 'How an AI Code Editor Hit $1 Billion in 3 Years #Shorts'
  description: 'In 2022, two MIT students started building the AI code editor, Cursor. By 2025, it became the fastest software company in history to hit $1 billion in annual revenue.


    #Shorts #Cursor #Startup #AI #SiliconValley'
  hook_caption: 2 MIT Dropouts → $1B in 3 Years
  series_brand: Startup NEWS
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Imagine hitting one billion dollars in annual revenue... in just three years. That's the true story of two 21-year-old MIT dropouts.
    caption: $0 to $1B in 3 Years
  - panel: p2
    text: It all started in 2022, inside an MIT dorm room, where Michael Truell and his co-founder began building an AI-native code editor called Cursor.
    caption: An MIT dorm room idea
  - panel: p3
    text: 'Its magic was simple: AI would predict and write your code for you. Engineers who tried it said they could never go back.'
    caption: Code that writes itself
  - panel: p4
    text: By 2024, top VCs like Andreessen Horowitz were rushing to invest, pushing their valuation to a staggering nine billion dollars.
    caption: $9 Billion Valuation
  - panel: p5
    text: 'And in 2025, they hit the milestone: one billion dollars in annual recurring revenue, the fastest ARR growth in software history.'
    caption: Fastest in History
  - panel: p6
    text: From a dorm room to a multi-billion dollar company in three years... This is the new reality of Silicon Valley.
    caption: The New Silicon Valley
