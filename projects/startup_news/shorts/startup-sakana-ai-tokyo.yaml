ja:
  title: 'Sakana AIが東京で日本初AIユニコーンになった日 #Shorts'
  description: '2年前の2023年に東京で創業した Sakana AI は、創業からわずか1年で、評価額10億ドル超のシリーズAを調達し、日本初のAIユニコーンになりました。

    元 Google の David Ha と、Transformer 論文の生き残り著者 Llion Jones が、東京を選んだ理由が、世界の AI 地図を、書き換え始めています。


    #Shorts #SakanaAI #AIユニコーン #東京 #スタートアップ

    '
  hook_caption: 日本初AIユニコーン爆誕
  series_brand: Sakana AI
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「東京で創業1年、評価額10億ドル」——2年前の2023年に始まった Sakana AI は、日本初のAIユニコーンに、なりました。
    caption: 創業1年、評価10億ドル
  - panel: p2
    text: 創業したのは、元 Google Brain Tokyo を率いた David Ha と、Transformer 論文の8人の著者のうち、唯一まだ第一線で研究を続けている Llion Jones です。
    caption: 元GoogleとTransformer著者
  - panel: p3
    text: Llion Jones が共著した2017年の論文「Attention Is All You Need」は、現代のあらゆる大規模言語モデルの土台になっているので、彼が東京で次に賭けたという事実が、世界中の研究者を、驚かせました。
    caption: Transformer著者が東京を選んだ
  - panel: p4
    text: そして1年前の2024年、Sakana AI はシリーズAで2億ドルを調達し、評価額は10億ドルを超え、日本としては、初めてのAIユニコーンに、認定されました。
    caption: 2024年、2億ドル調達でユニコーン
  - panel: p5
    text: 彼らが東京を選んだのは、シリコンバレーとは違うAIアーキテクチャを、独自に作るためで、進化と群知能から着想を得たモデル、AI Scientist などを、東京から、世界に発信しています。
    caption: 東京から世界に独自AIを発信
  - panel: p6
    text: シリコンバレーでも北京でもなく、東京から、次のAIが生まれ始めている——Sakana AI の爆誕は、世界のAI地図そのものを、静かに書き換え始めた瞬間でした。
    caption: 東京から次のAIが始まった
en:
  title: 'Meet Sakana AI: Tokyo''s First AI Unicorn #Shorts'
  description: 'Founded by a Google Brain lead and an author of the original ''Transformer'' paper, Sakana AI hit a $1B+ valuation in just one year. Here''s why they chose Tokyo to build the next generation
    of AI.


    #Shorts #SakanaAI #AI #Tokyo #Startup'
  hook_caption: The AI Titans Ditching Silicon Valley for Tokyo
  series_brand: Sakana AI
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In 2023, two AI legends founded a new startup right here in Tokyo.
    caption: A Tokyo Startup
  - panel: p3
    text: One was Llion Jones, an author of the 2017 'Transformer' paper—the blueprint for every modern Large Language Model.
    caption: The Transformer Blueprint
  - panel: p4
    text: Just one year later, their company, Sakana AI, raised $200 million to become Japan's first-ever AI unicorn.
    caption: $1B+ Valuation
  - panel: p5
    text: They chose Tokyo to escape the Silicon Valley echo chamber, building AI inspired by principles from nature, like evolution.
    caption: Inspired by Nature
  - panel: p1
    text: Their success is attracting top global talent, turning the city into a new hub for AI research.
    caption: A New AI Hub
  - panel: p6
    text: Sakana AI proves the next big breakthrough might not come from Silicon Valley... but from Tokyo.
    caption: The Future is in Tokyo
