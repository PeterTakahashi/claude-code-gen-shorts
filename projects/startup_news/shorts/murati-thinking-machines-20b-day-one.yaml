ja:
  title: '初日に2兆円評価された会社、Thinking Machines #Shorts'
  description: '2024年9月、ChatGPTを作ったOpenAIの元CTO、ミラ・ムラティは、新会社 Thinking Machines Lab を立ち上げた。

    そして翌2025年7月、その会社は、製品ゼロのまま、評価額20億ドルで20億ドルを調達した——史上最大のシード調達である。


    #Shorts #ThinkingMachines #MiraMurati #OpenAI #AI #スタートアップ

    '
  hook_caption: 創業初日に2兆円評価された女
  series_brand: スタートアップNEWS
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 製品が、まだ一つも無いのに、初日に評価額が2兆円——そんなとんでもないスタートアップを、知っていますか?
    caption: 製品ゼロで初日に評価額2兆円
  - panel: p2
    text: 主役は、ミラ・ムラティ。ChatGPTを作ったOpenAIの、元CTOです。
    caption: 元OpenAI CTOのミラ・ムラティ
  - panel: p3
    text: 2023年11月、OpenAIの取締役会がサム・アルトマンを解任した時、彼女は、3日間だけ、暫定CEOを務めました。あの大事件の中心人物でした。
    caption: アルトマン解任で3日間暫定CEO
  - panel: p4
    text: 2024年9月、彼女はOpenAIを退社。そして新会社 Thinking Machines Labを、立ち上げます。
    caption: 2024年9月、新会社 Thinking Machines Lab
  - panel: p5
    text: 翌2025年7月、製品ゼロの状態で、20億ドル——日本円で約3000億円を、評価額120億ドルで、調達しました。シリコンバレー史上、最大のシードラウンドです。
    caption: 2025年7月、史上最大の3000億円シード
  - panel: p6
    text: 過去の信頼と人脈だけで、会社が、初日から数兆円に化ける。これが、AI時代のスタートアップの、本当のスケールです。
    caption: 信頼と人脈だけで初日から数兆円
en:
  title: 'This Woman Got a $13 Billion Valuation With ZERO Products #Shorts'
  description: 'In 2024, OpenAI''s ex-CTO Mira Murati launched Thinking Machines Lab. By 2025, she raised $2 billion at a $12 billion valuation without a single product, the largest seed round in history.


    #Shorts #MiraMurati #OpenAI #AI #Startup'
  hook_caption: Valued at $13 BILLION... With Zero Products
  series_brand: Startup NEWS
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Imagine a startup with no product, no customers... but a valuation of 13 billion dollars on day one.
    caption: No product, $13B valuation
  - panel: p2
    text: The founder is Mira Murati, the former Chief Technology Officer of OpenAI.
    caption: Ex-OpenAI CTO
  - panel: p3
    text: You might remember her from the OpenAI boardroom drama—when Sam Altman was fired, she stepped in as interim CEO for three chaotic days.
    caption: 3 days as CEO
  - panel: p4
    text: 'By September 2024, she had left to found her own company: Thinking Machines Lab.'
    caption: Founded Thinking Machines
  - panel: p5
    text: And by July 2025, she raised 2 billion dollars at a 12 billion dollar valuation—the largest seed round in history.
    caption: Largest seed round ever
  - panel: p6
    text: 'This is the new reality in the age of AI: where trust and a track record can be worth billions, right from day one.'
    caption: The new AI scale
