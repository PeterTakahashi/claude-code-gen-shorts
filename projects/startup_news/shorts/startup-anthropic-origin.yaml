    of a glowing monitor in a darkened Stanford computational biology lab at 3 AM,

    his dark intelligent eyes reflecting cascading streams of neural-network code

    and loss curves on the screen, very thick wavy dark brown hair falling

    messily over his forehead with the characteristic Italian curl, pale skin

    lit harsh blue from the monitor, faint stubble, a single bead of sweat at

    his temple, mouth slightly open in dawning realization. American Stanford

    California 2011 university lab setting. A decorative English sticky note

    on the monitor "SCALING LAWS?" partially readable. The visual of "the

    moment a young scientist realized AI would change everything." Subject

    filling square center for vertical short layout with blurred padding above/below.

    Character: {dario_young}.

    '
