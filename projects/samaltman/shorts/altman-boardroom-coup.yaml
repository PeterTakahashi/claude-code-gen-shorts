ja:
  title: '5日間でCEOが解任→復帰した話 #Shorts'
  description: '2023年11月、OpenAIのサム・アルトマンが取締役会に突然解任された。

    しかし5日後、社員700人が辞任を表明し、彼はCEOに復帰した。


    #Shorts #サムアルトマン #OpenAI #人物伝

    '
  hook_caption: 5日でCEOに戻った男
  series_brand: サム・アルトマン伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 5日間でCEOを解任され、Microsoftに移籍し、そして元の会社に復帰した男がいます。
    caption: 5日でクビ→Microsoft→復帰
  - panel: p2
    text: 2023年11月、ある金曜日、OpenAIのサム・アルトマンは、取締役会から、突然、解任を通告されました。
    caption: 2023年11月、突然の解任通告
  - panel: p3
    text: 理由は、取締役会との「意思疎通の欠如」。事実上の、内部クーデターでした。
    caption: 取締役会による内部クーデター
  - panel: p4
    text: しかし、その週末のうちに、Microsoftが、彼を新部門のトップとして、即座に迎え入れると発表したんです。
    caption: 週末にMicrosoftが即採用を発表
  - panel: p5
    text: さらに、OpenAIの社員700人以上が、「アルトマンが戻らないなら、自分たちも辞める」、と署名しました。
    caption: 社員700人が辞任を表明
  - panel: p6
    text: 解任からわずか5日後、彼はCEOに復帰し、取締役会の方が、ほとんど入れ替わったんです。
    caption: 5日後、CEOに復帰
en:
  title: 'How OpenAI''s CEO Got Fired and Rehired in 5 Days #Shorts'
  description: 'In November 2023, Sam Altman was suddenly fired by OpenAI''s board. What followed was 5 days of chaos, a job offer from Microsoft, and a near-revolt from his employees.

    #Shorts #SamAltman #OpenAI #TechDrama'
  hook_caption: FIRED. HIRED. REINSTATED. IN 5 DAYS.
  series_brand: The Sam Altman Story
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: On a Friday in November 2023, OpenAI CEO Sam Altman got a call out of the blue. He was fired.
    caption: He was fired.
  - panel: p3
    text: The company's own board staged a coup, citing a vague 'lack of candid communication'.
    caption: A boardroom coup
  - panel: p4
    text: But before the weekend was over, Microsoft had already hired him to lead a new advanced AI division.
    caption: Hired by Microsoft
  - panel: p5
    text: In response, over 700 OpenAI employees—nearly the entire company—threatened to quit in solidarity.
    caption: His team revolted
  - panel: p1
    text: The massive pressure campaign worked. Just five days after being ousted, Altman walked back into headquarters.
    caption: The return
  - panel: p6
    text: He was reinstated as CEO, and the very board that fired him was almost entirely replaced.
    caption: Back in charge
