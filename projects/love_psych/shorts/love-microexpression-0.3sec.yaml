ja:
  title: '相手の本心が出る0.3秒の表情、微表情の科学 #Shorts'
  description: '心理学者ポール・エクマンの研究では、人は無意識のうちに、0.3秒だけ、本心の表情、いわゆる「微表情」を、顔に出す傾向があると、言われています。

    7つの普遍的な表情があり、訓練すれば、読み取り精度が上がる傾向があるそうです。


    #Shorts #微表情 #ポールエクマン #恋愛心理 #心理学

    '
  hook_caption: 0.3秒で本心が出る顔
  series_brand: 微表情の科学
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 相手の本心は、たった0.3秒、顔に、漏れている——心理学者ポール・エクマンの研究では、そう言われています。それが「微表情」と呼ばれるものなんです。
    caption: 本心は0.3秒、顔に漏れている
  - panel: p2
    text: 多くの人は、本音を隠そうとして、表面では笑っていても、無意識の0.3秒だけ、本当の感情が、顔に、出てしまう傾向があるんです。
    caption: 笑顔の下に本音が出る0.3秒
  - panel: p3
    text: エクマンの研究では、文化を超えて共通する微表情は、7種類あると、言われています。喜び、驚き、恐怖、怒り、嫌悪、悲しみ、軽蔑、です。
    caption: 文化を超える7つの微表情
  - panel: p4
    text: 0.3秒という時間は、意識が「隠そう」と判断するより、速いので、訓練していない人ほど、本音が、顔に、出やすい傾向があると、されています。
    caption: 意識より速い0.3秒の本音
  - panel: p5
    text: 心理学では、微表情を読み取る能力は、訓練で精度が上がる傾向があると、言われています。会話の動画を、スロー再生で観るだけでも、感度が変わってきます。
    caption: 訓練で読み取り精度が上がる
  - panel: p6
    text: 言葉と表情がズレた瞬間、本心は、後者のほうにある——微表情を意識するだけで、人との会話が、まったく違う深さで、見えてくるはずです。
    caption: 言葉と表情のズレに本心がある
en:
  title: 'The Secret Your Face Reveals in 0.3 Seconds #Shorts'
  description: 'Psychologist Paul Ekman''s research shows our true feelings can flash across our faces in under 0.3 seconds. These ''microexpressions'' are universal and can be trained!

    #Shorts #Psychology #Microexpressions #BodyLanguage #PaulEkman'
  hook_caption: What Their Face REALLY Says
  series_brand: The Science of Microexpressions
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: For just a fraction of a second, a person's true feelings can leak onto their face. Psychologists call these 'microexpressions.'
    caption: A flash of truth
  - panel: p4
    text: They last for less than half a second—way too fast for most people to consciously hide.
    caption: Faster than you can think
  - panel: p2
    text: So even when someone is smiling and saying everything's fine, their real emotion might flash for an instant.
    caption: Hidden in plain sight
  - panel: p3
    text: According to researcher Paul Ekman, there are seven universal expressions that are shared across all human cultures.
    caption: 7 Universal Expressions
  - panel: p5
    text: And the good news is, the ability to spot these hidden feelings is a skill that you can actually train.
    caption: A trainable skill
  - panel: p6
    text: So when someone's words don't match their face, you'll know which one is telling the truth.
    caption: Face vs. Words
