ja:
  title: '振った相手から連絡が来る本当の理由 #Shorts'
  description: '別れて数週間、突然、振った相手から「久しぶり」のLINEが来る。

    心理学が指摘する、その本当の理由は「あなたが恋しい」ではない。

    自尊心の回復、損失効果、Zeigarnik効果——3つの心理メカニズムを、

    30秒で解説します。


    #Shorts #恋愛心理 #別れ #心理学 #復縁

    '
  hook_caption: 振った相手から連絡の真相
  series_brand: 別れの心理
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 別れて数週間、突然、振った相手から「久しぶり」と、LINEが来る——あれ、実は「あなたが恋しい」が、理由ではないんです。
    caption: 「久しぶり」LINEの真相
  - panel: p2
    text: 数週間前のカフェで、あなたが別れを告げた瞬間、相手の中では、3つの心理メカニズムが、同時に動き始めています。
    caption: 別れた瞬間、3つの心理が動く
  - panel: p3
    text: 1つ目は、自尊心の回復。振られた側は「自分には価値がない」という痛みから、逃れるために、もう一度あなたの反応を、確かめたくなります。
    caption: ①自尊心の回復のため
  - panel: p4
    text: 2つ目は、損失効果。心理学では、人は手に入れた時より、失った時に、価値を3倍以上、強く感じます。失ったから、急に恋しく見えるんです。
    caption: ②失ったから価値が見える
  - panel: p5
    text: 3つ目は、Zeigarnik効果。脳は、未完了のことほど、繰り返し思い出す性質を、持っています。中途半端に終わった関係ほど、頭から、離れません。
    caption: ③未完了のことほど忘れない
  - panel: p6
    text: つまり「久しぶり」の正体は、愛ではなく、自分を立て直すための、無意識の救難信号です。返信する前に、その3つを、思い出してください。
    caption: 愛ではなく、無意識の救難信号
en:
  title: 'The REAL Reason Your Ex Texted You #Shorts'
  description: 'Got a ''long time no see'' text from an ex? It''s probably not because they miss you.

    We break down the 3 psychological reasons: Ego Restoration, Loss Aversion, and the Open Loop effect.

    #Psychology #Breakups #DatingAdvice #Ex #Shorts'
  hook_caption: That 'Hey' from your ex? It's not what you think.
  series_brand: Breakup Psychology
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: 'Weeks after the breakup, you get that text: ''Hey, long time no see.'' But the real reason isn''t what you think.'
    caption: That 'Hey' text...
  - panel: p2
    text: The moment you ended things, their brain kicked off three powerful psychological triggers.
    caption: 3 Psychological Triggers
  - panel: p3
    text: First, Ego Restoration. Being rejected crushes their self-worth, so they're fishing for your reaction just to feel validated again.
    caption: 1. Ego Restoration
  - panel: p4
    text: Second, Loss Aversion. Psychologically, we value things far more *after* we've already lost them.
    caption: 2. Loss Aversion
  - panel: p5
    text: And third, the Open Loop effect. Our brains are wired to obsess over unfinished business... like your relationship.
    caption: 3. The Open Loop
  - panel: p6
    text: So that text isn't about love. It's an unconscious SOS for their ego. Remember that before you reply.
    caption: It's not about you.
