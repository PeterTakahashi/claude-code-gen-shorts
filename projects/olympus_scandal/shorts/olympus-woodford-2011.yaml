ja:
  title: '英国人社長が暴いた、オリンパス1000億円事件 #Shorts'
  description: |
    1000億円超の損失を20年以上隠し続けたオリンパスを、初の外国人社長マイケル・ウッドフォードがたった一人で暴いた。内部告発の代償とは。

    #Shorts #オリンパス #事件 #内部告発 #企業不正
  hook_caption: 英国人社長が暴いた粉飾
  series_brand: オリンパス事件
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 1000億円を超える損失を、20年以上も隠し続けた日本企業を、たった一人の英国人社長が暴いた、という話です。
      caption: 英国人社長が暴いた1000億円の闇
    - panel: p2
      text: 2011年、オリンパスは初の外国人社長として、マイケル・ウッドフォードを抜擢します。生え抜きではない、異質な経営者でした。
      caption: 2011年、初の外国人社長に就任
    - panel: p3
      text: 就任直後、彼は不審な数字に気づきます。ある企業買収の助言料が、なんと約700億円。買収額に比べ、あり得ない金額でした。
      caption: 買収の助言料が約700億円
    - panel: p4
      text: ウッドフォードが追及を始めると、会社は彼を、即座に解任します。真実を語る口を、塞ごうとしたんです。
      caption: 追及した社長を即解任
    - panel: p5
      text: しかし彼は屈せず、資料を海外メディアに告発。隠されていた約1100億円の損失隠しが暴かれ、株価は8割も暴落しました。
      caption: 告発で株価8割暴落
    - panel: p6
      text: 巨大企業の闇を破ったのは、内部の論理に染まらない、たった一人の「よそ者」だった。オリンパス事件は、それを教えてくれます。
      caption: 闇を破ったのは一人の「よそ者」
