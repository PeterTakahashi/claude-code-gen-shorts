ja:
  title: '光速で走ったら時間はどうなる? #Shorts'
  description: 'もし、私たちが光の速度で走れたら、時計の針はどう動くのか。

    アインシュタインが100年前に解いた、宇宙で最も奇妙な答えを、30秒で解説します。


    #Shorts #物理 #相対性理論 #時間の遅延 #アインシュタイン

    '
  hook_caption: 光速で走ったら時間はどうなる?
  series_brand: 30秒物理
  voice_speed: 1.4
  narration:
  - panel: p1
    text: もし、あなたが光の速度で走れたら、あなたの時計は、どう動くのか?——答えは、止まる、です。
    caption: 光速で走ると時計は止まる
  - panel: p2
    text: これは、1905年にアインシュタインが、特殊相対性理論で、証明したことなんです。
    caption: 1905年、アインシュタインが証明
  - panel: p3
    text: 速度が光速に近づくほど、時間は、自分以外の世界から見て、ゆっくり進みます。これを、時間の遅延と、呼びます。
    caption: 光速に近づくほど時間が遅延
  - panel: p4
    text: 光速の99.9%で1年宇宙を旅したら、地球では、約22年が、経っています。あなただけが、若いまま、戻ってくる。
    caption: 1年の旅で地球は22年経過
  - panel: p5
    text: つまり、時間は宇宙のどこでも、同じ速度で進む、絶対的なもの、ではありません。観測する人の速度によって、時間自体が、変わるんです。
    caption: 時間は絶対ではなく相対
  - panel: p6
    text: そして光速ぴったりで動けば、時間は完全に、止まります。光自身から見れば、宇宙の歴史は、たった一瞬で、終わっています。
    caption: 光速ぴったりでは時間が完全停止
en:
  title: 'What Happens to Time at the Speed of Light? #Shorts'
  description: 'If you could move at the speed of light, what would happen to your clock?

    We explain one of the universe''s strangest secrets, first solved by Einstein over 100 years ago.


    #Shorts #Physics #Relativity #TimeDilation #Einstein'
  hook_caption: What Happens to Time at Light Speed?
  series_brand: 30-Second Physics
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: If you could run at the speed of light, your personal experience of time would completely stop.
    caption: Time stops at light speed
  - panel: p2
    text: This isn't science fiction; it's what Einstein proved back in 1905 with his theory of special relativity.
    caption: Einstein's 1905 Proof
  - panel: p3
    text: The closer you get to light speed, the slower time passes for you compared to everyone else. This effect is called 'time dilation.'
    caption: This is 'Time Dilation'
  - panel: p4
    text: Travel in space for one year at 99.9% light speed, and you'd return to an Earth where 22 years have passed.
    caption: 1 year = 22 Earth years
  - panel: p5
    text: So time isn't some absolute clock for the universe. It's relative, and changes depending on your speed.
    caption: Time is Relative
  - panel: p6
    text: And at the *exact* speed of light? Time freezes entirely. From light's own perspective, the entire history of the universe happens in a single instant.
    caption: The Universe in an Instant
