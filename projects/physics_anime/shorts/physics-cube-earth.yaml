    Earth floating in deep starry black space, the cube tilted slightly

    to show three faces, each face showing weather patterns, blue oceans,

    green continents — but the oceans pool unnaturally toward the center

    of each square face leaving the sharp corners as dry barren black

    peaks rising into vacuum, soft cosmic blue rim light wrapping the

    edges, a faint decorative English caption silhouette "IF EARTH WERE

    A CUBE" floating subtly in the corner, the visual of "what would

    happen if our planet had six flat faces". Subject filling square

    center for vertical short layout with blurred padding above and

    below. Pure cosmic composition. No people.

    '
- id: p2
  prompt: 'Square 1:1 anime/webtoon style illustration filling the frame.

    A warm cozy modern anime physics classroom, the friendly middle-

    aged Japanese physicist with silver-grey hair and round wire-frame

    glasses, gentle teaching smile, white lab coat over beige sweater,

    pointing at a small floating spherical Earth model in his right

    hand and a small floating cubic Earth model in his left, decorative

    English headline floating above them reading "SPHERE vs CUBE", a

    chalkboard behind him with the decorative English equation

    "g = GM/r²" sketched in white chalk, bright afternoon light through

    tall windows. Clearly classroom setting. Mid-shot.

    Character: {prof_kawai}.

    '
- id: p3
  prompt: 'Square 1:1 anime/webtoon style illustration filling the frame.

    A dramatic dynamic view of a cube-Earth from low orbit, one full

    square face dominating the frame, the entire ocean of that face

    pulled into a single colossal circular dome of water bulging at

    the geometric center of the face, the four corners of the face

    jutting upward into thin atmosphere as dry barren rocky peaks

    labeled with decorative English captions "VACUUM ZONE", thin atmos-

    pheric haze concentrated only over the central water dome with

    a decorative English caption silhouette "ATMOSPHERE LAKE",

    curving glowing arrows showing gravity vectors all pointing toward

