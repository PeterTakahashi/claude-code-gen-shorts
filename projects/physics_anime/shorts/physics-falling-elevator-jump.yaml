id: physics-falling-elevator-jump
parent_chapter: null
panels:
  - id: p1
    prompt: |
      A dramatic interior of a falling elevator, cables snapped above, a worried person inside
      bracing, motion lines showing rapid descent, the visual of "can you survive by jumping just before
      impact?". Tense, cinematic illustration.
  - id: p2
    prompt: |
      A physics diagram of the elevator and person both falling at the same speed inside,
      matching downward arrows, the person floating slightly, the visual of "you and the elevator fall at the same speed".
      Clean science illustration.
  - id: p3
    prompt: |
      A diagram showing the person crouching then jumping upward inside the falling elevator,
      a small upward arrow versus a huge downward speed arrow, the visual of "your jump speed is tiny compared to the fall".
      Clean physics infographic.
  - id: p4
    prompt: |
      A diagram of the moment of impact: the elevator hits the ground, the person still moving
      down almost as fast, the visual of
      "the jump barely cancels the deadly speed". Tense science diagram.
  - id: p5
    prompt: |
      A clean infographic of safer real options: lie flat on the floor to spread the impact,
      the visual of "lying flat spreads
      the force better". Clean safety illustration.
  - id: p6
    prompt: |
      A calm diagram noting real elevators have multiple brakes and safety systems, a reassured
      person, the loop image of
      "real elevators almost never free-fall". Calm, reassuring tone.
ja:
  title: '落下するエレベーターで直前にジャンプすれば助かる? #Shorts'
  description: |
    落ちるエレベーターの中で、地面に着く直前にジャンプすれば助かる。よく聞く話ですが、物理的には助かりません。その理由と、本当に取るべき行動を30秒で解説します。

    #Shorts #物理 #エレベーター #思考実験 #雑学
  hook_caption: 落下エレベーターで直前ジャンプは助かる?
  series_brand: 30秒の思考実験
  voice_speed: 1.4
  narration:
    - panel: p1
      text: ケーブルが切れて落下するエレベーター。着地の直前にジャンプすれば助かる、という話を聞いたことはありませんか。
      caption: 直前にジャンプすれば助かる、という噂
    - panel: p2
      text: 落下中、あなたはエレベーターと全く同じ速度で落ちています。だから中では、ふわりと浮いたような状態になります。
      caption: 人とエレベーターは同じ速度で落ちている
    - panel: p3
      text: ここでジャンプしても、あなたが得られる速度はせいぜい時速数キロ。一方、落下速度は時速100キロを超えることもあります。
      caption: ジャンプで得られる速度はごくわずか
    - panel: p4
      text: つまり、命がけのジャンプで打ち消せるのは、落下速度のほんの一部だけ。残念ながら、これでは助かりません。
      caption: 落下速度のごく一部しか打ち消せない
    - panel: p5
      text: もし本当にその状況になったら、床にできるだけ平らに寝そべるのが正解です。衝撃を体全体に分散できるからです。
      caption: 床に平らに寝て衝撃を分散するのが正解
    - panel: p6
      text: とはいえ、実際のエレベーターには何重もの安全装置があり、自由落下はまず起きません。心配するより、噂を疑う癖をつけたいですね。
      caption: 実際は何重もの安全装置で自由落下は起きない
