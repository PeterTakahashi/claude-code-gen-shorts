ja:
  title: 'もし地球の重力が1秒だけ消えたら何が起きるか #Shorts'
  description: 'もし、地球の重力が、たった1秒だけ消えたら、世界はどうなるのか。

    自転速度・慣性・自由落下から、たった30秒で、その悲惨な答えを、

    河合博士が解説します。


    #Shorts #物理 #重力 #思考実験 #ifの世界

    '
  hook_caption: 重力が1秒消えたら世界は?
  series_brand: 無重力の1秒
  voice_speed: 1.4
  narration:
  - panel: p1
    text: もし、地球の重力が、たった1秒だけ、消えたら——人も、車も、海も、空気も、一斉に、空へ浮き上がります。
    caption: 重力が1秒消えると全部浮く
  - panel: p2
    text: では、なぜ浮くのか。地球は、自転していて、私たちは、その回転に、引きずられて動いているからです。
    caption: 地球は自転しているから
  - panel: p3
    text: 赤道上の自転速度は、秒速約465メートル。重力が消えた瞬間、慣性で、その速度のまま、空に放り出されます。
    caption: 赤道は秒速465mで放出
  - panel: p4
    text: しかも、海水と大気にも、重力が効かなくなるため、海は柱のように立ち上がり、空気は宇宙へ、漏れ出していきます。
    caption: 海は柱になり、大気は漏れる
  - panel: p5
    text: 1秒後、重力が戻ると、すべての物体は、自由落下を始めます。1秒間の落下距離は、4.9メートル。建物の2階から、無防備に落とされるのと、同じです。
    caption: 重力復帰、4.9m自由落下
  - panel: p6
    text: 結果、世界中で同時に、車も人もガラスも、地面に叩きつけられる、大惨事になります。たった1秒でも、重力を、舐めてはいけません。
    caption: 1秒でも重力を舐めるな
en:
  title: 'What If Gravity Disappeared for 1 Second? #Shorts'
  description: 'What would happen if gravity vanished for just one second? The answer is more catastrophic than you can imagine. We break down the physics of this terrifying thought experiment.

    #Shorts #Physics #WhatIf #Science #ThoughtExperiment'
  hook_caption: What If Gravity Vanished for 1 Second?
  series_brand: 1 Second of Zero G
  voice_speaker: Ryan
  narration:
  - panel: p3
    text: What if Earth's gravity vanished for just one second?
    caption: 1 Second, 0 Gravity
  - panel: p2
    text: You might think we'd just float gently... but the reality is much more violent.
    caption: It's not gentle...
  - panel: p1
    text: The Earth's surface is spinning at over 1,000 miles per hour. Gravity is the only thing pinning us down.
    caption: Spinning at 1000 mph
  - panel: p6
    text: Without it, inertia would fling us sideways into the sky at bullet-train speeds.
    caption: Launched sideways
  - panel: p4
    text: Our oceans and atmosphere would be torn from the surface, erupting into space.
    caption: Oceans torn away
  - panel: p5
    text: Then, gravity returns. Everything that was launched now freefalls, causing a worldwide impact event.
    caption: A global impact
