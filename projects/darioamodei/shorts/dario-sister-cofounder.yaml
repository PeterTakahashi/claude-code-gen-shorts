ja:
  title: '兄妹で立ち上げたAI会社 #Shorts'
  description: '2021年、ダリオ・アモデイは妹ダニエラと共にAnthropicを共同創業した。

    兄がCEO、妹がPresident。兄妹で世界トップクラスのAI企業を率いるのは、シリコンバレーでも極めて異例。

    #Shorts #ダリオアモデイ #Anthropic #Claude #人物伝

    '
  hook_caption: 兄妹で立ち上げたAI会社
  series_brand: ダリオ・アモデイ伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 兄がCEO、妹がプレジデント。兄妹で、世界トップクラスのAI企業を、率いている男がいます。
    caption: 兄CEO、妹President
  - panel: p2
    text: ダリオ・アモデイと、妹のダニエラ・アモデイ。AI会社Anthropicの、共同創業者です。
    caption: Anthropic 共同創業者
  - panel: p3
    text: 二人は、子どもの頃から、科学と倫理を、いつも一緒に語り合う、極めて近い兄妹でした。
    caption: 幼い頃から科学を語り合う兄妹
  - panel: p4
    text: そして、大人になってからは、OpenAIでも、同じ職場で、肩を並べて働いていたんです。
    caption: OpenAIでも同じ職場
  - panel: p5
    text: 2021年、二人は、信頼する仲間と一緒に、Anthropicを、設立しました。
    caption: 2021年、Anthropic 設立
  - panel: p6
    text: ダリオが研究と戦略、ダニエラが組織と運営。役割を、見事に、分担しています——シリコンバレーでも、極めて、異例の兄妹経営です。
    caption: 兄妹で完璧な役割分担
en:
  title: 'He Left OpenAI to Build A Rival With His Sister #Shorts'
  description: 'In 2021, Dario and Daniela Amodei co-founded Anthropic. He serves as CEO, she as President. This brother-sister team leading a top AI company is a rarity, even in Silicon Valley.

    #Shorts #Anthropic #DarioAmodei #Claude #AI'
  hook_caption: He Quit OpenAI To Start A Rival... With His Sister
  series_brand: The Story of Dario Amodei
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: Meet Dario and Daniela Amodei, the brother-sister duo running Anthropic, one of the world's top AI companies.
    caption: A Family Affair
  - panel: p2
    text: Ever since they were kids, the two were inseparable, constantly debating science and ethics.
    caption: Inseparable Siblings
  - panel: p3
    text: As adults, they worked side-by-side again, this time at the pioneering AI lab, OpenAI.
    caption: Colleagues at OpenAI
  - panel: p4
    text: But in 2021, they left to start their own company, bringing a team of trusted colleagues with them.
    caption: Anthropic is Born
  - panel: p5
    text: 'Today, they have the perfect partnership: Dario leads research and long-term strategy...'
    caption: The Visionary
  - panel: p6
    text: '...while Daniela, as President, builds the organization. A true power duo, almost unheard of in Silicon Valley.'
    caption: The President
