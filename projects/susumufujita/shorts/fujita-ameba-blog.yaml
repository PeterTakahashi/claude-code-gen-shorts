ja:
  title: '芸能人ブログで業界の常識を変えた男 #Shorts'
  description: '2004年、フジタ ススムは Ameblo を立ち上げ、芸能人ブログプラットフォームへと舵を切った。

    日本のブログ業界の常識を変えた決断の話。


    #Shorts #藤田晋 #Ameblo #CyberAgent #人物伝

    '
  hook_caption: 芸能人ブログで業界を変えた
  series_brand: フジタ ススム伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 日本のブログ業界の、常識を、ひっくり返した男がいます。
    caption: ブログ業界の常識を変えた男
  - panel: p2
    text: 2004年、CyberAgent のフジタ ススムは、Ameba という、新しいブログサービスを、立ち上げました。
    caption: 2004年、Ameblo を立ち上げ
  - panel: p3
    text: しかし、当初は、ライバルに、まったく、勝てなかったんです。
    caption: 当初はライバルに惨敗
  - panel: p4
    text: そこで、フジタは、決断します。「芸能人に、書いてもらおう」、と。
    caption: 芸能人に書いてもらう、と決断
  - panel: p5
    text: 事務所を、1社ずつ、口説き、有名タレントの公式ブログを、次々に、Ameblo に集めました。
    caption: 事務所を1社ずつ口説いた
  - panel: p6
    text: ファンが、押し寄せ、Ameblo は、日本最大の、ブログプラットフォームに、成長したんです。
    caption: Ameblo は日本最大に成長
en:
  title: 'His Blog Platform Was Failing... So He Hired Celebrities #Shorts'
  description: 'In 2004, Susumu Fujita''s new platform Ameba Blog couldn''t compete. His solution? Pivot to exclusively hosting Japan''s biggest celebrities. This one decision changed the country''s internet
    culture forever.


    #Shorts #Business #Entrepreneurship #Japan #Ameblo'
  hook_caption: His blog was failing... until this one idea.
  series_brand: The Susumu Fujita Story
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: In 2004, Susumu Fujita of CyberAgent launched a new blog service called Ameba.
    caption: A new blog service
  - panel: p3
    text: But at first, it was a total flop, completely overshadowed by its rivals.
    caption: It was failing
  - panel: p4
    text: 'So Fujita made a radical decision: forget ordinary users, let''s get celebrities to write for us.'
    caption: A radical decision
  - panel: p1
    text: He personally pitched talent agencies one by one, convincing Japan's biggest stars to join.
    caption: Recruiting the stars
  - panel: p5
    text: The strategy worked. Millions of fans flooded the site and user numbers exploded overnight.
    caption: Users exploded
  - panel: p6
    text: And just like that, Ameblo became the undisputed king of Japan's blogosphere.
    caption: 'Japan''s #1 Platform'
