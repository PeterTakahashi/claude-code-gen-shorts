ja:
  title: '累積赤字200億超でも続けたABEMAの話 #Shorts'
  description: '2016年、フジタ ススムは ABEMA をテレ朝と合弁で立ち上げた。

    累積赤字が200億円を超えても、続行する決断をした男の話。


    #Shorts #藤田晋 #ABEMA #CyberAgent #人物伝

    '
  hook_caption: 赤字200億でもABEMAを続けた
  series_brand: フジタ ススム伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 累積赤字、200億円を、超えても、続けると、決めた経営者がいます。
    caption: 累積赤字200億超でも続行
  - panel: p2
    text: 2016年、フジタ ススムは、テレ朝と組んで、ABEMA を、立ち上げました。
    caption: 2016年、テレ朝と ABEMA を合弁
  - panel: p3
    text: 日本初の、24時間、無料の、インターネットテレビ。コンセプトは、画期的でした。
    caption: 日本初、24時間無料ネットTV
  - panel: p4
    text: しかし、毎年、数十億円の、巨額赤字が、続いたんです。
    caption: 毎年、数十億円の赤字
  - panel: p5
    text: それでも、フジタは、撤退を、選びませんでした。社内の反対を、押し切ったんです。
    caption: 社内の反対を押し切って続行
  - panel: p6
    text: そして、2022年、サッカーワールドカップの、無料配信で、ABEMA は、一気に、国民的な、サービスになりました。
    caption: 2022年、W杯配信で国民的サービスに
en:
  title: 'Why He Gambled ¥20 Billion on a Failing TV Network #Shorts'
  description: 'Susumu Fujita''s streaming service ABEMA was losing billions. Instead of quitting, he made a risky bet that changed everything.


    #Shorts #SusumuFujita #ABEMA #Business #Japan'
  hook_caption: He Lost ¥20 Billion. Here's Why.
  series_brand: The Susumu Fujita Story
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: 'In 2016, Susumu Fujita launched ABEMA, a radical new idea: completely free, 24/7 internet TV.'
    caption: A Radical Idea
  - panel: p3
    text: But while the concept was revolutionary, the business was bleeding money... a lot of it.
    caption: Bleeding Money
  - panel: p1
    text: Soon, the company was over 20 billion yen in the red, a staggering amount of debt.
    caption: ¥20 Billion in the Red
  - panel: p4
    text: His own team wanted out, but Fujita refused to give up on his vision and pushed back hard.
    caption: Refusing to Quit
  - panel: p5
    text: His final gamble? Streaming the 2022 World Cup for free, turning ABEMA into a national sensation overnight.
    caption: The Winning Bet
