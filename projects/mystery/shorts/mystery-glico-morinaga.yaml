ja:
  title: 'グリコ森永事件、42年経った今 #Shorts'
  description: '1984年、社長誘拐から始まり、お菓子に青酸カリを混入。「かい人21面相」と名乗る犯人は、警察を翻弄し続けた末に、消えた。

    時効から25年経った今も未解決の、戦後最大の劇場型犯罪を、Animeで。


    #Shorts #グリコ森永事件 #未解決 #劇場型犯罪 #1984

    '
  hook_caption: グリコ森永、42年経った今
  series_brand: バルトゥーン未解決事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 1984年3月18日夜、兵庫県西宮で、Glicoの社長が、覆面の男たちに、自宅の風呂場から誘拐されました。ここから、17か月続く戦後最大の劇場型犯罪が、始まります。
    caption: 1984年、社長が風呂場から誘拐
  - panel: p2
    text: 犯人は身代金10億円を要求し、応じないと見るや、コンビニのお菓子に青酸カリを混入させると脅迫しました。実際に毒入り商品が見つかり、全国の店頭から、お菓子が一斉に消えます。
    caption: お菓子に青酸カリ、店頭から消える
  - panel: p3
    text: 犯人は警察やマスコミに、英文で「かい人21面相」と署名した挑戦状を、何十通も送りつけました。手口の派手さから「劇場型犯罪」という言葉が、日本で生まれます。
    caption: 「かい人21面相」の挑戦状
  - panel: p4
    text: 誘拐から3日後、社長は自力で監禁先から脱出します。しかし犯人は捕まらず、矛先をMorinaga、House食品など、他の大手食品メーカーに、次々と移していきました。
    caption: 標的はMorinagaなど他社へ拡大
  - panel: p5
    text: 警察は何度も犯人に肉薄しますが、覆面パトカーから降りた瞬間を目撃された「キツネ目の男」を含め、ことごとく逃げられました。
    caption: 「キツネ目の男」も取り逃がす
  - panel: p6
    text: そして17年後の2000年に時効が成立し、42年経った今も、犯人は誰一人として、特定されていません。日本警察が完敗した、唯一の事件なんです。
    caption: 2000年に時効、警察完敗の事件
en:
  title: 'Japan''s Greatest Unsolved Mystery: The Monster with 21 Faces #Shorts'
  description: 'In 1984, a mysterious criminal gang calling itself ''The Monster with 21 Faces'' kidnapped a candy CEO, poisoned store shelves, and taunted police for 17 months before vanishing. The case
    remains completely unsolved.


    #Shorts #UnsolvedMysteries #TrueCrime #Japan #GlicoMorinaga'
  hook_caption: The Phantom Criminals Who Taunted All of Japan
  series_brand: Bartoon Unsolved Mysteries
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: It began on a quiet night in 1984. Masked men kidnapped the president of Japan's biggest candy company, Glico... right out of his own bathtub.
    caption: Kidnapped from his bath
  - panel: p2
    text: When their ransom demands failed, they began lacing candy with cyanide and leaving it on store shelves, sparking a nationwide panic.
    caption: Poison in the candy aisle
  - panel: p3
    text: Calling themselves 'The Monster with 21 Faces,' they sent dozens of taunting letters to police and the media, turning their crime into a public spectacle.
    caption: The Monster with 21 Faces
  - panel: p4
    text: The CEO miraculously escaped, but the Monster just expanded its targets to rival food companies, continuing the campaign of terror.
    caption: The terror spreads
  - panel: p5
    text: Police had multiple chances to catch them, even identifying a key suspect known as the 'Fox-Eyed Man.' But every single time, the criminals slipped right through their fingers.
    caption: Always one step ahead
  - panel: p6
    text: After 17 months, they just... vanished. The statute of limitations has long expired, and to this day, no one knows who they were. It remains Japan's most humiliating police failure.
    caption: A perfect, unsolved crime
