ja:
  title: '帝銀事件、12人毒殺の真犯人は別にいた? #Shorts'
  description: |
    1948年、東京の帝国銀行椎名町支店で、男が「予防薬」と偽って行員に毒を飲ませ、12人が死亡した。逮捕された男性は死刑判決を受けたが、冤罪説は今も根強い。戦後最大級の謎、帝銀事件を30秒で解説します。

    #Shorts #未解決事件 #帝銀事件 #昭和事件 #雑学
  hook_caption: 帝銀事件、真犯人は別にいた?
  series_brand: 未解決事件ファイル
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 1948年、東京のある銀行で、にわかには信じられない事件が起きました。閉店間際の店内で、行員たちが次々と倒れたんです。
      caption: 1948年、銀行で行員が次々倒れた
    - panel: p2
      text: 犯人は、腕章をつけた男。「赤痢の予防薬だ」と偽り、行員たちに、ある液体を飲ませました。
      caption: 「予防薬」と偽り液体を飲ませた
    - panel: p3
      text: その正体は、猛毒でした。12人が命を落とし、男は現金を奪って、悠々と姿を消したのです。
      caption: 正体は猛毒、12人が死亡し金が奪われた
    - panel: p4
      text: やがて、一人の画家が逮捕され、死刑判決を受けます。しかし、彼が真犯人だという決定的な証拠は、ありませんでした。
      caption: 逮捕された画家に決定的な証拠はなかった
    - panel: p5
      text: 自白は強引な取り調べによるものとされ、冤罪を訴える声は年々強まりました。彼は再審を求めたまま、獄中で亡くなります。
      caption: 冤罪を訴えたまま獄中で亡くなった
    - panel: p6
      text: もし彼が無実なら、12人を毒殺した本当の犯人は、罰されないまま生涯を終えたことになります。真相は、今も闇の中です。
      caption: 本当の犯人は罰されないまま終えたのか
