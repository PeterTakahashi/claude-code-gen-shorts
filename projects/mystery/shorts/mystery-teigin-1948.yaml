      A noir 1940s Tokyo bank interior at closing time, a man in a coat and armband presenting
      a small medicine bottle to nervous staff, dim ominous light, the visual of "a poisoning inside a bank". Dark, tense historical noir.
  - id: p2
    prompt: |
      A 1948 newspaper-style illustration of the man claiming to be a health official handing
