ja:
  title: '世田谷一家殺害事件、27年経った今 #Shorts'
  description: '1999年大晦日、東京・世田谷で一家4人が殺害された。犯人のDNA、指紋、足跡——証拠は山ほどあるのに、27年経った今も逮捕者ゼロ。

    日本警察が今も追い続ける、最も理不尽な未解決事件をAnimeで。


    #Shorts #世田谷一家殺害事件 #未解決 #事件 #1999

    '
  hook_caption: 世田谷事件、27年後の今
  series_brand: 世田谷事件
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 犯人の指紋、血液、DNA、足跡——すべて残されていたのに、27年経った今も、捕まらない事件があるんです。それが、1999年の世田谷一家殺害事件です。
    caption: 証拠ありで27年捕まらない事件
  - panel: p2
    text: 1999年12月31日朝、東京・世田谷区上祖師谷の住宅で、宮澤さん一家4人が遺体で発見されます。父38歳、母41歳、長女8歳、長男6歳、全員が刺殺でした。
    caption: 1999年大晦日、一家4人を発見
  - panel: p3
    text: 犯人は2階の浴室窓から侵入し、家族全員を殺害した後、なぜか4時間も家に居座っています。冷蔵庫のアイスクリームを食べ、パソコンでWebを閲覧し、ソファで仮眠まで取っていました。
    caption: 殺害後4時間、犯人は家に居座る
  - panel: p4
    text: 残された証拠は、現場の血痕付きDNA、靴に付着していた砂、犯人の体液、米国製ハンカチ。指紋もDNAも完全に取れていたので、本来なら数日で特定できるはずでした。
    caption: DNAも指紋も完全に採取済み
  - panel: p5
    text: ところがDNAは、日本人データベースのどこにも一致しません。鑑定では、父系がアジア系、母系が南欧系の混血と判明していますが、該当者は今も、見つかっていません。
    caption: DNAは混血、データに該当者なし
  - panel: p6
    text: それから27年経った今も、警視庁は捜査を継続しています。物証が揃って、犯人像も具体的なのに、捕まらない——日本警察にとって、最も悔しい事件なんです。
    caption: 27年経った今も捜査継続中
en:
  title: 'Police Have His DNA, But Can''t Find Him #Shorts'
  description: 'On New Year''s Eve 1999, an entire family was murdered in Setagaya, Tokyo. The killer left behind his DNA, fingerprints, and clothing. Yet for over two decades, he has never been caught.
    This is Japan''s most baffling cold case.


    #Shorts #TrueCrime #UnsolvedMysteries #Japan'
  hook_caption: The Killer Who Left EVERYTHING Behind
  series_brand: The Setagaya Murders
  voice_speaker: Aiden
  narration:
  - panel: p2
    text: On New Year's Eve 1999, an entire family was murdered in their suburban Tokyo home.
    caption: New Year's Eve, 1999
  - panel: p3
    text: But the killer didn't just flee. He stayed for hours—eating their ice cream, using their computer, and even taking a nap.
    caption: The Killer Stayed Behind
  - panel: p1
    text: 'He left behind a mountain of evidence: fingerprints, his clothes, and even a bloody handprint.'
    caption: A Mountain of Evidence
  - panel: p4
    text: Investigators recovered a perfect DNA sample. They were sure the case would be solved in days.
    caption: Perfect DNA Sample
  - panel: p5
    text: 'But his DNA didn''t match anyone in Japan''s database. It revealed a unique ancestry: part Asian, part Southern European.'
    caption: A Shocking Twist
  - panel: p6
    text: For over 20 years, police have had the killer's identity on file... but have never found the man himself.
    caption: The Hunt Continues
