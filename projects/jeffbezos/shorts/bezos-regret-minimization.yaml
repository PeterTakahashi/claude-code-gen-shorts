ja:
  title: '80歳の自分から見て後悔しない選択 #Shorts'
  description: '1994年、Wall Street の高給職を辞めるか悩んだジェフ・ベゾスは、

    「80歳の自分から見て後悔しない方を選ぶ」という思考実験で、Amazon 創業を決めた。


    #Shorts #ジェフベゾス #Amazon #人物伝

    '
  hook_caption: DE Shawを辞めた決断
  series_brand: ジェフ・ベゾス伝
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 80歳の自分から見て、後悔しない方を選ぶ——この思考実験で、人生を決めた男がいます。
    caption: 80歳の自分から逆算する
  - panel: p2
    text: 1994年、30歳のジェフ・ベゾスは、ヘッジファンド DE Shaw の副社長として、安定した未来を持っていました。
    caption: 1994年、DE Shaw の副社長
  - panel: p3
    text: しかし、急成長する Web に、本を売るチャンスを見出してしまったんです。
    caption: Web に本を売るチャンスを発見
  - panel: p4
    text: 上司の David Shaw は、辞めない方がいい、と引き止めました。
    caption: 上司の David Shaw は引き止めた
  - panel: p5
    text: そこで彼は、「80歳になって振り返ったとき、挑戦しなかったことを後悔するか」と、自問しました。
    caption: 「80歳の自分なら後悔するか」
  - panel: p6
    text: 答えは明確で、彼は辞めて、Amazon を創業した——これが「Regret Minimization Framework」です。
    caption: Regret Minimization Framework
en:
  title: 'The Framework That Built a Trillion-Dollar Empire #Shorts'
  description: 'In 1994, Jeff Bezos faced a life-changing choice: a stable Wall Street career or a risky internet startup. He used a powerful mental model to make the right call.

    #JeffBezos #Amazon #DecisionMaking #BusinessStrategy #Shorts'
  hook_caption: The Question That Built Amazon
  series_brand: The Bezos Blueprint
  voice_speaker: Ryan
  narration:
  - panel: p2
    text: In 1994, Jeff Bezos was a 30-year-old Vice President at a top Wall Street hedge fund, with a secure and lucrative future.
    caption: Wall Street, 1994
  - panel: p3
    text: 'But he spotted a massive opportunity: selling books on the brand-new, exponentially growing internet.'
    caption: The Big Idea
  - panel: p4
    text: His boss advised against it, calling it a great idea... for someone who didn't already have a great job.
    caption: A Risky Move
  - panel: p5
    text: To decide, Bezos invented a mental model he called the 'Regret Minimization Framework.'
    caption: ''
  - panel: p1
    text: 'He pictured himself at 80 years old, and asked a simple question: which outcome would I regret more?'
    caption: The Regret Test
  - panel: p6
    text: He knew he'd regret not trying far more than he'd ever regret failing. He quit his job, and Amazon was born.
    caption: Amazon Begins
