ja:
  title: '15歳の大谷翔平が高校で書いた、9マス目標シートが衝撃的だった #Shorts'
  description: '16年前の2010年、当時15歳の大谷翔平が、花巻東高校1年で書いた「目標達成シート」。

    9x9の81マスに、ドラフト1位を中心に、ゴミ拾いや挨拶まで——15歳が書いたとは思えない設計図でした。


    #Shorts #大谷翔平 #目標達成シート #MLB #花巻東

    '
  hook_caption: 15歳大谷の目標シート
  series_brand: 大谷の目標シート
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 大谷翔平が15歳の時に書いた「目標達成シート」が、ヤバすぎるって、ご存じですか。
    caption: 15歳大谷の目標シートが衝撃
  - panel: p2
    text: 16年前の2010年、当時15歳の大谷は、岩手県の花巻東高校1年で、A4用紙1枚に、9x9の81マスを描き始めました。
    caption: 16年前、花巻東1年の大谷
  - panel: p3
    text: 中心のマスには、なんと「ドラフト1位 8球団」と書かれていて、その周りに、体作り、制球、メンタルなど、8つのテーマが、並んでいたんです。
    caption: 中心は「ドラフト1位 8球団」
  - panel: p4
    text: 驚くべきは「運」のテーマで、挨拶、ゴミ拾い、部屋の掃除、道具を大切にする——運すら、日々の習慣に、分解されていました。
    caption: 「運」もゴミ拾いに分解
  - panel: p5
    text: 16年後、大谷は MLB Los Angeles Dodgers の17番として、世界中の少年が憧れる選手に、本当になっています。
    caption: 16年後、MLB17番になった
  - panel: p6
    text: 夢ではなく、設計図として書く——15歳の大谷が教えてくれるのは、目標とは具体化した瞬間、現実になり始めるということです。
    caption: 目標は具体化した瞬間始まる
en:
  title: 'The Secret Blueprint 15-Year-Old Ohtani Wrote for Stardom #Shorts'
  description: 'In 2010, a 15-year-old Shohei Ohtani created a detailed 9x9 grid to plan his path to becoming a #1 draft pick.

    His plan even included how to improve his ''luck'' through daily habits. This is his story.

    #Shorts #ShoheiOhtani #MLB #Baseball #Goals'
  hook_caption: His Blueprint for Stardom at Age 15
  series_brand: Ohtani's Goal Sheet
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: This is the incredible goal sheet Shohei Ohtani wrote when he was only 15 years old.
    caption: Ohtani's Secret Plan
  - panel: p2
    text: Back in 2010, as a high school freshman, he mapped out his entire future on a single piece of paper.
    caption: A High School Freshman
  - panel: p3
    text: 'His core goal was audacious: to be the number one draft pick for eight different professional teams.'
    caption: 'Goal: #1 Draft Pick'
  - panel: p4
    text: But the most amazing part? He even planned how to improve his 'LUCK' with simple habits like picking up trash and cleaning his room.
    caption: Even 'Luck' was a goal
  - panel: p5
    text: And today, that 15-year-old's plan has become reality, making him a global superstar for the Los Angeles Dodgers.
    caption: The Dream Realized
  - panel: p6
    text: He didn't just write down a dream; he drew a blueprint, showing that a goal becomes real the moment you make it concrete.
    caption: A Blueprint, Not a Dream
