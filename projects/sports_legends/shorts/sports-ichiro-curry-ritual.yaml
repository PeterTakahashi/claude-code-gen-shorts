ja:
  title: 'イチローが毎朝、同じ時間にカレーを食べた理由 #Shorts'
  description: 'シアトル時代のイチローは、試合日には毎朝、同じ時間に、同じカレーを食べていた。

    なぜ彼は、変化ではなく、徹底した「同じ」を選んだのか。


    #Shorts #イチロー #Ichiro #ルーティン #野球 #伝説

    '
  hook_caption: 同じカレー、262本の理由
  series_brand: バルトゥーンスポーツ選手伝説
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「シーズン中、毎朝、同じ時間に、同じカレーを食べていた選手がいた」——22年前のシアトルにいた、ある日本人の話を知っていますか?
    caption: 毎朝同じカレーを食べる選手
  - panel: p2
    text: 当時30歳のイチローは、試合日には朝11時、ほぼ判で押したように、奥さんが用意したカレーを、一人で静かに食べていました。
    caption: 朝11時、判で押したように
  - panel: p3
    text: 彼は変数を、極端に嫌った人でした。食事も、ストレッチも、バット入れの順番すら、同じ。「同じ」を守ることで、自分の状態を、正確に読めるからです。
    caption: 「同じ」を守れば自分が見える
  - panel: p4
    text: コンディションが、わずかにブレた日、いつもと違うのは、自分の体だけ——だからこそ、立ち位置や、振りの調整が、ミリ単位でできた。
    caption: 体のブレが、ミリ単位で見える
  - panel: p5
    text: その2004年、イチローはシーズン262安打という、84年破られなかったMLB記録を、塗り替えました。
    caption: 2004年、262安打のMLB新記録
  - panel: p6
    text: 記録を出した翌朝も、彼はまた、同じ時間に、同じカレーを食べた——天才ではなく、変えないことを選び続けた、人間の話です。
    caption: 翌朝もまた、同じカレー
en:
  title: 'Why This MLB Legend Ate the Same Meal Every Day #Shorts'
  description: 'During his record-breaking 2004 season, Ichiro Suzuki ate the same curry before every single game. This wasn''t a superstition; it was the secret to his legendary precision.


    #Shorts #Ichiro #Baseball #MLB #History'
  hook_caption: His Pre-Game Meal Broke an 84-Year Record
  series_brand: 'Valiant Toons: Sports Legends'
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In 2004, Seattle Mariners star Ichiro Suzuki had a strange pre-game ritual.
    caption: A Strange Ritual
  - panel: p2
    text: 'Every single game day, at the exact same time, he would eat the same meal: a plate of his wife''s curry.'
    caption: Same Time, Same Meal
  - panel: p3
    text: But this wasn't superstition. Ichiro was obsessed with eliminating variables from his routine.
    caption: Eliminating Variables
  - panel: p4
    text: By keeping everything else constant, he could instantly detect the tiniest changes in his own body.
    caption: A Perfect Baseline
  - panel: p5
    text: This focus allowed him to make micro-adjustments at the plate, leading to 262 hits and shattering an 84-year-old MLB record.
    caption: An 84-Year Record Broken
  - panel: p6
    text: The very next morning, he was back at it. A testament not to genius, but to incredible discipline.
    caption: The Master of Discipline
