ja:
  title: '室伏広治、空っぽのスタジアムで受け取った金メダル #Shorts'
  description: |
    2004年アテネ五輪のハンマー投げ、室伏広治は銀メダル。しかし優勝したハンガリーのアドリアン・アヌシュがドーピング検査を拒否して失格、繰り上げで金メダルに。授賞式は閉会式後、ほぼ空のスタジアムで行われた。父・重信から託された夢の物語を30秒で解説します。

    #Shorts #スポーツ #室伏広治 #アテネ五輪 #名場面
  hook_caption: 空のスタジアムで受け取った室伏の金
  series_brand: 室伏広治
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 2004年のアテネ五輪、ハンマー投げの決勝に挑んでいたのが、室伏広治です。彼は、ハンマー投げ選手だった父・重信から託された、五輪の金メダルという夢を背負っていました。
      caption: 2004年アテネ、父の夢を背負った室伏
    - panel: p2
      text: 決勝の場で、彼はアジア記録に迫る投擲を見せます。しかし優勝したのは、ハンガリーのアドリアン・アヌシュ。室伏は、悔しい銀メダルに終わりました。
      caption: 金はハンガリーのアヌシュ、室伏は銀
    - panel: p3
      text: 表彰式で、彼は黙って銀の段に立ちます。父の夢には、あと一歩、届かなかった。誰もが、そう思った瞬間でした。
      caption: 父の夢にあと一歩届かず銀の段に
    - panel: p4
      text: ところが大会後、金メダルのアヌシュにドーピングの再検査が命じられます。彼はこれを拒否し、結果として金メダルを剥奪されてしまうのです。
      caption: アヌシュが再検査を拒否し金を剥奪された
    - panel: p5
      text: そして繰り上げで、金メダルは室伏に。授賞式が行われたのは、閉会式も終わったあとの、ほとんど人のいないスタジアムでした。
      caption: 閉会式後、空のスタジアムで授賞式
    - panel: p6
      text: 静かな夜風の中、彼は金メダルを手に空を見上げます。父・重信から託された夢は、こうして、誰も見ていない場所で、ようやく結実したのです。
      caption: 父から託された夢が静かに結実した
