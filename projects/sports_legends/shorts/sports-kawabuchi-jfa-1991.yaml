ja:
  title: '川淵三郎が日本サッカーを変えた1991年 #Shorts'
  description: '35年前の1991年、元プロサッカー選手だった川淵三郎は、JFA会長として、アマチュアだった日本サッカーを、プロ化する決断をしました。

    2年後にJリーグが開幕し、11年後の2002年には、日本がW杯を共催するまでに、なります。


    #Shorts #Jリーグ #川淵三郎 #JFA #サッカー

    '
  hook_caption: 川淵が日本サッカーを変えた
  series_brand: J-League誕生
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「アマチュアでは、世界に勝てない」——35年前の1991年、当時55歳の川淵三郎は、ひとりで日本サッカーの構造を、壊し始めたんです。
    caption: 1991年、川淵三郎の決断
  - panel: p2
    text: 古河電工出身の元日本代表だった彼は、JFA会長として、「100年計画」と題した分厚い報告書を、保守的な役員たちの前に、叩きつけました。
    caption: 100年計画を役員に叩きつけた
  - panel: p3
    text: 当時の日本サッカーは、企業の部活動が主流で、選手は社員でした。それをプロ化するというのは、業界の常識を、根底から、覆す決断だったんです。
    caption: 企業部活からプロ化への大転換
  - panel: p4
    text: そして33年前の1993年、Jリーグが開幕。10チームでスタートしたプロリーグは、日本人の「夜の楽しみ」を、一気に書き換えました。
    caption: 1993年、Jリーグ開幕
  - panel: p5
    text: そのうえ、24年前の2002年には、日本と韓国の共催で、FIFAワールドカップが、実現します。アマチュアだった国が、たった11年で、W杯開催国になったんです。
    caption: 11年後、W杯開催国へ
  - panel: p6
    text: 100年計画は、まだ65年も、残っている——川淵三郎が1991年のあの夜にひとりで切った決断は、今も、日本サッカーの未来を、押し上げ続けています。
    caption: 100年計画はまだ65年残っている
en:
  title: 'He Built Japan''s Pro Soccer League From Scratch #Shorts'
  description: 'In 1991, Japanese soccer was a purely amateur affair. Saburo Kawabuchi launched a radical ''100-Year Plan'' to change that.

    This is the story of how he created the J-League and helped Japan co-host the World Cup just 11 years later.


    #Shorts #JLeague #Soccer #History #Japan'
  hook_caption: He Built A Pro Soccer League From Nothing
  series_brand: The Birth of the J-League
  voice_speaker: Aiden
  narration:
  - panel: p1
    text: In 1991, Japanese soccer was completely amateur. This man, Saburo Kawabuchi, had a plan to tear it all down.
    caption: A radical idea
  - panel: p2
    text: As head of the Football Association, he presented a bold '100-Year Plan' to build a professional sport from the ground up.
    caption: The 100-Year Plan
  - panel: p3
    text: His vision was to replace corporate teams of employees with fully professional clubs—a move many thought was impossible.
    caption: Amateur to Pro
  - panel: p4
    text: But just two years later, the J-League was born, and its 10 founding teams immediately captivated the entire nation.
    caption: The J-League Begins
  - panel: p5
    text: The result? In a stunning 11 years, Japan went from having no pro league to co-hosting the 2002 FIFA World Cup.
    caption: World Cup Hosts
  - panel: p6
    text: Kawabuchi's 100-year plan is still in motion today, a legacy born from one man's impossible dream.
    caption: A lasting legacy
