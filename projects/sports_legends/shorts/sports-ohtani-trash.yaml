ja:
  title: '大谷翔平が試合中にゴミを拾う、本当の理由 #Shorts'
  description: |
    世界最高の選手、大谷翔平が試合中にさりげなくゴミを拾う。その行動の原点は、15歳で書いた目標達成シートにあった。

    #Shorts #大谷翔平 #野球 #MLB #メンタル
  hook_caption: 大谷がゴミを拾う本当の理由
  series_brand: 大谷とゴミ拾い
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 大谷翔平が試合中にゴミを拾うのは、「運」を拾うためだ——彼は本気で、そう考えています。
      caption: 大谷がゴミを拾うのは「運」のため
    - panel: p2
      text: グラウンドに落ちたゴミを、さりげなく拾ってポケットへ。世界最高の選手が、なぜこんな事を続けるのか。
      caption: 世界最高の選手が続ける習慣
    - panel: p3
      text: 原点は高校時代。15歳の彼が書いた目標達成シートには、81マスの一つに、はっきり「ゴミ拾い」と書かれていました。
      caption: 15歳の目標シートに「ゴミ拾い」
    - panel: p4
      text: 大谷にとってゴミ拾いは、人が落とした運を、拾う行為。徳を積むことが、巡って結果に返ると信じているんです。
      caption: 「人が落とした運を拾う」
    - panel: p5
      text: その習慣は、MLB の舞台でも変わりません。打席に向かう途中でゴミを拾う姿が、何度も世界に報じられました。
      caption: MLB でも変わらない習慣
    - panel: p6
      text: 才能だけではない。運すら自分で拾いにいく——それが、大谷翔平という選手の、強さの正体です。
      caption: 運も自分で拾いにいく強さ
