ja:
  title: 'アリが王座と3年を捨てた、たった一歩 #Shorts'
  description: '1967年、世界ヘビー級王者モハメド・アリは、ベトナム徴兵への「一歩」を、踏まなかった。

    その代償は、王座剥奪、ライセンス停止、そして選手生命の絶頂期3年半。


    #Shorts #モハメドアリ #MuhammadAli #ボクシング #ベトナム戦争

    '
  hook_caption: 王座より重い「一歩」
  series_brand: バルトゥーンスポーツ選手伝説
  voice_speed: 1.4
  narration:
  - panel: p1
    text: 「ヘビー級世界王者が、たった一歩を、踏まなかった」——59年前の1967年、25歳のモハメド・アリが選んだ代償の話を知っていますか?
    caption: 王者が踏まなかった、たった一歩
  - panel: p2
    text: ベトナム戦争のさなか、徴兵召集に応じなかった彼は、有名な一言を残しました。「俺は、ベトコンと、何の喧嘩もない」——信仰と良心からの拒否でした。
    caption: 「ベトコンと喧嘩はない」
  - panel: p3
    text: 翌日には、世界王座を剥奪され、全米50州でライセンスを停止され、懲役5年の判決まで下された。25歳のボクサーが、リングを、丸ごと、失った瞬間です。
    caption: 翌日、王座とリングを丸ごと失う
  - panel: p4
    text: それから3年半、彼はリングに上がれないかわりに、全米の大学を回り、若者に、戦争と差別について語り続けました。拳の代わりに、言葉で戦ったんです。
    caption: 3年半、拳の代わりに言葉で戦う
  - panel: p5
    text: 1971年、最高裁が、8対0の全員一致で無罪判決。法的には勝ちましたが、ボクサーとして最も身体が動く、25から28歳の3年半は、戻ってきませんでした。
    caption: 1971年、最高裁8対0で無罪
  - panel: p6
    text: それでも1974年、32歳の彼は、無敵と言われたフォアマンを倒し、王座に戻った——「失ったもの」より、「曲げなかったもの」が、伝説を作りました。
    caption: 曲げなかったものが、伝説を作る
en:
  title: 'Why Muhammad Ali Sacrificed His Title #Shorts'
  description: 'In 1967, heavyweight champion Muhammad Ali refused to be drafted for the Vietnam War. This single act of conscience cost him his title and three and a half years of his prime.


    #Shorts #MuhammadAli #Boxing #History #TheGreatest'
  hook_caption: He gave up his crown for one reason.
  series_brand: Valhtoon Sports Legends
  voice_speaker: Ryan
  narration:
  - panel: p1
    text: In 1967, at the height of his fame, heavyweight champion Muhammad Ali was drafted to fight in the Vietnam War.
    caption: The Champ gets drafted
  - panel: p2
    text: But when they called his name, he refused to step forward, famously declaring, "I ain't got no quarrel with them Viet Cong."
    caption: A matter of principle
  - panel: p3
    text: 'The price was immediate and severe: he was stripped of his championship title, his boxing license, and faced five years in prison.'
    caption: Stripped of everything
  - panel: p4
    text: For the next three and a half years, banned from the ring, Ali fought with words instead of fists, speaking out on college campuses across America.
    caption: A different kind of fight
  - panel: p5
    text: In 1971, the Supreme Court overturned his conviction. He was vindicated, but had lost the prime years of his career.
    caption: Vindicated, but at a cost
  - panel: p6
    text: Yet in 1974, he returned to defeat George Foreman and reclaim his title, proving that what he stood for made him a legend.
    caption: The ultimate comeback
