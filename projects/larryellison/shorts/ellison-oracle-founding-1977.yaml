ja:
  title: '1200ドルでOracleを始めた男、ラリー・エリソン #Shorts'
  description: |
    1977年、32歳のラリー・エリソンは、勤務先のAmpexを辞め、たった1,200ドルの自己資金で、ソフトウェア会社を立ち上げた。
    その会社は、CIAの極秘プロジェクトの暗号名から、Oracleと名を変え、世界最大級のデータベース企業に育った。30秒で解説します。

    #Shorts #ラリーエリソン #LarryEllison #Oracle #シリコンバレー #人物伝
  hook_caption: 1200ドルから始まったOracle
  series_brand: ラリー・エリソン伝
  voice_speed: 1.4
  narration:
    - panel: p1
      text: 1977年、32歳のラリー・エリソンは、勤め先のAmpexを辞めて、ポケットには、たった1,200ドルしか、ありませんでした。
      caption: 1977年、所持金1200ドルで独立
    - panel: p2
      text: その1,200ドルを元手に、彼は仲間2人とSoftware Development Laboratoriesを設立し、シリコンバレーの片隅で、会社をスタートさせます。
      caption: 仲間2人とSDLを設立
    - panel: p3
      text: 彼が賭けたのは、IBMの研究者コッド博士が発表した、関係データベースという理論で、当時のIBM自身ですら、商用化していませんでした。
      caption: コッド博士の関係DB理論に賭ける
    - panel: p4
      text: 最初の大口顧客はCIAで、その極秘プロジェクトの暗号名が、Oracle——のちに、会社名そのものに、なっていきました。
      caption: CIA案件の暗号名Oracleが社名に
    - panel: p5
      text: そして1986年、Oracleは、Microsoftより1日早く、NASDAQに上場し、ティッカーORCLとして、世界の表舞台に、躍り出ます。
      caption: 1986年、ORCLでNASDAQ上場
    - panel: p6
      text: 1,200ドルから始まった会社は、いま時価総額3,000億ドル超え。彼の独立を支えたのは、結局、技術への確信と、引き返さない覚悟だったのです。
      caption: 1200ドルから時価総額3000億ドル超
en:
  title: 'How Larry Ellison Started Oracle With $1,200 in His Pocket #Shorts'
  description: |
    In 1977, 32-year-old Larry Ellison quit his job at Ampex with about 1,200 dollars to his name and co-founded a tiny database company. It was later renamed Oracle after a CIA project codename, and grew into one of the largest software firms in the world.

    #Shorts #LarryEllison #Oracle #SiliconValley #Startup
  hook_caption: Oracle Started With Just $1,200
  series_brand: The Larry Ellison Story
  voice_speaker: am_michael
  narration:
    - panel: p1
      text: In 1977, a 32-year-old Larry Ellison quit his job at Ampex with only about 1,200 dollars in his pocket.
      caption: $1,200 to His Name
    - panel: p2
      text: With that 1,200 dollars he co-founded a tiny startup called Software Development Laboratories in Silicon Valley.
      caption: Founded SDL With Two Friends
    - panel: p3
      text: He bet everything on a theoretical paper by IBM researcher Edgar Codd about relational databases, which IBM itself had not yet commercialized.
      caption: Bet on Codd's Relational Model
    - panel: p4
      text: His first big customer was the CIA, and the codename of their classified project — Oracle — eventually became the company's name.
      caption: CIA Codename Became the Name
    - panel: p5
      text: In 1986 Oracle went public on NASDAQ as ORCL, one day before Microsoft, stepping onto the world stage.
      caption: IPO in 1986 as ORCL
    - panel: p6
      text: From 1,200 dollars to a company worth over 300 billion. What carried Ellison through was conviction in the technology and a refusal to turn back.
      caption: From $1,200 to a $300B Company
